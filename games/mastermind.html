<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MASTERMIND / ZERO game lab</title>
  <meta name="theme-color" content="#14102a">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared.css">
  <style>
    main {
      max-width: 480px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      text-align: center;
    }

    .back {
      display: inline-block;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      margin-bottom: 1.5rem;
      text-align: left;
      width: 100%;
      transition: color 0.3s;
    }

    .back:hover { color: var(--accent-cyan); }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent-magenta);
      letter-spacing: 0.1em;
      margin-bottom: 0.3rem;
      text-shadow: 0 0 20px var(--glow-magenta);
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
    }

    .board {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 1.2rem;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 6px 0;
      opacity: 0.35;
      transition: opacity 0.3s;
    }

    .row.active { opacity: 1; }
    .row.used { opacity: 0.7; }

    .row-num {
      font-size: 0.6rem;
      color: var(--text-dim);
      width: 18px;
      text-align: right;
    }

    .pegs {
      display: flex;
      gap: 6px;
    }

    .peg {
      width: 40px;
      height: 40px;
      border: 2px solid var(--border);
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .peg:hover {
      border-color: var(--accent-cyan);
      transform: scale(1.08);
    }

    .peg.filled { border-color: transparent; }

    .feedback {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
      width: 28px;
      height: 28px;
      margin-left: 8px;
    }

    .fb-peg {
      width: 10px;
      height: 10px;
      border: 1px solid var(--border);
    }

    .fb-peg.exact {
      background: var(--accent-magenta);
      border-color: var(--accent-magenta);
      box-shadow: 0 0 6px var(--glow-magenta);
    }

    .fb-peg.partial {
      background: var(--accent-cyan);
      border-color: var(--accent-cyan);
      box-shadow: 0 0 6px var(--glow-cyan-soft);
    }

    .palette {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 1rem;
    }

    .palette-color {
      width: 36px;
      height: 36px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s;
    }

    .palette-color:hover {
      transform: scale(1.15);
    }

    .palette-color.selected {
      border-color: #fff;
      box-shadow: 0 0 12px rgba(255,255,255,0.3);
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 1.2rem;
    }

    .btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 8px 18px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-bright);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
      box-shadow: 0 0 12px var(--glow-cyan-soft);
    }

    .btn.submit {
      border-color: var(--accent-green);
      color: var(--accent-green);
    }

    .btn.submit:hover {
      box-shadow: 0 0 12px rgba(57, 255, 20, 0.2);
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .btn:disabled:hover {
      border-color: var(--border);
      color: var(--text-bright);
      box-shadow: none;
    }

    .message {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      margin-bottom: 1rem;
      min-height: 1.5em;
    }

    .message.win {
      color: var(--accent-green);
      text-shadow: 0 0 10px rgba(57, 255, 20, 0.4);
    }

    .message.lose {
      color: var(--accent-magenta);
      text-shadow: 0 0 10px var(--glow-magenta);
    }

    .secret-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 1.2rem;
      padding: 8px 0;
      border: 1px solid var(--border);
    }

    .secret-peg {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--text-dim);
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 24px;
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      margin-bottom: 1.2rem;
    }

    .stats span { color: var(--accent-cyan); }

    .help {
      font-size: 0.6rem;
      color: var(--text-dim);
      line-height: 1.6;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
      margin-top: 1rem;
    }

    .help b { color: var(--text-muted); }

    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 0.5rem;
      font-size: 0.6rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      display: inline-block;
    }

    .legend-dot.exact {
      background: var(--accent-magenta);
      box-shadow: 0 0 4px var(--glow-magenta);
    }

    .legend-dot.partial {
      background: var(--accent-cyan);
      box-shadow: 0 0 4px var(--glow-cyan-soft);
    }

    @media (max-width: 420px) {
      .peg, .secret-peg { width: 32px; height: 32px; }
      .palette-color { width: 30px; height: 30px; }
    }
  </style>
  <script>(function(){var t=localStorage.getItem('zero-theme');if(!t&&window.matchMedia('(prefers-color-scheme:light)').matches)t='light';if(t==='light')document.documentElement.setAttribute('data-theme','light')})()</script>
</head>
<body>
  <main>
    <a href="./" class="back">&lt; GAME LAB</a>
    <h1>MASTERMIND</h1>
    <p class="subtitle">CRACK THE CODE. 10 ATTEMPTS. 6 COLORS.</p>

    <div class="stats">
      WINS: <span id="wins">0</span> &nbsp;|&nbsp; GAMES: <span id="games">0</span> &nbsp;|&nbsp; STREAK: <span id="streak">0</span>
    </div>

    <div id="secret-display" class="secret-row">
      <div class="secret-peg">?</div>
      <div class="secret-peg">?</div>
      <div class="secret-peg">?</div>
      <div class="secret-peg">?</div>
    </div>

    <div id="board" class="board"></div>

    <div class="message" id="message"></div>

    <div class="palette" id="palette"></div>

    <div class="controls">
      <button class="btn" id="clear-btn" onclick="clearCurrentRow()">CLEAR</button>
      <button class="btn submit" id="submit-btn" onclick="submitGuess()" disabled>SUBMIT</button>
      <button class="btn" id="new-btn" onclick="newGame()">NEW GAME</button>
    </div>

    <div class="help">
      <b>HOW TO PLAY:</b> Click a color, then click a slot to place it.
      Fill all 4 slots and hit SUBMIT. Feedback pegs show how close you are.<br>
      <div class="legend">
        <div class="legend-item"><span class="legend-dot exact"></span> Right color, right spot</div>
        <div class="legend-item"><span class="legend-dot partial"></span> Right color, wrong spot</div>
      </div>
    </div>
  </main>

  <script>
    const COLORS = [
      '#ff2d7b', // Neon Magenta
      '#00f0ff', // Electric Cyan
      '#39ff14', // Matrix Green
      '#9d4edd', // Purple Haze
      '#ffb000', // Amber
      '#ff6ac1', // Hot Pink
    ];
    const CODE_LEN = 4;
    const MAX_GUESSES = 10;

    let secret = [];
    let currentRow = 0;
    let guesses = [];
    let currentGuess = [null, null, null, null];
    let selectedColor = 0;
    let gameOver = false;
    let stats = loadStats();

    function loadStats() {
      try {
        const s = JSON.parse(localStorage.getItem('mm-stats'));
        return s || { wins: 0, games: 0, streak: 0 };
      } catch { return { wins: 0, games: 0, streak: 0 }; }
    }

    function saveStats() {
      localStorage.setItem('mm-stats', JSON.stringify(stats));
    }

    function updateStatsDisplay() {
      document.getElementById('wins').textContent = stats.wins;
      document.getElementById('games').textContent = stats.games;
      document.getElementById('streak').textContent = stats.streak;
    }

    function generateSecret() {
      const s = [];
      for (let i = 0; i < CODE_LEN; i++) {
        s.push(Math.floor(Math.random() * COLORS.length));
      }
      return s;
    }

    function evaluate(guess, secret) {
      let exact = 0, partial = 0;
      const gUsed = Array(CODE_LEN).fill(false);
      const sUsed = Array(CODE_LEN).fill(false);

      for (let i = 0; i < CODE_LEN; i++) {
        if (guess[i] === secret[i]) {
          exact++;
          gUsed[i] = true;
          sUsed[i] = true;
        }
      }

      for (let i = 0; i < CODE_LEN; i++) {
        if (gUsed[i]) continue;
        for (let j = 0; j < CODE_LEN; j++) {
          if (sUsed[j]) continue;
          if (guess[i] === secret[j]) {
            partial++;
            sUsed[j] = true;
            break;
          }
        }
      }

      return { exact, partial };
    }

    function buildBoard() {
      const board = document.getElementById('board');
      board.innerHTML = '';

      for (let r = 0; r < MAX_GUESSES; r++) {
        const row = document.createElement('div');
        row.className = 'row' + (r === currentRow ? ' active' : '');
        row.id = 'row-' + r;

        const num = document.createElement('div');
        num.className = 'row-num';
        num.textContent = (r + 1).toString().padStart(2, '0');
        row.appendChild(num);

        const pegs = document.createElement('div');
        pegs.className = 'pegs';
        for (let c = 0; c < CODE_LEN; c++) {
          const peg = document.createElement('div');
          peg.className = 'peg';
          peg.id = 'peg-' + r + '-' + c;
          if (r === currentRow && !gameOver) {
            peg.onclick = () => placePeg(c);
          }
          pegs.appendChild(peg);
        }
        row.appendChild(pegs);

        const feedback = document.createElement('div');
        feedback.className = 'feedback';
        for (let f = 0; f < CODE_LEN; f++) {
          const fb = document.createElement('div');
          fb.className = 'fb-peg';
          fb.id = 'fb-' + r + '-' + f;
          feedback.appendChild(fb);
        }
        row.appendChild(feedback);

        board.appendChild(row);
      }
    }

    function buildPalette() {
      const palette = document.getElementById('palette');
      palette.innerHTML = '';
      COLORS.forEach((color, i) => {
        const el = document.createElement('div');
        el.className = 'palette-color' + (i === selectedColor ? ' selected' : '');
        el.style.background = color;
        el.style.boxShadow = '0 0 8px ' + color + '66';
        el.onclick = () => selectColor(i);
        palette.appendChild(el);
      });
    }

    function selectColor(i) {
      selectedColor = i;
      buildPalette();
    }

    function placePeg(slot) {
      if (gameOver) return;
      currentGuess[slot] = selectedColor;
      const peg = document.getElementById('peg-' + currentRow + '-' + slot);
      peg.style.background = COLORS[selectedColor];
      peg.style.boxShadow = '0 0 10px ' + COLORS[selectedColor] + '88';
      peg.className = 'peg filled';
      checkSubmitReady();
    }

    function checkSubmitReady() {
      const ready = currentGuess.every(c => c !== null);
      document.getElementById('submit-btn').disabled = !ready;
    }

    function clearCurrentRow() {
      if (gameOver) return;
      currentGuess = [null, null, null, null];
      for (let c = 0; c < CODE_LEN; c++) {
        const peg = document.getElementById('peg-' + currentRow + '-' + c);
        peg.style.background = '';
        peg.style.boxShadow = '';
        peg.className = 'peg';
      }
      checkSubmitReady();
    }

    function submitGuess() {
      if (gameOver || currentGuess.some(c => c === null)) return;

      const result = evaluate(currentGuess, secret);
      guesses.push({ guess: [...currentGuess], result });

      // Show feedback
      let fbIndex = 0;
      for (let i = 0; i < result.exact; i++) {
        document.getElementById('fb-' + currentRow + '-' + fbIndex).className = 'fb-peg exact';
        fbIndex++;
      }
      for (let i = 0; i < result.partial; i++) {
        document.getElementById('fb-' + currentRow + '-' + fbIndex).className = 'fb-peg partial';
        fbIndex++;
      }

      // Mark row as used
      document.getElementById('row-' + currentRow).className = 'row used';

      if (result.exact === CODE_LEN) {
        gameOver = true;
        stats.wins++;
        stats.games++;
        stats.streak++;
        saveStats();
        updateStatsDisplay();
        document.getElementById('message').className = 'message win';
        document.getElementById('message').textContent = 'CODE CRACKED IN ' + (currentRow + 1) + ' ATTEMPTS';
        revealSecret();
        return;
      }

      currentRow++;
      if (currentRow >= MAX_GUESSES) {
        gameOver = true;
        stats.games++;
        stats.streak = 0;
        saveStats();
        updateStatsDisplay();
        document.getElementById('message').className = 'message lose';
        document.getElementById('message').textContent = 'DECRYPTION FAILED';
        revealSecret();
        return;
      }

      // Set up next row
      currentGuess = [null, null, null, null];
      document.getElementById('row-' + currentRow).className = 'row active';
      for (let c = 0; c < CODE_LEN; c++) {
        const peg = document.getElementById('peg-' + currentRow + '-' + c);
        peg.onclick = () => placePeg(c);
      }
      document.getElementById('submit-btn').disabled = true;
    }

    function revealSecret() {
      const display = document.getElementById('secret-display');
      display.innerHTML = '';
      secret.forEach(ci => {
        const peg = document.createElement('div');
        peg.className = 'secret-peg';
        peg.style.background = COLORS[ci];
        peg.style.boxShadow = '0 0 12px ' + COLORS[ci] + '88';
        display.appendChild(peg);
      });
    }

    function newGame() {
      secret = generateSecret();
      currentRow = 0;
      guesses = [];
      currentGuess = [null, null, null, null];
      gameOver = false;
      document.getElementById('message').textContent = '';
      document.getElementById('message').className = 'message';

      const display = document.getElementById('secret-display');
      display.innerHTML = '';
      for (let i = 0; i < CODE_LEN; i++) {
        const peg = document.createElement('div');
        peg.className = 'secret-peg';
        peg.textContent = '?';
        display.appendChild(peg);
      }

      buildBoard();
      buildPalette();
      document.getElementById('submit-btn').disabled = true;
    }

    // Keyboard support
    document.addEventListener('keydown', e => {
      if (gameOver) {
        if (e.key === 'Enter') newGame();
        return;
      }

      if (e.key >= '1' && e.key <= '6') {
        selectColor(parseInt(e.key) - 1);
      } else if (e.key === 'Enter') {
        submitGuess();
      } else if (e.key === 'Backspace' || e.key === 'Delete') {
        // Clear last filled peg
        for (let i = CODE_LEN - 1; i >= 0; i--) {
          if (currentGuess[i] !== null) {
            currentGuess[i] = null;
            const peg = document.getElementById('peg-' + currentRow + '-' + i);
            peg.style.background = '';
            peg.style.boxShadow = '';
            peg.className = 'peg';
            checkSubmitReady();
            break;
          }
        }
      }
    });

    // Init
    updateStatsDisplay();
    newGame();
  </script>
  <script src="../theme-toggle.js"></script>
</body>
</html>
