<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BREAKOUT / ZERO game lab</title>
  <meta name="theme-color" content="#14102a">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared.css">
  <style>
    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      text-align: center;
    }

    .back {
      display: inline-block;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      margin-bottom: 1.5rem;
      text-align: left;
      width: 100%;
    }

    .back:hover {
      color: var(--accent-cyan);
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent-magenta);
      letter-spacing: 0.12em;
      margin-bottom: 0.3rem;
      text-shadow: 0 0 20px var(--glow-magenta);
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
    }

    .game-area {
      position: relative;
      display: inline-block;
      margin-bottom: 1rem;
    }

    canvas {
      display: block;
      border: 1px solid var(--border);
      background: var(--bg-void);
      touch-action: none;
      -webkit-touch-callout: none;
    }

    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 0;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
    }

    .hud-score {
      color: var(--accent-cyan);
      text-shadow: 0 0 8px rgba(0, 240, 255, 0.4);
    }

    .hud-lives {
      color: var(--accent-magenta);
      text-shadow: 0 0 8px rgba(255, 45, 123, 0.4);
    }

    .hud-level {
      color: var(--accent-green);
      text-shadow: 0 0 8px rgba(57, 255, 20, 0.4);
    }

    .controls {
      color: var(--text-dim);
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      line-height: 1.6;
      margin-top: 0.8rem;
    }

    .controls kbd {
      display: inline-block;
      color: var(--accent-cyan);
      border: 1px solid var(--border-hover);
      padding: 0.1rem 0.4rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
    }

    .touch-hint {
      color: var(--text-dim);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      margin-top: 0.5rem;
    }

    @media (pointer: fine) {
      .touch-hint { display: none; }
    }

    .overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 15, 0.85);
      z-index: 10;
    }

    .overlay-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--accent-magenta);
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 20px var(--glow-magenta);
    }

    .overlay-sub {
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 0.06em;
    }

    .overlay-score {
      font-size: 1rem;
      color: var(--accent-cyan);
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
    }

    .hidden { display: none !important; }
  </style>
  <script>(function(){var t=localStorage.getItem('zero-theme');if(!t&&window.matchMedia('(prefers-color-scheme:light)').matches)t='light';if(t==='light')document.documentElement.setAttribute('data-theme','light')})()</script>
</head>
<body>
  <main>
    <a href="./" class="back">&lt; GAME LAB</a>
    <h1>BREAKOUT</h1>
    <p class="subtitle">SMASH BRICKS WITH A BOUNCING BALL</p>

    <div class="game-area">
      <canvas id="game" width="480" height="400"></canvas>

      <div class="overlay" id="start-overlay">
        <div class="overlay-title">BREAKOUT</div>
        <div class="overlay-sub" id="start-sub">PRESS SPACE TO START</div>
      </div>

      <div class="overlay hidden" id="gameover-overlay">
        <div class="overlay-title">GAME OVER</div>
        <div class="overlay-score" id="final-score"></div>
        <div class="overlay-sub" id="gameover-sub">PRESS SPACE TO RESTART</div>
      </div>

      <div class="overlay hidden" id="win-overlay">
        <div class="overlay-title" style="color: var(--accent-green); text-shadow: 0 0 20px rgba(57,255,20,0.5);">ALL CLEAR</div>
        <div class="overlay-score" id="win-score"></div>
        <div class="overlay-sub" id="win-sub">PRESS SPACE FOR NEXT LEVEL</div>
      </div>
    </div>

    <div class="hud">
      <span class="hud-score">SCORE: <span id="score">0</span></span>
      <span class="hud-level">LEVEL: <span id="level">1</span></span>
      <span class="hud-lives">LIVES: <span id="lives">3</span></span>
    </div>

    <div class="controls" id="controls">
      <kbd>←</kbd> <kbd>→</kbd> or <kbd>MOUSE</kbd> move paddle &nbsp;·&nbsp; <kbd>SPACE</kbd> launch ball
    </div>
    <div class="touch-hint">DRAG TO MOVE &middot; TAP TO LAUNCH</div>
  </main>

  <script>
  (function() {
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const isTouch = window.matchMedia('(pointer: coarse)').matches;

    // Responsive canvas sizing
    const BASE_W = 480;
    const BASE_H = 400;
    const ASPECT = BASE_H / BASE_W;

    function resizeCanvas() {
      const maxW = Math.min(BASE_W, window.innerWidth - 48);
      canvas.style.width = maxW + 'px';
      canvas.style.height = Math.floor(maxW * ASPECT) + 'px';
      canvas.width = BASE_W;
      canvas.height = BASE_H;
    }
    resizeCanvas();

    const W = BASE_W;
    const H = BASE_H;

    // Touch-aware overlay text
    if (isTouch) {
      document.getElementById('start-sub').textContent = 'TAP TO START';
      document.getElementById('gameover-sub').textContent = 'TAP TO RESTART';
      document.getElementById('win-sub').textContent = 'TAP FOR NEXT LEVEL';
      document.getElementById('controls').style.display = 'none';
    }

    // Brand colors
    const VOID = '#0a0a0f';
    const MAGENTA = '#ff2d7b';
    const CYAN = '#00f0ff';
    const GREEN = '#39ff14';
    const PURPLE = '#9d4edd';
    const WHITE = '#e0e0e8';
    const DIM = '#7a7a90';
    const PINK = '#ff6ac1';

    const BRICK_COLORS = [MAGENTA, CYAN, GREEN, PURPLE, PINK];

    // Game state
    let state = 'start'; // start, playing, paused, gameover, win
    let score = 0;
    let lives = 3;
    let level = 1;

    // Paddle
    const PADDLE_W = 80;
    const PADDLE_H = 10;
    let paddleX = (W - PADDLE_W) / 2;

    // Ball
    const BALL_R = 5;
    let ballX, ballY, ballDX, ballDY;
    let ballAttached = true;

    // Bricks
    const BRICK_ROWS = 5;
    const BRICK_COLS = 8;
    const BRICK_W = 52;
    const BRICK_H = 16;
    const BRICK_PAD = 4;
    const BRICK_TOP = 40;
    const BRICK_LEFT = (W - (BRICK_COLS * (BRICK_W + BRICK_PAD) - BRICK_PAD)) / 2;
    let bricks = [];

    // Particles
    let particles = [];

    // Input
    let leftPressed = false;
    let rightPressed = false;
    let mouseX = null;

    function initBricks() {
      bricks = [];
      for (let r = 0; r < BRICK_ROWS; r++) {
        for (let c = 0; c < BRICK_COLS; c++) {
          bricks.push({
            x: BRICK_LEFT + c * (BRICK_W + BRICK_PAD),
            y: BRICK_TOP + r * (BRICK_H + BRICK_PAD),
            w: BRICK_W,
            h: BRICK_H,
            color: BRICK_COLORS[r % BRICK_COLORS.length],
            alive: true,
            // Higher rows worth more
            points: (BRICK_ROWS - r) * 10
          });
        }
      }
    }

    function resetBall() {
      ballAttached = true;
      ballX = paddleX + PADDLE_W / 2;
      ballY = H - 30 - BALL_R;
      let speed = 3 + level * 0.5;
      let angle = -Math.PI / 4 + Math.random() * (-Math.PI / 2);
      ballDX = speed * Math.cos(angle);
      ballDY = -speed;
    }

    function initGame() {
      paddleX = (W - PADDLE_W) / 2;
      initBricks();
      resetBall();
    }

    function spawnParticles(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        let angle = Math.random() * Math.PI * 2;
        let speed = 1 + Math.random() * 3;
        particles.push({
          x: x, y: y,
          dx: Math.cos(angle) * speed,
          dy: Math.sin(angle) * speed,
          life: 20 + Math.random() * 20,
          maxLife: 40,
          color: color,
          size: 1.5 + Math.random() * 2
        });
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.dx;
        p.y += p.dy;
        p.life--;
        if (p.life <= 0) {
          particles.splice(i, 1);
        }
      }
    }

    function drawParticles() {
      for (let p of particles) {
        let alpha = p.life / p.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 6;
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
      }
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
    }

    function drawBricks() {
      for (let b of bricks) {
        if (!b.alive) continue;
        ctx.fillStyle = b.color;
        ctx.shadowColor = b.color;
        ctx.shadowBlur = 4;
        ctx.fillRect(b.x, b.y, b.w, b.h);

        // Inner highlight
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.fillRect(b.x, b.y, b.w, 2);
      }
      ctx.shadowBlur = 0;
    }

    function drawPaddle() {
      ctx.fillStyle = CYAN;
      ctx.shadowColor = CYAN;
      ctx.shadowBlur = 10;
      ctx.fillRect(paddleX, H - 30, PADDLE_W, PADDLE_H);

      // Center line
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(paddleX + PADDLE_W / 2 - 0.5, H - 30, 1, PADDLE_H);
    }

    function drawBall() {
      ctx.beginPath();
      ctx.arc(ballX, ballY, BALL_R, 0, Math.PI * 2);
      ctx.fillStyle = WHITE;
      ctx.shadowColor = WHITE;
      ctx.shadowBlur = 12;
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function drawTrail() {
      // Subtle ball trail
      ctx.beginPath();
      ctx.arc(ballX - ballDX * 0.5, ballY - ballDY * 0.5, BALL_R * 0.7, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(224, 224, 232, 0.2)';
      ctx.fill();
    }

    function movePaddle() {
      const speed = 6;
      if (mouseX !== null) {
        paddleX = mouseX - PADDLE_W / 2;
      } else {
        if (leftPressed) paddleX -= speed;
        if (rightPressed) paddleX += speed;
      }
      // Clamp
      if (paddleX < 0) paddleX = 0;
      if (paddleX > W - PADDLE_W) paddleX = W - PADDLE_W;
    }

    function updateBall() {
      if (ballAttached) {
        ballX = paddleX + PADDLE_W / 2;
        ballY = H - 30 - BALL_R;
        return;
      }

      ballX += ballDX;
      ballY += ballDY;

      // Wall bounces
      if (ballX - BALL_R <= 0) {
        ballX = BALL_R;
        ballDX = Math.abs(ballDX);
      }
      if (ballX + BALL_R >= W) {
        ballX = W - BALL_R;
        ballDX = -Math.abs(ballDX);
      }
      if (ballY - BALL_R <= 0) {
        ballY = BALL_R;
        ballDY = Math.abs(ballDY);
      }

      // Paddle collision
      if (ballDY > 0 &&
          ballY + BALL_R >= H - 30 &&
          ballY + BALL_R <= H - 30 + PADDLE_H + 4 &&
          ballX >= paddleX &&
          ballX <= paddleX + PADDLE_W) {
        // Bounce angle based on where ball hits paddle
        let hitPos = (ballX - paddleX) / PADDLE_W; // 0 to 1
        let angle = (hitPos - 0.5) * Math.PI * 0.7; // -63 to +63 degrees
        let speed = Math.sqrt(ballDX * ballDX + ballDY * ballDY);
        // Slight speed increase over time
        speed = Math.min(speed + 0.02, 7 + level);
        ballDX = speed * Math.sin(angle);
        ballDY = -speed * Math.cos(angle);
        ballY = H - 30 - BALL_R;
        spawnParticles(ballX, ballY, CYAN, 4);
      }

      // Ball falls below
      if (ballY - BALL_R > H) {
        lives--;
        document.getElementById('lives').textContent = lives;
        if (lives <= 0) {
          state = 'gameover';
          document.getElementById('final-score').textContent = 'SCORE: ' + score;
          document.getElementById('gameover-overlay').classList.remove('hidden');
        } else {
          resetBall();
        }
      }

      // Brick collision
      for (let b of bricks) {
        if (!b.alive) continue;

        // Simple AABB vs circle
        let closestX = Math.max(b.x, Math.min(ballX, b.x + b.w));
        let closestY = Math.max(b.y, Math.min(ballY, b.y + b.h));
        let dx = ballX - closestX;
        let dy = ballY - closestY;
        if (dx * dx + dy * dy <= BALL_R * BALL_R) {
          b.alive = false;
          score += b.points;
          document.getElementById('score').textContent = score;

          // Determine bounce direction
          let overlapX = BALL_R - Math.abs(dx);
          let overlapY = BALL_R - Math.abs(dy);
          if (overlapX < overlapY) {
            ballDX = -ballDX;
          } else {
            ballDY = -ballDY;
          }

          spawnParticles(closestX, closestY, b.color, 8);

          // Check win
          if (bricks.every(br => !br.alive)) {
            state = 'win';
            document.getElementById('win-score').textContent = 'SCORE: ' + score;
            document.getElementById('win-overlay').classList.remove('hidden');
          }
          break; // One brick per frame
        }
      }
    }

    function drawGrid() {
      ctx.strokeStyle = 'rgba(122, 122, 144, 0.06)';
      ctx.lineWidth = 0.5;
      for (let x = 0; x < W; x += 20) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
      for (let y = 0; y < H; y += 20) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }
    }

    function draw() {
      // Clear
      ctx.fillStyle = VOID;
      ctx.fillRect(0, 0, W, H);

      drawGrid();
      drawBricks();
      drawTrail();
      drawBall();
      drawPaddle();
      drawParticles();
    }

    function gameLoop() {
      if (state === 'playing') {
        movePaddle();
        updateBall();
        updateParticles();
      }
      draw();
      requestAnimationFrame(gameLoop);
    }

    function startGame() {
      score = 0;
      lives = 3;
      level = 1;
      document.getElementById('score').textContent = score;
      document.getElementById('lives').textContent = lives;
      document.getElementById('level').textContent = level;
      initGame();
      state = 'playing';
    }

    function nextLevel() {
      level++;
      document.getElementById('level').textContent = level;
      initBricks();
      resetBall();
      state = 'playing';
    }

    // Input handlers
    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowLeft' || e.key === 'a') {
        leftPressed = true;
        mouseX = null;
      }
      if (e.key === 'ArrowRight' || e.key === 'd') {
        rightPressed = true;
        mouseX = null;
      }
      if (e.key === ' ' || e.code === 'Space') {
        e.preventDefault();
        if (state === 'start') {
          document.getElementById('start-overlay').classList.add('hidden');
          startGame();
        } else if (state === 'playing' && ballAttached) {
          ballAttached = false;
        } else if (state === 'gameover') {
          document.getElementById('gameover-overlay').classList.add('hidden');
          startGame();
        } else if (state === 'win') {
          document.getElementById('win-overlay').classList.add('hidden');
          nextLevel();
        }
      }
    });

    document.addEventListener('keyup', function(e) {
      if (e.key === 'ArrowLeft' || e.key === 'a') leftPressed = false;
      if (e.key === 'ArrowRight' || e.key === 'd') rightPressed = false;
    });

    canvas.addEventListener('mousemove', function(e) {
      let rect = canvas.getBoundingClientRect();
      mouseX = (e.clientX - rect.left) * (W / rect.width);
    });

    canvas.addEventListener('mouseleave', function() {
      mouseX = null;
    });

    canvas.addEventListener('click', function() {
      if (state === 'start') {
        document.getElementById('start-overlay').classList.add('hidden');
        startGame();
      } else if (state === 'playing' && ballAttached) {
        ballAttached = false;
      } else if (state === 'gameover') {
        document.getElementById('gameover-overlay').classList.add('hidden');
        startGame();
      } else if (state === 'win') {
        document.getElementById('win-overlay').classList.add('hidden');
        nextLevel();
      }
    });

    // Touch support
    canvas.addEventListener('touchmove', function(e) {
      e.preventDefault();
      let rect = canvas.getBoundingClientRect();
      mouseX = (e.touches[0].clientX - rect.left) * (W / rect.width);
    }, { passive: false });

    canvas.addEventListener('touchstart', function(e) {
      e.preventDefault();
      let rect = canvas.getBoundingClientRect();
      mouseX = (e.touches[0].clientX - rect.left) * (W / rect.width);

      if (state === 'start') {
        document.getElementById('start-overlay').classList.add('hidden');
        startGame();
      } else if (state === 'playing' && ballAttached) {
        ballAttached = false;
      } else if (state === 'gameover') {
        document.getElementById('gameover-overlay').classList.add('hidden');
        startGame();
      } else if (state === 'win') {
        document.getElementById('win-overlay').classList.add('hidden');
        nextLevel();
      }
    }, { passive: false });

    // Prevent scroll/zoom while playing
    document.addEventListener('touchmove', function(e) {
      if (state === 'playing') e.preventDefault();
    }, { passive: false });

    // Handle resize
    window.addEventListener('resize', function() {
      resizeCanvas();
      draw();
    });

    // Init
    initGame();
    draw();
    gameLoop();
  })();
  </script>
  <script src="../theme-toggle.js"></script>
</body>
</html>
