  <style>
    main {
      max-width: 480px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      text-align: center;
    }

    .back {
      display: inline-block;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      margin-bottom: 1.5rem;
      text-align: left;
      width: 100%;
      transition: color 0.3s;
    }

    .back:hover {
      color: var(--accent-cyan);
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--accent-magenta);
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 20px var(--glow-magenta);
    }

    .controls-info {
      color: var(--text-dim);
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      margin-bottom: 1.5rem;
    }

    #message {
      height: 1.6rem;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 0.8rem;
      color: var(--accent-cyan);
      text-shadow: 0 0 10px var(--glow-cyan-soft);
    }

    #stats {
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-bottom: 1rem;
      letter-spacing: 0.04em;
    }

    #stats span {
      margin: 0 0.5rem;
    }

    .grid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-bottom: 1.5rem;
    }

    .row {
      display: flex;
      gap: 6px;
    }

    .cell {
      width: 56px;
      height: 56px;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text-bright);
      text-transform: uppercase;
      transition: border-color 0.15s, transform 0.15s;
    }

    .cell.filled {
      border-color: var(--text-dim);
    }

    .cell.active {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 8px var(--glow-cyan-soft);
    }

    .cell.correct {
      background: #39ff14;
      border-color: #39ff14;
      color: #0a0a0f;
      text-shadow: none;
      animation: flip 0.5s ease;
    }

    .cell.present {
      background: #ffb000;
      border-color: #ffb000;
      color: #0a0a0f;
      text-shadow: none;
      animation: flip 0.5s ease;
    }

    .cell.absent {
      background: #2a2a35;
      border-color: #2a2a35;
      color: #7a7a90;
      animation: flip 0.5s ease;
    }

    @keyframes flip {
      0% { transform: scaleY(1); }
      50% { transform: scaleY(0); }
      100% { transform: scaleY(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-4px); }
      40%, 80% { transform: translateX(4px); }
    }

    .row.shake {
      animation: shake 0.3s ease;
    }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    .cell.pop {
      animation: pop 0.1s ease;
    }

    .keyboard {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-bottom: 1.5rem;
    }

    .kb-row {
      display: flex;
      gap: 5px;
    }

    .key {
      min-width: 30px;
      height: 46px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-bright);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-transform: uppercase;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      padding: 0 6px;
    }

    .key:hover {
      border-color: var(--accent-cyan);
    }

    .key.wide {
      min-width: 56px;
      font-size: 0.65rem;
      letter-spacing: 0.03em;
    }

    .key.correct {
      background: #39ff14;
      border-color: #39ff14;
      color: #0a0a0f;
    }

    .key.present {
      background: #ffb000;
      border-color: #ffb000;
      color: #0a0a0f;
    }

    .key.absent {
      background: #2a2a35;
      border-color: #2a2a35;
      color: #5a5a65;
    }

    .key.correct:hover { border-color: #39ff14; }
    .key.present:hover { border-color: #ffb000; }
    .key.absent:hover { border-color: #2a2a35; }

    #new-game {
      display: none;
      margin: 0 auto;
      padding: 0.6rem 1.5rem;
      background: transparent;
      border: 1px solid var(--accent-magenta);
      color: var(--accent-magenta);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    #new-game:hover {
      background: var(--accent-magenta);
      color: var(--bg-primary);
    }

    @media (max-width: 400px) {
      .cell {
        width: 48px;
        height: 48px;
        font-size: 1.3rem;
      }
      .key {
        min-width: 24px;
        height: 40px;
        font-size: 0.65rem;
        padding: 0 4px;
      }
      .key.wide {
        min-width: 44px;
      }
    }
  </style>

    ];
    EXTRA_VALID.forEach(w => VALID.add(w));
    WORDS.forEach(w => VALID.add(w));

    const MAX_GUESSES = 6;
    const WORD_LENGTH = 5;

    let answer = '';
    let guesses = [];
    let currentGuess = '';
    let gameOver = false;
    let keyStates = {};

    // Stats
    let stats = JSON.parse(localStorage.getItem('wordle-stats') || '{"played":0,"won":0,"streak":0}');

    function pickWord() {
      return WORDS[Math.floor(Math.random() * WORDS.length)];
    }

    function buildGrid() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      for (let r = 0; r < MAX_GUESSES; r++) {
        const row = document.createElement('div');
        row.className = 'row';
        row.id = 'row-' + r;
        for (let c = 0; c < WORD_LENGTH; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.id = 'cell-' + r + '-' + c;
          row.appendChild(cell);
        }
        grid.appendChild(row);
      }
    }

    const KB_ROWS = [
      ['Q','W','E','R','T','Y','U','I','O','P'],
      ['A','S','D','F','G','H','J','K','L'],
      ['ENTER','Z','X','C','V','B','N','M','⌫']
    ];

    function buildKeyboard() {
      const kb = document.getElementById('keyboard');
      kb.innerHTML = '';
      KB_ROWS.forEach(row => {
        const div = document.createElement('div');
        div.className = 'kb-row';
        row.forEach(key => {
          const btn = document.createElement('button');
          btn.className = 'key' + (key === 'ENTER' || key === '⌫' ? ' wide' : '');
          btn.textContent = key;
          btn.id = 'key-' + key;
          btn.addEventListener('click', () => handleKey(key));
          div.appendChild(btn);
        });
        kb.appendChild(div);
      });
    }

    function updateGrid() {
      // Past guesses
      for (let r = 0; r < guesses.length; r++) {
        for (let c = 0; c < WORD_LENGTH; c++) {
          const cell = document.getElementById('cell-' + r + '-' + c);
          cell.textContent = guesses[r].word[c];
          cell.className = 'cell ' + guesses[r].result[c];
        }
      }
      // Current guess
      const row = guesses.length;
      if (row < MAX_GUESSES && !gameOver) {
        for (let c = 0; c < WORD_LENGTH; c++) {
          const cell = document.getElementById('cell-' + row + '-' + c);
          cell.textContent = currentGuess[c] || '';
          cell.className = 'cell' + (currentGuess[c] ? ' filled' : '') + (c === currentGuess.length && currentGuess.length < WORD_LENGTH ? ' active' : '');
          if (c === 0 && currentGuess.length === 0) cell.className = 'cell active';
        }
      }
      // Clear remaining rows
      for (let r = Math.max(guesses.length + 1, guesses.length + (gameOver ? 0 : 1)); r < MAX_GUESSES; r++) {
        for (let c = 0; c < WORD_LENGTH; c++) {
          const cell = document.getElementById('cell-' + r + '-' + c);
          cell.textContent = '';
          cell.className = 'cell';
        }
      }
    }

    function updateKeyboard() {
      KB_ROWS.forEach(row => {
        row.forEach(key => {
          if (key === 'ENTER' || key === '⌫') return;
          const btn = document.getElementById('key-' + key);
          const state = keyStates[key.toLowerCase()];
          btn.className = 'key' + (state ? ' ' + state : '');
        });
      });
    }

    function updateStats() {
      document.getElementById('stat-played').textContent = stats.played;
      document.getElementById('stat-won').textContent = stats.won;
      document.getElementById('stat-streak').textContent = stats.streak;
    }

    function showMessage(text, duration) {
      const el = document.getElementById('message');
      el.textContent = text;
      if (duration) {
        setTimeout(() => { if (el.textContent === text) el.innerHTML = '&nbsp;'; }, duration);
      }
    }

    function evaluateGuess(guess) {
      const result = Array(WORD_LENGTH).fill('absent');
      const answerArr = answer.split('');
      const guessArr = guess.split('');
      // First pass: correct positions
      for (let i = 0; i < WORD_LENGTH; i++) {
        if (guessArr[i] === answerArr[i]) {
          result[i] = 'correct';
          answerArr[i] = null;
          guessArr[i] = null;
        }
      }
      // Second pass: present but wrong position
      for (let i = 0; i < WORD_LENGTH; i++) {
        if (guessArr[i] === null) continue;
        const idx = answerArr.indexOf(guessArr[i]);
        if (idx !== -1) {
          result[i] = 'present';
          answerArr[idx] = null;
        }
      }
      return result;
    }

    function submitGuess() {
      if (currentGuess.length !== WORD_LENGTH) {
        const row = document.getElementById('row-' + guesses.length);
        row.classList.add('shake');
        setTimeout(() => row.classList.remove('shake'), 400);
        showMessage('NOT ENOUGH LETTERS', 1500);
        return;
      }

      if (!VALID.has(currentGuess)) {
        const row = document.getElementById('row-' + guesses.length);
        row.classList.add('shake');
        setTimeout(() => row.classList.remove('shake'), 400);
        showMessage('NOT IN WORD LIST', 1500);
        return;
      }

      const result = evaluateGuess(currentGuess);
      const rowIdx = guesses.length;
      guesses.push({ word: currentGuess, result: result });

      // Animate cells with staggered flip
      for (let c = 0; c < WORD_LENGTH; c++) {
        const cell = document.getElementById('cell-' + rowIdx + '-' + c);
        setTimeout(() => {
          cell.textContent = currentGuess[c];
          cell.className = 'cell ' + result[c];
        }, c * 120);
      }

      // Update key states
      for (let i = 0; i < WORD_LENGTH; i++) {
        const letter = currentGuess[i];
        const newState = result[i];
        const oldState = keyStates[letter];
        // Priority: correct > present > absent
        if (newState === 'correct') {
          keyStates[letter] = 'correct';
        } else if (newState === 'present' && oldState !== 'correct') {
          keyStates[letter] = 'present';
        } else if (!oldState) {
          keyStates[letter] = 'absent';
        }
      }

      const won = result.every(r => r === 'correct');
      const messages = ['GENIUS!', 'MAGNIFICENT!', 'IMPRESSIVE!', 'SPLENDID!', 'GREAT!', 'PHEW!'];

      if (won) {
        gameOver = true;
        stats.played++;
        stats.won++;
        stats.streak++;
        localStorage.setItem('wordle-stats', JSON.stringify(stats));
        setTimeout(() => {
          showMessage(messages[rowIdx] || 'YOU WIN!');
          document.getElementById('new-game').style.display = 'inline-block';
        }, WORD_LENGTH * 120 + 200);
      } else if (guesses.length >= MAX_GUESSES) {
        gameOver = true;
        stats.played++;
        stats.streak = 0;
        localStorage.setItem('wordle-stats', JSON.stringify(stats));
        setTimeout(() => {
          showMessage(answer.toUpperCase());
          document.getElementById('new-game').style.display = 'inline-block';
        }, WORD_LENGTH * 120 + 200);
      }

      currentGuess = '';
      setTimeout(() => {
        updateGrid();
        updateKeyboard();
        updateStats();
      }, WORD_LENGTH * 120 + 100);
    }

    function handleKey(key) {
      if (gameOver) return;

      if (key === 'ENTER') {
        submitGuess();
        return;
      }

      if (key === '⌫' || key === 'BACKSPACE') {
        if (currentGuess.length > 0) {
          currentGuess = currentGuess.slice(0, -1);
          updateGrid();
        }
        return;
      }

      if (key.length === 1 && /^[A-Za-z]$/.test(key) && currentGuess.length < WORD_LENGTH) {
        currentGuess += key.toLowerCase();
        // Pop animation
        const cell = document.getElementById('cell-' + guesses.length + '-' + (currentGuess.length - 1));
        if (cell) {
          cell.classList.add('pop');
          setTimeout(() => cell.classList.remove('pop'), 120);
        }
        updateGrid();
      }
    }

    // Physical keyboard
    document.addEventListener('keydown', e => {
      if (e.ctrlKey || e.metaKey || e.altKey) return;
      if (e.key === 'Enter') handleKey('ENTER');
      else if (e.key === 'Backspace') handleKey('⌫');
      else if (e.key.length === 1 && /^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toUpperCase());
    });

    // New game button
    document.getElementById('new-game').addEventListener('click', () => {
      answer = pickWord();
      guesses = [];
      currentGuess = '';
      gameOver = false;
      keyStates = {};
      document.getElementById('new-game').style.display = 'none';
      showMessage('&nbsp;');
      document.getElementById('message').innerHTML = '&nbsp;';
      buildGrid();
      buildKeyboard();
      updateGrid();
      updateStats();
    });

    // Init
    answer = pickWord();
    buildGrid();
    buildKeyboard();
    updateGrid();
    updateStats();
  </script>
  <script src="../theme-toggle.js"></script>
</body>
</html>
