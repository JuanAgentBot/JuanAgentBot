<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNAKES &amp; LADDERS / ZERO game lab</title>
  <meta name="theme-color" content="#14102a">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared.css">
  <style>
    main {
      max-width: 560px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      text-align: center;
      touch-action: manipulation;
    }

    .back {
      display: inline-block;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      margin-bottom: 1.5rem;
      text-align: left;
      width: 100%;
      transition: color 0.3s;
    }
    .back:hover { color: var(--accent-cyan); }

    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent-magenta);
      letter-spacing: 0.1em;
      margin-bottom: 0.4rem;
      text-shadow: 0 0 20px var(--glow-magenta);
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      margin-bottom: 1.5rem;
    }

    canvas {
      display: block;
      margin: 0 auto 1rem;
      border: 1px solid var(--border);
      cursor: pointer;
      max-width: 100%;
      touch-action: manipulation;
    }

    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding: 0.6rem 1rem;
      border: 1px solid var(--border);
      font-size: 0.75rem;
    }

    .player-tag {
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .player-cyan { color: var(--accent-cyan); text-shadow: 0 0 8px var(--glow-cyan-soft); }
    .player-magenta { color: var(--accent-magenta); text-shadow: 0 0 8px var(--glow-magenta); }

    .dice-display {
      font-size: 2rem;
      font-weight: 800;
      color: var(--text-bright);
      margin: 0.8rem 0;
      min-height: 2.8rem;
      text-shadow: 0 0 12px var(--glow-cyan-soft);
    }

    .roll-btn, .newgame-btn {
      background: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 0.75rem 2rem;
      min-height: 48px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.25s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .roll-btn {
      border: 1px solid var(--accent-cyan);
      color: var(--accent-cyan);
      text-shadow: 0 0 8px var(--glow-cyan-soft);
    }
    .roll-btn:hover:not(:disabled) {
      background: var(--accent-cyan);
      color: var(--bg);
      box-shadow: 0 0 16px var(--glow-cyan-soft);
      text-shadow: none;
    }
    .roll-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .newgame-btn {
      border: 1px solid var(--accent-magenta);
      color: var(--accent-magenta);
      text-shadow: 0 0 8px var(--glow-magenta);
      display: none;
      margin-top: 0.5rem;
    }
    .newgame-btn:hover {
      background: var(--accent-magenta);
      color: var(--bg);
      box-shadow: 0 0 16px var(--glow-magenta);
      text-shadow: none;
    }

    .status {
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-top: 0.8rem;
      min-height: 1.2rem;
      line-height: 1.5;
    }

    .msg-snake { color: var(--accent-magenta); }
    .msg-ladder { color: var(--accent-green); }
    .msg-win { color: var(--accent-cyan); font-weight: 700; text-shadow: 0 0 10px var(--glow-cyan-soft); }

    .controls-hint {
      color: var(--text-dim);
      font-size: 0.65rem;
      margin-top: 1rem;
      letter-spacing: 0.06em;
    }

    .score-row {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 0.6rem;
      font-size: 0.7rem;
      color: var(--text-dim);
    }
  </style>
  <script>(function(){var t=localStorage.getItem('zero-theme');if(!t&&window.matchMedia('(prefers-color-scheme:light)').matches)t='light';if(t==='light')document.documentElement.setAttribute('data-theme','light')})()</script>
</head>
<body>
  <main>
    <a href="./" class="back">&lt; GAME LAB</a>
    <h1>SNAKES &amp; LADDERS</h1>
    <p class="subtitle">ROLL THE DICE, CLIMB LADDERS, DODGE SNAKES</p>

    <div class="info-bar">
      <span class="player-tag player-cyan">YOU: <span id="p1-pos">1</span></span>
      <span id="turn-indicator" style="color:var(--text-dim)">YOUR TURN</span>
      <span class="player-tag player-magenta">CPU: <span id="p2-pos">1</span></span>
    </div>

    <canvas id="board" width="500" height="500"></canvas>

    <div class="dice-display" id="dice-display">&#9858;</div>

    <button class="roll-btn" id="roll-btn" onclick="rollDice()">ROLL DICE</button>
    <button class="newgame-btn" id="newgame-btn" onclick="newGame()">NEW GAME</button>

    <div class="status" id="status">Tap roll to start</div>
    <div class="score-row">
      <span class="player-cyan">WINS: <span id="p1-wins">0</span></span>
      <span class="player-magenta">CPU WINS: <span id="p2-wins">0</span></span>
    </div>

    <div class="controls-hint">TAP ROLL OR PRESS SPACE &middot; R = NEW GAME</div>
  </main>

  <script>
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const COLS = 10, ROWS = 10, TOTAL = 100;
    let cellSize;

    // Colors
    const VOID = '#0a0a0f';
    const CELL_DARK = '#121218';
    const CELL_LIGHT = '#1a1a24';
    const MAGENTA = '#ff2d7b';
    const CYAN = '#00f0ff';
    const GREEN = '#39ff14';
    const PURPLE = '#9d4edd';
    const WHITE = '#e0e0e8';
    const DIM = '#7a7a90';
    const AMBER = '#ffb000';

    // Snakes (head -> tail, slide DOWN)
    const snakes = {
      98: 56,
      95: 33,
      87: 24,
      62: 19,
      64: 42,
      36: 6,
      49: 11,
      74: 53
    };

    // Ladders (bottom -> top, climb UP)
    const ladders = {
      2: 38,
      7: 14,
      8: 31,
      15: 44,
      21: 59,
      28: 76,
      51: 67,
      71: 91,
      78: 98,
      40: 79
    };

    // Game state
    let players = [
      { pos: 1, color: CYAN, name: 'YOU', wins: 0 },
      { pos: 1, color: MAGENTA, name: 'CPU', wins: 0 }
    ];
    let currentPlayer = 0;
    let rolling = false;
    let gameOver = false;
    let animating = false;
    let lastDice = 0;

    // Dice unicode faces
    const diceFaces = ['⚀','⚁','⚂','⚃','⚄','⚅'];

    function posToCoord(pos) {
      if (pos < 1) pos = 1;
      if (pos > 100) pos = 100;
      let p = pos - 1;
      let row = Math.floor(p / COLS);
      let col = p % COLS;
      // Even rows go left-to-right, odd rows right-to-left (snake board)
      if (row % 2 === 1) col = COLS - 1 - col;
      // Row 0 is at the bottom
      let drawRow = ROWS - 1 - row;
      return {
        x: col * cellSize + cellSize / 2,
        y: drawRow * cellSize + cellSize / 2
      };
    }

    function drawBoard() {
      const w = canvas.width;
      const h = canvas.height;
      cellSize = w / COLS;
      ctx.clearRect(0, 0, w, h);

      // Draw cells
      for (let i = 0; i < TOTAL; i++) {
        let row = Math.floor(i / COLS);
        let col = i % COLS;
        if (row % 2 === 1) col = COLS - 1 - col;
        let drawRow = ROWS - 1 - row;
        let x = col * cellSize;
        let y = drawRow * cellSize;

        ctx.fillStyle = (row + col) % 2 === 0 ? CELL_DARK : CELL_LIGHT;
        ctx.fillRect(x, y, cellSize, cellSize);

        // Cell number
        let num = i + 1;
        ctx.fillStyle = DIM;
        ctx.font = `${cellSize * 0.22}px 'JetBrains Mono', monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(num, x + cellSize / 2, y + 3);
      }

      // Draw grid lines
      ctx.strokeStyle = DIM + '40';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= COLS; i++) {
        ctx.beginPath();
        ctx.moveTo(i * cellSize, 0);
        ctx.lineTo(i * cellSize, h);
        ctx.stroke();
      }
      for (let i = 0; i <= ROWS; i++) {
        ctx.beginPath();
        ctx.moveTo(0, i * cellSize);
        ctx.lineTo(w, i * cellSize);
        ctx.stroke();
      }

      // Draw ladders
      ctx.lineWidth = 3;
      for (let bottom in ladders) {
        let top = ladders[bottom];
        let from = posToCoord(parseInt(bottom));
        let to = posToCoord(top);
        drawLadder(from, to);
      }

      // Draw snakes
      for (let head in snakes) {
        let tail = snakes[head];
        let from = posToCoord(parseInt(head));
        let to = posToCoord(tail);
        drawSnake(from, to);
      }

      // Draw players
      drawPlayers();
    }

    function drawLadder(from, to) {
      let dx = to.x - from.x;
      let dy = to.y - from.y;
      let len = Math.sqrt(dx * dx + dy * dy);
      let nx = -dy / len * 6;
      let ny = dx / len * 6;

      ctx.strokeStyle = GREEN;
      ctx.lineWidth = 2.5;
      ctx.shadowColor = GREEN;
      ctx.shadowBlur = 6;

      // Two rails
      ctx.beginPath();
      ctx.moveTo(from.x + nx, from.y + ny);
      ctx.lineTo(to.x + nx, to.y + ny);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(from.x - nx, from.y - ny);
      ctx.lineTo(to.x - nx, to.y - ny);
      ctx.stroke();

      // Rungs
      let rungs = Math.max(3, Math.floor(len / 30));
      ctx.lineWidth = 1.5;
      for (let i = 1; i < rungs; i++) {
        let t = i / rungs;
        let rx = from.x + dx * t;
        let ry = from.y + dy * t;
        ctx.beginPath();
        ctx.moveTo(rx + nx, ry + ny);
        ctx.lineTo(rx - nx, ry - ny);
        ctx.stroke();
      }

      ctx.shadowBlur = 0;
    }

    function drawSnake(from, to) {
      ctx.strokeStyle = MAGENTA;
      ctx.lineWidth = 3;
      ctx.shadowColor = MAGENTA;
      ctx.shadowBlur = 8;

      // Wavy snake body using bezier curves
      let dx = to.x - from.x;
      let dy = to.y - from.y;
      let len = Math.sqrt(dx * dx + dy * dy);
      let segments = Math.max(2, Math.floor(len / 40));

      ctx.beginPath();
      ctx.moveTo(from.x, from.y);

      for (let i = 0; i < segments; i++) {
        let t1 = (i + 0.5) / segments;
        let t2 = (i + 1) / segments;
        let mx = from.x + dx * t1;
        let my = from.y + dy * t1;
        let ex = from.x + dx * t2;
        let ey = from.y + dy * t2;

        // Perpendicular offset for waviness
        let nx = -dy / len;
        let ny = dx / len;
        let wave = (i % 2 === 0 ? 1 : -1) * 12;

        ctx.quadraticCurveTo(mx + nx * wave, my + ny * wave, ex, ey);
      }

      ctx.stroke();

      // Snake head (circle at start)
      ctx.fillStyle = MAGENTA;
      ctx.beginPath();
      ctx.arc(from.x, from.y, 5, 0, Math.PI * 2);
      ctx.fill();

      // Eyes on snake head
      ctx.fillStyle = VOID;
      ctx.beginPath();
      ctx.arc(from.x - 2, from.y - 2, 1.5, 0, Math.PI * 2);
      ctx.arc(from.x + 2, from.y - 2, 1.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.shadowBlur = 0;
    }

    function drawPlayers() {
      let offsets = [[-6, 0], [6, 0]];

      // If both on same cell, offset them
      let sameCell = players[0].pos === players[1].pos;

      for (let i = 0; i < players.length; i++) {
        let p = players[i];
        let coord = posToCoord(p.pos);
        let ox = sameCell ? offsets[i][0] : 0;
        let oy = sameCell ? offsets[i][1] : 0;
        let x = coord.x + ox;
        let y = coord.y + oy;
        let r = cellSize * 0.22;

        // Glow
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 12;

        // Outer ring
        ctx.strokeStyle = p.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.stroke();

        // Inner fill
        ctx.fillStyle = p.color + '60';
        ctx.beginPath();
        ctx.arc(x, y, r - 2, 0, Math.PI * 2);
        ctx.fill();

        // Label
        ctx.fillStyle = p.color;
        ctx.font = `bold ${cellSize * 0.18}px 'JetBrains Mono', monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(i === 0 ? 'Y' : 'C', x, y + 1);

        ctx.shadowBlur = 0;
      }
    }

    function setStatus(text, cls) {
      let el = document.getElementById('status');
      el.textContent = text;
      el.className = 'status' + (cls ? ' ' + cls : '');
    }

    function updateInfo() {
      document.getElementById('p1-pos').textContent = players[0].pos;
      document.getElementById('p2-pos').textContent = players[1].pos;
      document.getElementById('p1-wins').textContent = players[0].wins;
      document.getElementById('p2-wins').textContent = players[1].wins;

      let turnEl = document.getElementById('turn-indicator');
      if (gameOver) {
        turnEl.textContent = 'GAME OVER';
        turnEl.style.color = AMBER;
      } else if (currentPlayer === 0) {
        turnEl.textContent = 'YOUR TURN';
        turnEl.style.color = CYAN;
      } else {
        turnEl.textContent = 'CPU TURN';
        turnEl.style.color = MAGENTA;
      }
    }

    async function animateMove(playerIdx, from, to) {
      animating = true;
      let p = players[playerIdx];
      let step = from < to ? 1 : -1;
      let current = from;

      while (current !== to) {
        current += step;
        p.pos = current;
        drawBoard();
        updateInfo();
        await sleep(120);
      }
      animating = false;
    }

    async function animateSlide(playerIdx, from, to) {
      animating = true;
      let p = players[playerIdx];
      let fromCoord = posToCoord(from);
      let toCoord = posToCoord(to);
      let frames = 20;

      for (let f = 0; f <= frames; f++) {
        let t = f / frames;
        // Ease out
        t = 1 - (1 - t) * (1 - t);
        let x = fromCoord.x + (toCoord.x - fromCoord.x) * t;
        let y = fromCoord.y + (toCoord.y - fromCoord.y) * t;

        // Temporarily set position for drawing
        p.pos = f === frames ? to : from;
        drawBoard();

        // Draw the sliding player on top
        if (f < frames) {
          let r = cellSize * 0.22;
          ctx.shadowColor = p.color;
          ctx.shadowBlur = 16;
          ctx.strokeStyle = p.color;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.stroke();
          ctx.fillStyle = p.color + '60';
          ctx.beginPath();
          ctx.arc(x, y, r - 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = p.color;
          ctx.font = `bold ${cellSize * 0.18}px 'JetBrains Mono', monospace`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(playerIdx === 0 ? 'Y' : 'C', x, y + 1);
          ctx.shadowBlur = 0;
        }

        await sleep(25);
      }

      p.pos = to;
      drawBoard();
      updateInfo();
      animating = false;
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    function rollDiceValue() {
      return Math.floor(Math.random() * 6) + 1;
    }

    async function animateDice() {
      let display = document.getElementById('dice-display');
      let frames = 12;
      for (let i = 0; i < frames; i++) {
        let r = Math.floor(Math.random() * 6);
        display.textContent = diceFaces[r];
        await sleep(60);
      }
    }

    async function rollDice() {
      if (rolling || gameOver || animating) return;
      if (currentPlayer !== 0) return;

      rolling = true;
      document.getElementById('roll-btn').disabled = true;

      await doTurn(0);

      if (!gameOver) {
        // CPU turn
        await sleep(600);
        await doTurn(1);
      }

      if (!gameOver) {
        currentPlayer = 0;
        updateInfo();
        document.getElementById('roll-btn').disabled = false;
      }
      rolling = false;
    }

    async function doTurn(playerIdx) {
      currentPlayer = playerIdx;
      updateInfo();

      let dice = rollDiceValue();
      lastDice = dice;

      // Animate dice
      await animateDice();
      document.getElementById('dice-display').textContent = diceFaces[dice - 1];

      let p = players[playerIdx];
      let oldPos = p.pos;
      let newPos = oldPos + dice;

      if (playerIdx === 0) {
        setStatus(`You rolled a ${dice}`);
      } else {
        setStatus(`CPU rolled a ${dice}`);
      }

      // Can't go past 100
      if (newPos > 100) {
        await sleep(400);
        setStatus(playerIdx === 0 ? `Need exact roll to reach 100. Stay at ${oldPos}.` : `CPU needs exact roll. Stays at ${oldPos}.`);
        return;
      }

      // Animate step-by-step movement
      await animateMove(playerIdx, oldPos, newPos);
      await sleep(300);

      // Check for win at 100
      if (newPos === 100) {
        gameOver = true;
        p.wins++;
        let name = playerIdx === 0 ? 'You win!' : 'CPU wins!';
        setStatus(name + ' Reached square 100!', 'msg-win');
        updateInfo();
        document.getElementById('roll-btn').disabled = true;
        document.getElementById('newgame-btn').style.display = 'inline-block';
        return;
      }

      // Check for snake
      if (snakes[newPos]) {
        let dest = snakes[newPos];
        await sleep(300);
        setStatus((playerIdx === 0 ? 'Snake! ' : 'CPU hit a snake! ') + `Slide from ${newPos} to ${dest}`, 'msg-snake');
        await animateSlide(playerIdx, newPos, dest);
        p.pos = dest;
      }

      // Check for ladder
      if (ladders[newPos]) {
        let dest = ladders[newPos];
        await sleep(300);
        setStatus((playerIdx === 0 ? 'Ladder! ' : 'CPU found a ladder! ') + `Climb from ${newPos} to ${dest}`, 'msg-ladder');
        await animateSlide(playerIdx, newPos, dest);
        p.pos = dest;

        // Check for win after ladder
        if (p.pos === 100) {
          gameOver = true;
          p.wins++;
          let name = playerIdx === 0 ? 'You win!' : 'CPU wins!';
          setStatus(name + ' Reached square 100!', 'msg-win');
          updateInfo();
          document.getElementById('roll-btn').disabled = true;
          document.getElementById('newgame-btn').style.display = 'inline-block';
          return;
        }
      }

      updateInfo();
      await sleep(200);
    }

    function newGame() {
      players[0].pos = 1;
      players[1].pos = 1;
      currentPlayer = 0;
      gameOver = false;
      rolling = false;
      animating = false;
      lastDice = 0;
      document.getElementById('dice-display').textContent = '⚅';
      document.getElementById('roll-btn').disabled = false;
      document.getElementById('newgame-btn').style.display = 'none';
      setStatus('Tap roll to start');
      updateInfo();
      drawBoard();
    }

    // Resize canvas for crisp rendering
    function resizeCanvas() {
      let maxW = Math.min(500, window.innerWidth - 40);
      canvas.width = maxW;
      canvas.height = maxW;
      cellSize = maxW / COLS;
      drawBoard();
    }

    // Keyboard
    document.addEventListener('keydown', e => {
      if (e.key === ' ' || e.key === 'Spacebar') {
        e.preventDefault();
        rollDice();
      }
      if (e.key === 'r' || e.key === 'R') {
        if (gameOver) newGame();
      }
    });

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    updateInfo();
  </script>
</body>
</html>
