<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEON POP / ZERO game lab</title>
  <meta name="theme-color" content="#14102a">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared.css">
  <style>
    main {
      max-width: 620px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
      text-align: center;
      overflow-x: hidden;
      box-sizing: border-box;
    }

    .back {
      display: inline-block;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      margin-bottom: 1.5rem;
      text-align: left;
      width: 100%;
    }

    .back:hover {
      color: var(--accent-cyan);
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent-magenta);
      letter-spacing: 0.1em;
      margin-bottom: 0.4rem;
      text-shadow: 0 0 20px var(--glow-magenta);
    }

    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 1rem 0;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
    }

    .score-label {
      color: var(--text-dim);
    }

    .score-value {
      color: var(--accent-cyan);
      font-weight: 700;
      text-shadow: 0 0 8px var(--glow-cyan-soft);
    }

    .best-label {
      color: var(--text-dim);
    }

    .best-value {
      color: var(--accent-green);
      font-weight: 700;
    }

    .hover-info {
      color: var(--accent-magenta);
      font-size: 0.7rem;
      min-height: 1.2em;
      margin-bottom: 0.5rem;
      letter-spacing: 0.04em;
    }

    #grid-container {
      display: inline-block;
      border: 1px solid var(--border);
      padding: 2px;
      line-height: 0;
      cursor: pointer;
      max-width: 100%;
      box-sizing: border-box;
      touch-action: manipulation;
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 1.2rem;
    }

    .btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      padding: 0.5rem 1.2rem;
      min-height: 44px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      touch-action: manipulation;
    }

    .btn:hover {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }

    .btn.active {
      border-color: var(--accent-magenta);
      color: var(--accent-magenta);
    }

    .game-over-msg {
      color: var(--accent-magenta);
      font-size: 0.85rem;
      font-weight: 700;
      margin-top: 1rem;
      letter-spacing: 0.06em;
      text-shadow: 0 0 10px var(--glow-magenta);
      min-height: 1.4em;
    }

    .instructions {
      color: var(--text-dim);
      font-size: 0.65rem;
      line-height: 1.7;
      margin-top: 1.5rem;
      letter-spacing: 0.04em;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
      text-align: left;
    }

    .diff-bar {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .diff-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      padding: 0.5rem 1rem;
      min-height: 44px;
      min-width: 44px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      touch-action: manipulation;
    }

    .diff-btn:hover {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }

    .diff-btn.active {
      border-color: var(--accent-magenta);
      color: var(--accent-magenta);
    }
  </style>
  <script>(function(){var t=localStorage.getItem('zero-theme');if(!t&&window.matchMedia('(prefers-color-scheme:light)').matches)t='light';if(t==='light')document.documentElement.setAttribute('data-theme','light')})()</script>
</head>
<body>
  <main>
    <a href="./" class="back">&lt; GAME LAB</a>
    <h1>NEON POP</h1>

    <div class="diff-bar">
      <button class="diff-btn active" data-colors="4">4 COLORS</button>
      <button class="diff-btn" data-colors="5">5 COLORS</button>
      <button class="diff-btn" data-colors="6">6 COLORS</button>
    </div>

    <div class="info-bar">
      <span><span class="score-label">SCORE </span><span class="score-value" id="score">0</span></span>
      <span><span class="best-label">BEST </span><span class="best-value" id="best">0</span></span>
    </div>

    <div class="hover-info" id="hover-info">&nbsp;</div>

    <div id="grid-container">
      <canvas id="game"></canvas>
    </div>

    <div class="game-over-msg" id="game-over">&nbsp;</div>

    <div class="controls">
      <button class="btn" id="new-game">NEW GAME</button>
    </div>

    <div class="instructions">
      CLICK a group of 2+ matching blocks to pop them.<br>
      Bigger groups = more points: (n-1)&sup2; scoring.<br>
      Blocks fall down, empty columns shift left.<br>
      Clear the board for a 1000-point bonus.<br>
      No moves left? Game over.
    </div>
  </main>

  <script>
  (function() {
    'use strict';

    const COLS = 15;
    const ROWS = 10;
    const CELL = 36;
    const GAP = 2;
    const CELL_TOTAL = CELL + GAP;

    const COLORS_DARK = [
      '#ff2d7b', // magenta
      '#00f0ff', // cyan
      '#39ff14', // green
      '#9d4edd', // purple
      '#ffb000', // amber
      '#ff6ac1', // hot pink
    ];

    const COLORS_LIGHT = [
      '#cc1166', // deep magenta
      '#00717f', // depth cyan
      '#1a7a12', // forest green
      '#7b30b8', // deep purple
      '#8a6000', // deep amber
      '#b03585', // deep pink
    ];

    const GLOW_DARK = [
      'rgba(255,45,123,0.4)',
      'rgba(0,240,255,0.4)',
      'rgba(57,255,20,0.4)',
      'rgba(157,78,221,0.4)',
      'rgba(255,176,0,0.4)',
      'rgba(255,106,193,0.4)',
    ];

    const GLOW_LIGHT = [
      'rgba(204,17,102,0.25)',
      'rgba(0,113,127,0.25)',
      'rgba(26,122,18,0.25)',
      'rgba(123,48,184,0.25)',
      'rgba(138,96,0,0.25)',
      'rgba(176,53,133,0.25)',
    ];

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const hoverEl = document.getElementById('hover-info');
    const gameOverEl = document.getElementById('game-over');

    let grid = [];
    let score = 0;
    let best = parseInt(localStorage.getItem('neon-pop-best') || '0');
    let numColors = 4;
    let highlighted = [];
    let gameOver = false;
    let animating = false;

    bestEl.textContent = best;

    function isLight() {
      return document.documentElement.getAttribute('data-theme') === 'light';
    }

    function getColors() { return isLight() ? COLORS_LIGHT : COLORS_DARK; }
    function getGlows() { return isLight() ? GLOW_LIGHT : GLOW_DARK; }
    function getBg() { return isLight() ? '#f0eff5' : '#0a0a0f'; }
    function getCellBg() { return isLight() ? '#e4e3ec' : '#121218'; }
    function getBorder() { return isLight() ? '#c8c8d6' : '#7a7a90'; }

    function initCanvas() {
      canvas.width = COLS * CELL_TOTAL + GAP;
      canvas.height = ROWS * CELL_TOTAL + GAP;
    }

    function initGrid() {
      grid = [];
      for (let r = 0; r < ROWS; r++) {
        grid[r] = [];
        for (let c = 0; c < COLS; c++) {
          grid[r][c] = Math.floor(Math.random() * numColors);
        }
      }
      score = 0;
      gameOver = false;
      highlighted = [];
      scoreEl.textContent = '0';
      gameOverEl.innerHTML = '&nbsp;';
      hoverEl.innerHTML = '&nbsp;';
    }

    function findGroup(r, c) {
      if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return [];
      if (grid[r][c] === -1) return [];

      const color = grid[r][c];
      const visited = new Set();
      const group = [];
      const stack = [[r, c]];

      while (stack.length > 0) {
        const [cr, cc] = stack.pop();
        const key = cr * COLS + cc;
        if (visited.has(key)) continue;
        if (cr < 0 || cr >= ROWS || cc < 0 || cc >= COLS) continue;
        if (grid[cr][cc] !== color) continue;

        visited.add(key);
        group.push([cr, cc]);
        stack.push([cr - 1, cc], [cr + 1, cc], [cr, cc - 1], [cr, cc + 1]);
      }

      return group.length >= 2 ? group : [];
    }

    function removeGroup(group) {
      for (const [r, c] of group) {
        grid[r][c] = -1;
      }
    }

    function applyGravity() {
      for (let c = 0; c < COLS; c++) {
        let write = ROWS - 1;
        for (let r = ROWS - 1; r >= 0; r--) {
          if (grid[r][c] !== -1) {
            grid[write][c] = grid[r][c];
            if (write !== r) grid[r][c] = -1;
            write--;
          }
        }
        for (let r = write; r >= 0; r--) {
          grid[r][c] = -1;
        }
      }
    }

    function shiftColumns() {
      let write = 0;
      for (let c = 0; c < COLS; c++) {
        if (grid[ROWS - 1][c] !== -1) {
          if (write !== c) {
            for (let r = 0; r < ROWS; r++) {
              grid[r][write] = grid[r][c];
              grid[r][c] = -1;
            }
          }
          write++;
        }
      }
    }

    function hasMovesLeft() {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (grid[r][c] === -1) continue;
          const color = grid[r][c];
          if (r + 1 < ROWS && grid[r + 1][c] === color) return true;
          if (c + 1 < COLS && grid[r][c + 1] === color) return true;
        }
      }
      return false;
    }

    function isBoardClear() {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (grid[r][c] !== -1) return false;
        }
      }
      return true;
    }

    function countRemaining() {
      let count = 0;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (grid[r][c] !== -1) count++;
        }
      }
      return count;
    }

    function draw() {
      const colors = getColors();
      const glows = getGlows();
      const bg = getBg();
      const cellBg = getCellBg();

      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const highlightSet = new Set(highlighted.map(([r, c]) => r * COLS + c));

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const x = GAP + c * CELL_TOTAL;
          const y = GAP + r * CELL_TOTAL;

          if (grid[r][c] === -1) {
            ctx.fillStyle = cellBg;
            ctx.fillRect(x, y, CELL, CELL);
            continue;
          }

          const colorIdx = grid[r][c];
          const isHigh = highlightSet.has(r * COLS + c);

          if (isHigh) {
            ctx.shadowColor = glows[colorIdx];
            ctx.shadowBlur = 12;
            ctx.fillStyle = colors[colorIdx];
            ctx.fillRect(x, y, CELL, CELL);
            ctx.shadowBlur = 0;

            // Bright border on highlighted
            ctx.strokeStyle = colors[colorIdx];
            ctx.lineWidth = 2;
            ctx.strokeRect(x + 1, y + 1, CELL - 2, CELL - 2);
          } else {
            ctx.fillStyle = colors[colorIdx];
            ctx.globalAlpha = 0.7;
            ctx.fillRect(x, y, CELL, CELL);
            ctx.globalAlpha = 1.0;
          }
        }
      }
    }

    function getCellFromMouse(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const mx = (e.clientX - rect.left) * scaleX;
      const my = (e.clientY - rect.top) * scaleY;

      const c = Math.floor((mx - GAP) / CELL_TOTAL);
      const r = Math.floor((my - GAP) / CELL_TOTAL);

      if (r >= 0 && r < ROWS && c >= 0 && c < COLS) return [r, c];
      return null;
    }

    canvas.addEventListener('mousemove', function(e) {
      if (gameOver || animating) {
        highlighted = [];
        hoverEl.innerHTML = '&nbsp;';
        draw();
        return;
      }

      const cell = getCellFromMouse(e);
      if (!cell) {
        highlighted = [];
        hoverEl.innerHTML = '&nbsp;';
        draw();
        return;
      }

      const group = findGroup(cell[0], cell[1]);
      highlighted = group;

      if (group.length >= 2) {
        const pts = (group.length - 1) * (group.length - 1);
        hoverEl.textContent = group.length + ' blocks = +' + pts + ' points';
      } else {
        hoverEl.innerHTML = '&nbsp;';
      }

      draw();
    });

    canvas.addEventListener('mouseleave', function() {
      highlighted = [];
      hoverEl.innerHTML = '&nbsp;';
      draw();
    });

    canvas.addEventListener('click', function(e) {
      if (gameOver || animating) return;

      const cell = getCellFromMouse(e);
      if (!cell) return;

      const group = findGroup(cell[0], cell[1]);
      if (group.length < 2) return;

      animating = true;

      // Calculate score
      const pts = (group.length - 1) * (group.length - 1);
      score += pts;
      scoreEl.textContent = score;

      // Remove, gravity, shift
      removeGroup(group);
      highlighted = [];

      // Animate: brief flash then settle
      draw();

      setTimeout(function() {
        applyGravity();
        draw();

        setTimeout(function() {
          shiftColumns();
          draw();
          animating = false;

          // Check game state
          if (isBoardClear()) {
            score += 1000;
            scoreEl.textContent = score;
            gameOverEl.textContent = 'BOARD CLEARED! +1000 BONUS';
            gameOver = true;
          } else if (!hasMovesLeft()) {
            const remaining = countRemaining();
            gameOverEl.textContent = 'NO MOVES LEFT. ' + remaining + ' blocks remain.';
            gameOver = true;
          }

          if (gameOver && score > best) {
            best = score;
            bestEl.textContent = best;
            localStorage.setItem('neon-pop-best', best.toString());
          }
        }, 80);
      }, 80);
    });

    // New game button
    document.getElementById('new-game').addEventListener('click', function() {
      initGrid();
      draw();
    });

    // Difficulty buttons
    document.querySelectorAll('.diff-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.diff-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        numColors = parseInt(btn.dataset.colors);
        initGrid();
        draw();
      });
    });

    // Touch support
    canvas.addEventListener('touchstart', function(e) {
      e.preventDefault();
      if (gameOver || animating) return;

      const touch = e.touches[0];
      const cell = getCellFromMouse(touch);
      if (!cell) return;

      const group = findGroup(cell[0], cell[1]);
      highlighted = group;

      if (group.length >= 2) {
        const pts = (group.length - 1) * (group.length - 1);
        hoverEl.textContent = group.length + ' blocks = +' + pts + ' points';
      } else {
        hoverEl.innerHTML = '&nbsp;';
      }

      draw();
    }, { passive: false });

    canvas.addEventListener('touchend', function(e) {
      e.preventDefault();
      if (gameOver || animating) return;
      if (highlighted.length < 2) {
        highlighted = [];
        hoverEl.innerHTML = '&nbsp;';
        draw();
        return;
      }

      const pts = (highlighted.length - 1) * (highlighted.length - 1);
      score += pts;
      scoreEl.textContent = score;

      removeGroup(highlighted);
      highlighted = [];
      draw();

      animating = true;
      setTimeout(function() {
        applyGravity();
        draw();
        setTimeout(function() {
          shiftColumns();
          draw();
          animating = false;

          if (isBoardClear()) {
            score += 1000;
            scoreEl.textContent = score;
            gameOverEl.textContent = 'BOARD CLEARED! +1000 BONUS';
            gameOver = true;
          } else if (!hasMovesLeft()) {
            const remaining = countRemaining();
            gameOverEl.textContent = 'NO MOVES LEFT. ' + remaining + ' blocks remain.';
            gameOver = true;
          }

          if (gameOver && score > best) {
            best = score;
            bestEl.textContent = best;
            localStorage.setItem('neon-pop-best', best.toString());
          }
        }, 80);
      }, 80);
    }, { passive: false });

    // Init
    initCanvas();
    initGrid();
    draw();
  })();
  </script>
</body>
</html>
