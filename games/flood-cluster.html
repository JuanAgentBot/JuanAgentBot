<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLOOD CLUSTER / ZERO game lab</title>
  <meta name="theme-color" content="#14102a">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared.css">
  <style>
    main {
      max-width: 520px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      text-align: center;
    }

    .back {
      display: inline-block;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      margin-bottom: 1.5rem;
      text-align: left;
      width: 100%;
    }
    .back:hover { color: var(--accent-cyan); }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent-purple);
      letter-spacing: 0.12em;
      margin-bottom: 0.3rem;
      text-shadow: 0 0 20px rgba(157, 78, 221, 0.5);
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .controls button {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      padding: 0.3rem 0.8rem;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: border-color 0.2s, color 0.2s;
    }
    .controls button:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }
    .controls button.active { border-color: var(--accent-purple); color: var(--accent-purple); }

    .cluster-controls {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .cluster-controls button {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      padding: 0.25rem 0.6rem;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: border-color 0.2s, color 0.2s;
    }
    .cluster-controls button:hover { border-color: var(--accent-purple); color: var(--accent-purple); }
    .cluster-controls button.active { border-color: var(--accent-magenta); color: var(--accent-magenta); }

    .stats {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1rem;
      font-size: 0.75rem;
    }

    .stat-label { color: var(--text-dim); letter-spacing: 0.08em; }
    .stat-value { color: var(--accent-cyan); font-weight: 700; text-shadow: 0 0 8px var(--glow-cyan-soft); }
    .stat-value.warn { color: var(--accent-magenta); text-shadow: 0 0 8px var(--glow-magenta); }

    #board {
      display: inline-grid;
      gap: 1px;
      border: 1px solid var(--border);
      margin-bottom: 1rem;
      background: var(--border);
    }

    .cell {
      width: 100%;
      aspect-ratio: 1;
      transition: background-color 0.12s ease-out;
    }

    .cell.wave {
      animation: clusterWave 0.4s ease-out;
    }

    @keyframes clusterWave {
      0% { transform: scale(1) rotate(0deg); filter: brightness(1); }
      30% { transform: scale(1.2) rotate(3deg); filter: brightness(1.6); }
      60% { transform: scale(1.05) rotate(-1deg); filter: brightness(1.2); }
      100% { transform: scale(1) rotate(0deg); filter: brightness(1); }
    }

    .color-picker {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 1.2rem;
    }

    .color-btn {
      width: 40px;
      height: 40px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      padding: 0;
    }
    .color-btn:hover { transform: scale(1.15); }
    .color-btn.current { border-color: var(--text-bright); box-shadow: 0 0 12px rgba(224, 224, 232, 0.3); }
    .color-btn.disabled { opacity: 0.4; cursor: default; transform: none !important; }

    .message {
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
      min-height: 1.4em;
    }
    .message.win { color: var(--accent-green); text-shadow: 0 0 10px rgba(57, 255, 20, 0.4); }
    .message.lose { color: var(--accent-magenta); text-shadow: 0 0 10px var(--glow-magenta); }

    .best { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 1rem; }
    .best span { color: var(--accent-green); text-shadow: 0 0 6px rgba(57, 255, 20, 0.3); }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      margin-bottom: 1rem;
      overflow: hidden;
    }
    .progress-fill { height: 100%; background: var(--accent-cyan); transition: width 0.3s; box-shadow: 0 0 8px var(--glow-cyan-soft); }
    .progress-fill.high { background: var(--accent-magenta); box-shadow: 0 0 8px var(--glow-magenta); }

    .help {
      color: var(--text-dim);
      font-size: 0.65rem;
      line-height: 1.6;
      letter-spacing: 0.04em;
      margin-top: 1.5rem;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }

    .variant-nav {
      margin-top: 1rem;
      font-size: 0.65rem;
      letter-spacing: 0.06em;
    }
    .variant-nav a { color: var(--accent-purple); text-decoration: none; transition: color 0.2s; }
    .variant-nav a:hover { color: var(--accent-cyan); }

    @media (max-width: 400px) {
      .color-btn { width: 32px; height: 32px; }
    }
  </style>
  <script>(function(){var t=localStorage.getItem('zero-theme');if(!t&&window.matchMedia('(prefers-color-scheme:light)').matches)t='light';if(t==='light')document.documentElement.setAttribute('data-theme','light')})()</script>
</head>
<body>
  <main>
    <a href="./" class="back">&lt; GAME LAB</a>
    <h1>FLOOD CLUSTER</h1>
    <p class="subtitle">ORGANIC BLOBS &middot; ADJUSTABLE CLUSTER SIZE</p>

    <div class="controls">
      <button class="active" data-size="10">10x10</button>
      <button data-size="14">14x14</button>
      <button data-size="18">18x18</button>
      <button id="new-btn">NEW GAME</button>
    </div>

    <div class="cluster-controls">
      <span style="color: var(--text-dim); font-size: 0.65rem; letter-spacing: 0.06em; align-self: center;">CLUSTERS:</span>
      <button class="active" data-cluster="small">SMALL</button>
      <button data-cluster="medium">MEDIUM</button>
      <button data-cluster="large">LARGE</button>
    </div>

    <div class="stats">
      <div><span class="stat-label">MOVES </span><span class="stat-value" id="moves">0</span><span class="stat-label"> / </span><span class="stat-value" id="max-moves">25</span></div>
      <div><span class="stat-label">FILLED </span><span class="stat-value" id="filled">0%</span></div>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

    <div id="board"></div>

    <div class="color-picker" id="picker"></div>

    <div class="message" id="message"></div>
    <div class="best" id="best-display"></div>

    <div class="variant-nav">
      <a href="flood.html">CLASSIC</a> &middot;
      <a href="flood-tiny.html">TINY</a> &middot;
      <a href="flood-mega.html">MEGA</a> &middot;
      <a href="flood-lava.html">LAVA</a> &middot;
      <a href="flood-ice.html">ICE</a>
    </div>

    <div class="help">
      CELLS FORM ORGANIC CLUSTERS INSTEAD OF RANDOM NOISE<br>
      BIGGER CLUSTERS = FEWER MOVES NEEDED, BUT TIGHTER LIMITS<br>
      KEYS 1-6 TO PICK COLORS &middot; N FOR NEW GAME
    </div>
  </main>

  <script>
    const COLORS = ['#ff2d7b', '#00f0ff', '#39ff14', '#9d4edd', '#ffb000', '#ff6ac1'];
    const COLOR_NAMES = ['MAGENTA', 'CYAN', 'GREEN', 'PURPLE', 'AMBER', 'PINK'];

    // Grid size -> { small, medium, large } cluster move limits
    const SIZES = {
      10: { small: 25, medium: 20, large: 16 },
      14: { small: 32, medium: 26, large: 20 },
      18: { small: 42, medium: 34, large: 26 }
    };

    // Cluster size = how many seeds grow into blobs
    const CLUSTER_SEEDS = {
      small: 0.7,   // 70% of cells as seeds -> small clusters (close to random)
      medium: 0.3,  // 30% seeds -> medium blobs
      large: 0.12   // 12% seeds -> big blobs
    };

    const WAVE_DELAY = 28;

    let gridSize = 10;
    let clusterMode = 'small';
    let maxMoves = 25;
    let grid = [];
    let moves = 0;
    let gameOver = false;
    let animating = false;
    let best = {};

    const boardEl = document.getElementById('board');
    const pickerEl = document.getElementById('picker');
    const movesEl = document.getElementById('moves');
    const maxMovesEl = document.getElementById('max-moves');
    const filledEl = document.getElementById('filled');
    const messageEl = document.getElementById('message');
    const bestEl = document.getElementById('best-display');
    const progressEl = document.getElementById('progress');

    try { best = JSON.parse(localStorage.getItem('zero-flood-cluster-best') || '{}'); } catch(e) { best = {}; }
    function saveBest() { localStorage.setItem('zero-flood-cluster-best', JSON.stringify(best)); }

    function generateClusteredGrid() {
      const size = gridSize;
      const numColors = COLORS.length;
      const seedRate = CLUSTER_SEEDS[clusterMode];

      // Start with empty grid
      grid = Array.from({ length: size }, () => new Array(size).fill(-1));

      // Place seeds
      const seeds = [];
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          if (Math.random() < seedRate) {
            const color = Math.floor(Math.random() * numColors);
            grid[r][c] = color;
            seeds.push({ r, c, color });
          }
        }
      }

      // If no seeds, place at least one
      if (seeds.length === 0) {
        const color = Math.floor(Math.random() * numColors);
        grid[0][0] = color;
        seeds.push({ r: 0, c: 0, color });
      }

      // Grow seeds outward using BFS (shuffled for organic shapes)
      const queue = [...seeds];
      // Shuffle queue for organic growth
      for (let i = queue.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [queue[i], queue[j]] = [queue[j], queue[i]];
      }

      let qi = 0;
      while (qi < queue.length) {
        const { r, c, color } = queue[qi];
        qi++;

        const neighbors = [[r-1,c],[r+1,c],[r,c-1],[r,c+1]];
        // Shuffle neighbors for organic shapes
        for (let i = neighbors.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [neighbors[i], neighbors[j]] = [neighbors[j], neighbors[i]];
        }

        for (const [nr, nc] of neighbors) {
          if (nr >= 0 && nr < size && nc >= 0 && nc < size && grid[nr][nc] === -1) {
            grid[nr][nc] = color;
            queue.push({ r: nr, c: nc, color });
          }
        }
      }

      // Fill any remaining -1 cells (shouldn't happen, but safety)
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          if (grid[r][c] === -1) grid[r][c] = Math.floor(Math.random() * numColors);
        }
      }
    }

    function init() {
      moves = 0;
      gameOver = false;
      animating = false;
      messageEl.textContent = '';
      messageEl.className = 'message';
      maxMoves = SIZES[gridSize][clusterMode];

      generateClusteredGrid();

      renderBoard(); renderPicker(); updateStats(); updateBestDisplay();
    }

    function renderBoard() {
      boardEl.innerHTML = '';
      boardEl.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
      const cellSize = Math.min(Math.floor((Math.min(480, window.innerWidth - 48)) / gridSize), 36);
      boardEl.style.width = (cellSize * gridSize + gridSize - 1) + 'px';
      for (let r = 0; r < gridSize; r++) {
        for (let c = 0; c < gridSize; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.style.backgroundColor = COLORS[grid[r][c]];
          cell.style.width = cellSize + 'px';
          cell.style.height = cellSize + 'px';
          boardEl.appendChild(cell);
        }
      }
    }

    function renderPicker() {
      pickerEl.innerHTML = '';
      const cur = grid[0][0];
      COLORS.forEach((color, i) => {
        const btn = document.createElement('button');
        btn.className = 'color-btn';
        if (i === cur) btn.classList.add('current');
        if (animating) btn.classList.add('disabled');
        btn.style.backgroundColor = color;
        btn.title = COLOR_NAMES[i] + ' [' + (i + 1) + ']';
        btn.addEventListener('click', () => pickColor(i));
        pickerEl.appendChild(btn);
      });
    }

    async function pickColor(ci) {
      if (gameOver || animating) return;
      const cur = grid[0][0];
      if (ci === cur) return;
      moves++;
      animating = true;
      renderPicker();
      await floodAnimated(cur, ci);
      animating = false;
      renderPicker(); updateStats();
      const pct = getFilledPercent();
      if (pct === 100) {
        gameOver = true;
        messageEl.textContent = 'CLUSTERS CLEARED IN ' + moves + ' MOVES';
        messageEl.className = 'message win';
        const key = gridSize + '-' + clusterMode;
        if (!best[key] || moves < best[key]) { best[key] = moves; saveBest(); updateBestDisplay(); messageEl.textContent += ' — NEW BEST!'; }
      } else if (moves >= maxMoves) {
        gameOver = true;
        messageEl.textContent = 'OUT OF MOVES — ' + pct + '% FILLED';
        messageEl.className = 'message lose';
      }
    }

    async function floodAnimated(oldColor, newColor) {
      const visited = Array.from({ length: gridSize }, () => new Array(gridSize).fill(false));
      const rings = [];
      const queue = [[0, 0, 0]];
      visited[0][0] = true;
      while (queue.length > 0) {
        const [r, c, dist] = queue.shift();
        if (grid[r][c] === oldColor) {
          if (!rings[dist]) rings[dist] = [];
          rings[dist].push({ r, c });
          for (const [nr, nc] of [[r-1,c],[r+1,c],[r,c-1],[r,c+1]]) {
            if (nr >= 0 && nr < gridSize && nc >= 0 && nc < gridSize && !visited[nr][nc]) {
              visited[nr][nc] = true;
              if (grid[nr][nc] === oldColor) queue.push([nr, nc, dist + 1]);
            }
          }
        }
      }
      for (const ring of rings) {
        if (!ring) continue;
        for (const { r, c } of ring) {
          grid[r][c] = newColor;
          const cell = boardEl.children[r * gridSize + c];
          if (cell) {
            cell.style.backgroundColor = COLORS[newColor];
            cell.classList.remove('wave');
            void cell.offsetWidth;
            cell.classList.add('wave');
          }
        }
        await delay(WAVE_DELAY);
      }
      await delay(350);
      boardEl.querySelectorAll('.wave').forEach(c => c.classList.remove('wave'));
    }

    function getFilledPercent() {
      const t = grid[0][0];
      const visited = Array.from({ length: gridSize }, () => new Array(gridSize).fill(false));
      const stack = [[0, 0]];
      visited[0][0] = true;
      let count = 0;
      while (stack.length > 0) {
        const [r, c] = stack.pop();
        if (grid[r][c] === t) {
          count++;
          for (const [nr, nc] of [[r-1,c],[r+1,c],[r,c-1],[r,c+1]]) {
            if (nr >= 0 && nr < gridSize && nc >= 0 && nc < gridSize && !visited[nr][nc]) {
              visited[nr][nc] = true;
              if (grid[nr][nc] === t) stack.push([nr, nc]);
            }
          }
        }
      }
      return Math.round((count / (gridSize * gridSize)) * 100);
    }

    function updateStats() {
      movesEl.textContent = moves;
      maxMovesEl.textContent = maxMoves;
      movesEl.classList.toggle('warn', moves > maxMoves * 0.75);
      const pct = getFilledPercent();
      filledEl.textContent = pct + '%';
      progressEl.style.width = pct + '%';
      progressEl.classList.toggle('high', moves > maxMoves * 0.75 && pct < 80);
    }

    function updateBestDisplay() {
      const key = gridSize + '-' + clusterMode;
      if (best[key]) bestEl.innerHTML = 'BEST ' + gridSize + 'x' + gridSize + ' ' + clusterMode.toUpperCase() + ': <span>' + best[key] + ' MOVES</span>';
      else bestEl.textContent = '';
    }

    function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

    // Size buttons
    document.querySelectorAll('[data-size]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (animating) return;
        document.querySelectorAll('[data-size]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        gridSize = parseInt(btn.dataset.size);
        init();
      });
    });

    // Cluster size buttons
    document.querySelectorAll('[data-cluster]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (animating) return;
        document.querySelectorAll('[data-cluster]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        clusterMode = btn.dataset.cluster;
        init();
      });
    });

    document.getElementById('new-btn').addEventListener('click', () => { if (!animating) init(); });

    document.addEventListener('keydown', (e) => {
      if (e.key >= '1' && e.key <= '6') { e.preventDefault(); pickColor(parseInt(e.key) - 1); }
      else if (e.key === 'n' || e.key === 'N') { e.preventDefault(); if (!animating) init(); }
    });

    window.addEventListener('resize', () => { if (grid.length > 0 && !animating) renderBoard(); });

    init();
  </script>
  <script src="../theme-toggle.js"></script>
</body>
</html>
