  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg, #0a0a0f);
      color: var(--text-bright, #e0e0e8);
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;

    .top-bar {

    }
    .top-bar a:hover { color: var(--accent-cyan, #00f0ff); }
    .game-title {

    }
    @media (max-width: 480px) {
      .top-bar { padding: 0.5rem 0.6rem; }
      .game-title { font-size: 0.7rem; }
      .top-bar a { font-size: 0.6rem; }
      #ui { top: 42px; gap: 0.6rem; padding: 0.3rem; }
      .stat-label { font-size: 0.45rem; }
      .stat-val { font-size: 1rem; }
      #overlay h2 { font-size: 1.2rem; }
      #overlay p { font-size: 0.65rem; max-width: 280px; }
      #overlay .final-score { font-size: 2rem; }
      #overlay .final-stats { font-size: 0.6rem; }
      .btn { font-size: 0.7rem; padding: 0.7rem 2rem; min-height: 44px; }
      .controls-hint { font-size: 0.55rem; }
    }
    .stat-val.score { color: var(--accent-cyan, #00f0ff); }
    .stat-val.shots { color: var(--accent-green, #39ff14); }
    .stat-val.streak { color: var(--accent-magenta, #ff2d7b); }
    .stat-val.best { color: var(--accent-purple, #9d4edd); }
    canvas {
      display: block;
      width: 100%;
      height: calc(100vh - 42px);
      touch-action: none;
    }
    #msg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-shadow: 0 0 30px currentColor;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10,10,15,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }
    #overlay.hidden { display: none; }
    #overlay h2 {
      color: var(--accent-magenta, #ff2d7b);
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      margin-bottom: 1rem;
      text-shadow: 0 0 20px rgba(255,45,123,0.5);
    }
    #overlay p {
      color: var(--text-muted, #7a7a90);
      font-size: 0.75rem;
      line-height: 1.7;
      text-align: center;
      max-width: 340px;
    }
    #overlay .final-score {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--accent-cyan, #00f0ff);
      text-shadow: 0 0 30px rgba(0,240,255,0.5);
      margin: 1rem 0;
    }
    #overlay .final-stats {
      color: var(--text-dim, #7a7a90);
      font-size: 0.7rem;
      margin-bottom: 1.5rem;
    }
    .btn {
      background: transparent;
      color: var(--accent-cyan, #00f0ff);
      border: 1px solid var(--accent-cyan, #00f0ff);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 0.6rem 2rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }
    .btn:hover {
      background: var(--accent-cyan, #00f0ff);
      color: var(--bg, #0a0a0f);
      box-shadow: 0 0 20px rgba(0,240,255,0.3);
    }
    .controls-hint {

    }
  </style>
  <script>(function(){var t=localStorage.getItem('zero-theme');if(!t&&window.matchMedia('(prefers-color-scheme:light)').matches)t='light';if(t==='light')document.documentElement.setAttribute('data-theme','light')})()</script>

<body>
  <div class="top-bar">
    <a href="./">&lt; GAME LAB</a>
    <div class="game-title">NEON BASKETBALL</div>
    <div style="width:70px"></div>
  </div>
  <div id="ui">
    <div class="stat"><div class="stat-label">SCORE</div><div class="stat-val score" id="score">0</div></div>
    <div class="stat"><div class="stat-label">SHOTS</div><div class="stat-val shots" id="shots">0 / 20</div></div>
    <div class="stat"><div class="stat-label">STREAK</div><div class="stat-val streak" id="streak">0</div></div>
    <div class="stat"><div class="stat-label">BEST</div><div class="stat-val best" id="best">0</div></div>
  </div>
  <canvas id="c"></canvas>
  <div id="msg"></div>
  <div id="overlay">
    <h2>NEON BASKETBALL</h2>
    <p>Drag from the ball to aim.<br>Release to shoot.<br>Longer drag = more power.<br><br>Score from different spots.<br>Swishes and streaks earn bonus points.<br>20 shots per round.</p>
    <div class="controls-hint">DRAG FROM BALL TO SHOOT</div>
    <button class="btn" id="startBtn">START</button>
  </div>
  <script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const msgEl = document.getElementById('msg');
const overlayEl = document.getElementById('overlay');
const scoreEl = document.getElementById('score');
const shotsEl = document.getElementById('shots');
const streakEl = document.getElementById('streak');
const bestEl = document.getElementById('best');

// Colors
const VOID = '#0a0a0f';
const MAGENTA = '#ff2d7b';
const CYAN = '#00f0ff';
const GREEN = '#39ff14';
const PURPLE = '#9d4edd';
const WHITE = '#e0e0e8';
const DIM = '#7a7a90';

// Game state
let W, H;
let score = 0, totalShots = 0, maxShots = 20, curStreak = 0, bestScore = 0;
let gameActive = false;
let ball = null;
let hoop = null;
let dragging = false;
let dragStart = {x:0, y:0};
let dragEnd = {x:0, y:0};
let particles = [];
let trails = [];
let shotResult = null; // {text, color, timer}
let ballLanded = false;
let waitingForNextShot = false;
let nextShotTimer = 0;
let backboard = null;

// Hoop positions (relative to canvas)
let hoopPositions = [];

// Load best score
bestScore = parseInt(localStorage.getItem('neon-basketball-best') || '0');

function resize() {
  const rect = canvas.getBoundingClientRect();
  W = canvas.width = rect.width * devicePixelRatio;
  H = canvas.height = rect.height * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  setupPositions();
}

function setupPositions() {
  const w = W / devicePixelRatio;
  const h = H / devicePixelRatio;
  // Hoop is on the right side
  const hoopX = w * 0.72;
  const hoopY = h * 0.38;
  const scale = Math.min(w / 400, 1.2);
  const rimWidth = Math.max(40, 50 * scale);
  
  hoop = {
    x: hoopX,
    y: hoopY,
    rimWidth: rimWidth,
    rimLeft: hoopX - rimWidth/2,
    rimRight: hoopX + rimWidth/2,
    rimThickness: 4,
    netDepth: 40,
    backboardX: hoopX + rimWidth/2 + 3,
    backboardTop: hoopY - 55,
    backboardBottom: hoopY + 20,
    backboardThickness: 4
  };
  
  // Ball start positions (different distances)
  const groundY = h * 0.82;
  hoopPositions = [
    {x: w * 0.18, y: groundY, label: 'CLOSE', points: 1},
    {x: w * 0.12, y: groundY, label: 'MID', points: 2},
    {x: w * 0.06, y: groundY, label: 'LONG', points: 3},
  ];
}

function newBall() {
  const w = W / devicePixelRatio;
  const h = H / devicePixelRatio;
  const scale = Math.min(w / 400, 1.2);
  const posIdx = totalShots < 7 ? 0 : totalShots < 14 ? 1 : 2;
  const pos = hoopPositions[posIdx];
  ball = {
    x: pos.x,
    y: pos.y,
    vx: 0,
    vy: 0,
    r: Math.max(10, 12 * scale),
    moving: false,
    scored: false,
    missed: false,
    points: pos.points,
    label: pos.label,
    trail: []
  };
  ballLanded = false;
  waitingForNextShot = false;
}

function shoot(power, angle) {
  if (!ball || ball.moving) return;
  const maxPower = 22;
  const p = Math.min(power, maxPower);
  ball.vx = Math.cos(angle) * p;
  ball.vy = Math.sin(angle) * p;
  ball.moving = true;
  totalShots++;
  updateUI();
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.015 + Math.random() * 0.02,
      color,
      size: 2 + Math.random() * 3
    });
  }
}

function showMessage(text, color, duration) {
  shotResult = {text, color, timer: duration || 60};
}

function checkHoopCollision() {
  if (!ball || !ball.moving || ball.scored || ball.missed) return;
  
  const bx = ball.x, by = ball.y, br = ball.r;
  const h = hoop;
  
  // Backboard collision
  if (bx + br > h.backboardX && bx - br < h.backboardX + h.backboardThickness) {
    if (by > h.backboardTop && by < h.backboardBottom) {
      ball.x = h.backboardX - br;
      ball.vx = -ball.vx * 0.6;
      spawnParticles(h.backboardX, by, DIM, 5);
    }
  }
  
  // Rim collision (left and right rim as circles)
  const rimR = 5;
  const rimPoints = [
    {x: h.rimLeft, y: h.y},
    {x: h.rimRight, y: h.y}
  ];
  
  for (const rp of rimPoints) {
    const dx = ball.x - rp.x;
    const dy = ball.y - rp.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < br + rimR) {
      // Bounce off rim
      const nx = dx / dist;
      const ny = dy / dist;
      const dot = ball.vx * nx + ball.vy * ny;
      ball.vx -= 1.6 * dot * nx;
      ball.vy -= 1.6 * dot * ny;
      ball.vx *= 0.7;
      ball.vy *= 0.7;
      // Push out
      const overlap = br + rimR - dist;
      ball.x += nx * overlap;
      ball.y += ny * overlap;
      spawnParticles(rp.x, rp.y, MAGENTA, 8);
    }
  }
  
  // Check if ball passes through hoop (scoring)
  if (ball.vy > 0 && by > h.y - 5 && by < h.y + 15) {
    if (bx > h.rimLeft + 8 && bx < h.rimRight - 8) {
      // Score!
      ball.scored = true;
      const isSwish = !ball.hitRim;
      let pts = ball.points;
      curStreak++;
      if (isSwish) {
        pts *= 2;
        showMessage('SWISH! +' + pts, CYAN);
        spawnParticles(ball.x, ball.y, CYAN, 30);
      } else {
        showMessage('+' + pts, GREEN);
        spawnParticles(ball.x, ball.y, GREEN, 20);
      }
      if (curStreak >= 3) {
        pts += curStreak;
        showMessage('STREAK x' + curStreak + '! +' + pts, MAGENTA);
        spawnParticles(ball.x, ball.y, MAGENTA, 25);
      }
      score += pts;
      updateUI();
    }
  }
  
  // Check if ball went below hoop and past it without scoring
  if (by > hoop.y + 60 && !ball.scored) {
    ball.missed = true;
    curStreak = 0;
    showMessage('MISS', DIM);
    updateUI();
  }
}

function updateUI() {
  scoreEl.textContent = score;
  shotsEl.textContent = totalShots + ' / ' + maxShots;
  streakEl.textContent = curStreak;
  bestEl.textContent = bestScore;
}

function endGame() {
  gameActive = false;
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('neon-basketball-best', bestScore);
  }
  updateUI();
  
  const accuracy = totalShots > 0 ? Math.round((score > 0 ? 1 : 0) * 100) : 0;
  overlayEl.classList.remove('hidden');
  overlayEl.innerHTML = `
    <h2>GAME OVER</h2>
    <div class="final-score">${score}</div>
    <div class="final-stats">SHOTS: ${totalShots} &nbsp; BEST STREAK: ${curStreak} &nbsp; BEST: ${bestScore}</div>
    <button class="btn" id="startBtn">PLAY AGAIN</button>
  `;
  document.getElementById('startBtn').addEventListener('click', startGame);
}

function startGame() {
  score = 0;
  totalShots = 0;
  curStreak = 0;
  particles = [];
  trails = [];
  shotResult = null;
  gameActive = true;
  overlayEl.classList.add('hidden');
  newBall();
  updateUI();
}

// Physics
const GRAVITY = 0.45;
const GROUND_BOUNCE = 0.5;

function update() {
  if (!gameActive || !ball) return;
  
  const w = W / devicePixelRatio;
  const h = H / devicePixelRatio;
  const groundY = h * 0.82;
  
  if (ball.moving) {
    // Trail
    ball.trail.push({x: ball.x, y: ball.y, life: 1});
    if (ball.trail.length > 20) ball.trail.shift();
    
    ball.vy += GRAVITY;
    ball.x += ball.vx;
    ball.y += ball.vy;
    
    // Ground bounce
    if (ball.y + ball.r > groundY) {
      ball.y = groundY - ball.r;
      ball.vy = -ball.vy * GROUND_BOUNCE;
      ball.vx *= 0.85;
      if (Math.abs(ball.vy) < 1) {
        ball.vy = 0;
        ball.vx = 0;
        ballLanded = true;
      }
    }
    
    // Walls
    if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx = -ball.vx * 0.5; }
    if (ball.x + ball.r > w) { ball.x = w - ball.r; ball.vx = -ball.vx * 0.5; }
    
    // Ceiling
    if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy = -ball.vy * 0.5; }
    
    checkHoopCollision();
    
    // Update trail life
    for (const t of ball.trail) t.life -= 0.05;
    ball.trail = ball.trail.filter(t => t.life > 0);
    
    // Check if ball stopped or went off screen
    if (ballLanded || ball.x > w + 50 || ball.y > h + 50) {
      if (!ball.scored && !ball.missed) {
        ball.missed = true;
        curStreak = 0;
        showMessage('MISS', DIM);
        updateUI();
      }
      waitingForNextShot = true;
      nextShotTimer = 40;
    }
  }
  
  if (waitingForNextShot) {
    nextShotTimer--;
    if (nextShotTimer <= 0) {
      if (totalShots >= maxShots) {
        endGame();
        return;
      }
      newBall();
    }
  }
  
  // Update particles
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05;
    p.life -= p.decay;
  }
  particles = particles.filter(p => p.life > 0);
  
  // Update shot result message
  if (shotResult) {
    shotResult.timer--;
    if (shotResult.timer <= 0) shotResult = null;
  }
}

function draw() {
  const w = W / devicePixelRatio;
  const h = H / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);
  
  // Background
  const isDark = !document.documentElement.getAttribute('data-theme') || document.documentElement.getAttribute('data-theme') !== 'light';
  ctx.fillStyle = isDark ? VOID : '#f0eff5';
  ctx.fillRect(0, 0, w, h);
  
  const groundY = h * 0.82;
  
  // Court floor
  ctx.strokeStyle = DIM;
  ctx.lineWidth = 1;
  ctx.setLineDash([8, 6]);
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(w, groundY);
  ctx.stroke();
  ctx.setLineDash([]);
  
  // Three-point line (arc)
  ctx.strokeStyle = isDark ? 'rgba(122,122,144,0.3)' : 'rgba(122,122,144,0.4)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.arc(hoop.x, groundY, w * 0.45, Math.PI, 0, true);
  ctx.stroke();
  ctx.setLineDash([]);
  
  // Distance markers
  const fontScale = Math.min(w / 400, 1.2);
  for (const pos of hoopPositions) {
    ctx.fillStyle = DIM;
    ctx.font = Math.max(8, Math.round(9 * fontScale)) + 'px "JetBrains Mono"';
    ctx.textAlign = 'center';
    ctx.fillText(pos.label, pos.x, groundY + 16);
    ctx.fillText(pos.points + 'PT', pos.x, groundY + 28);
  }
  
  // Backboard
  ctx.fillStyle = isDark ? '#2a2a3a' : '#c8c8d6';
  ctx.fillRect(hoop.backboardX, hoop.backboardTop, hoop.backboardThickness, hoop.backboardBottom - hoop.backboardTop);
  ctx.strokeStyle = DIM;
  ctx.lineWidth = 1;
  ctx.strokeRect(hoop.backboardX, hoop.backboardTop, hoop.backboardThickness, hoop.backboardBottom - hoop.backboardTop);
  
  // Pole
  ctx.fillStyle = isDark ? '#1a1a2a' : '#c0c0d0';
  ctx.fillRect(hoop.backboardX + 1, hoop.backboardBottom, 3, groundY - hoop.backboardBottom);
  
  // Net (simple lines)
  const netSegments = 6;
  ctx.strokeStyle = isDark ? 'rgba(224,224,232,0.2)' : 'rgba(60,60,80,0.2)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= netSegments; i++) {
    const t = i / netSegments;
    const topX = hoop.rimLeft + t * hoop.rimWidth;
    const bottomX = hoop.rimLeft + hoop.rimWidth * 0.15 + t * hoop.rimWidth * 0.7;
    ctx.beginPath();
    ctx.moveTo(topX, hoop.y);
    ctx.lineTo(bottomX, hoop.y + hoop.netDepth);
    ctx.stroke();
  }
  // Horizontal net lines
  for (let j = 1; j <= 3; j++) {
    const t = j / 4;
    const y = hoop.y + t * hoop.netDepth;
    const narrowFactor = 0.15 * t;
    const lx = hoop.rimLeft + hoop.rimWidth * narrowFactor;
    const rx = hoop.rimRight - hoop.rimWidth * narrowFactor;
    ctx.beginPath();
    ctx.moveTo(lx, y);
    ctx.lineTo(rx, y);
    ctx.stroke();
  }
  
  // Rim
  ctx.strokeStyle = MAGENTA;
  ctx.lineWidth = 4;
  ctx.shadowColor = MAGENTA;
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.moveTo(hoop.rimLeft, hoop.y);
  ctx.lineTo(hoop.rimRight, hoop.y);
  ctx.stroke();
  ctx.shadowBlur = 0;
  
  // Rim endpoints (circles)
  ctx.fillStyle = MAGENTA;
  ctx.beginPath();
  ctx.arc(hoop.rimLeft, hoop.y, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(hoop.rimRight, hoop.y, 5, 0, Math.PI * 2);
  ctx.fill();
  
  // Ball trail
  if (ball && ball.trail.length > 0) {
    for (const t of ball.trail) {
      ctx.fillStyle = `rgba(255,45,123,${t.life * 0.3})`;
      ctx.beginPath();
      ctx.arc(t.x, t.y, ball.r * t.life * 0.6, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  
  // Ball
  if (ball) {
    // Ball glow
    ctx.shadowColor = MAGENTA;
    ctx.shadowBlur = 15;
    
    // Ball body (orange-ish with neon tint)
    const grad = ctx.createRadialGradient(ball.x - 3, ball.y - 3, 2, ball.x, ball.y, ball.r);
    grad.addColorStop(0, '#ff6b3d');
    grad.addColorStop(0.7, '#e04520');
    grad.addColorStop(1, '#a02010');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    
    // Ball lines
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(ball.x - ball.r, ball.y);
    ctx.lineTo(ball.x + ball.r, ball.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r * 0.7, -0.5, 0.5);
    ctx.stroke();
    
    // Aim line when dragging
    if (dragging && !ball.moving) {
      const dx = dragStart.x - dragEnd.x;
      const dy = dragStart.y - dragEnd.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const maxDist = 200;
      const power = Math.min(dist / maxDist, 1);
      
      // Draw power line
      ctx.strokeStyle = `rgba(0,240,255,${0.3 + power * 0.5})`;
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(ball.x, ball.y);
      ctx.lineTo(ball.x + dx * 0.5, ball.y + dy * 0.5);
      ctx.stroke();
      ctx.setLineDash([]);
      
      // Trajectory preview
      const angle = Math.atan2(dy, dx);
      const maxPower = 22;
      const p = power * maxPower;
      const pvx = Math.cos(angle) * p;
      const pvy = Math.sin(angle) * p;
      let px = ball.x, py = ball.y;
      ctx.fillStyle = `rgba(0,240,255,0.3)`;
      for (let i = 0; i < 25; i++) {
        px += pvx;
        py += pvy + GRAVITY * i;
        if (py > groundY) break;
        ctx.beginPath();
        ctx.arc(px, py, 2, 0, Math.PI * 2);
        ctx.fill();
      }
      
      // Power meter
      ctx.fillStyle = DIM;
      ctx.font = Math.max(9, Math.round(10 * fontScale)) + 'px "JetBrains Mono"';
      ctx.textAlign = 'center';
      ctx.fillText('POWER: ' + Math.round(power * 100) + '%', ball.x, ball.y + ball.r + 20);
    }
  }
  
  // Particles
  for (const p of particles) {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
  
  // Shot result message
  if (shotResult) {
    const alpha = shotResult.timer > 10 ? 1 : shotResult.timer / 10;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = shotResult.color;
    ctx.font = 'bold ' + Math.max(18, Math.round(28 * fontScale)) + 'px "JetBrains Mono"';
    ctx.textAlign = 'center';
    ctx.shadowColor = shotResult.color;
    ctx.shadowBlur = 20;
    ctx.fillText(shotResult.text, w * 0.5, h * 0.25);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
  
  // Shot distance label
  if (ball && !ball.moving && gameActive) {
    ctx.fillStyle = CYAN;
    ctx.font = 'bold ' + Math.max(9, Math.round(11 * fontScale)) + 'px "JetBrains Mono"';
    ctx.textAlign = 'center';
    ctx.shadowColor = CYAN;
    ctx.shadowBlur = 8;
    ctx.fillText(ball.label + ' RANGE', ball.x, ball.y - ball.r - 14);
    ctx.fillText(ball.points + (ball.points === 1 ? ' POINT' : ' POINTS'), ball.x, ball.y - ball.r - 2);
    ctx.shadowBlur = 0;
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Input handling
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    x: clientX - rect.left,
    y: clientY - rect.top
  };
}

canvas.addEventListener('mousedown', (e) => {
  if (!gameActive || !ball || ball.moving) return;
  const pos = getCanvasPos(e);
  const dx = pos.x - ball.x;
  const dy = pos.y - ball.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < 60) {
    dragging = true;
    dragStart.x = pos.x;
    dragStart.y = pos.y;
    dragEnd.x = pos.x;
    dragEnd.y = pos.y;
  }
});

canvas.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const pos = getCanvasPos(e);
  dragEnd.x = pos.x;
  dragEnd.y = pos.y;
});

canvas.addEventListener('mouseup', (e) => {
  if (!dragging) return;
  dragging = false;
  const dx = dragStart.x - dragEnd.x;
  const dy = dragStart.y - dragEnd.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < 10) return; // Too small
  const maxDist = 200;
  const power = Math.min(dist / maxDist, 1) * 22;
  const angle = Math.atan2(dy, dx);
  shoot(power, angle);
});

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (!gameActive || !ball || ball.moving) return;
  const pos = getCanvasPos(e);
  const dx = pos.x - ball.x;
  const dy = pos.y - ball.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const w = W / devicePixelRatio;
  const grabRadius = w < 480 ? 120 : 80;
  if (dist < grabRadius) {
    dragging = true;
    dragStart.x = pos.x;
    dragStart.y = pos.y;
    dragEnd.x = pos.x;
    dragEnd.y = pos.y;
  }
}, {passive: false});

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!dragging) return;
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  dragEnd.x = touch.clientX - rect.left;
  dragEnd.y = touch.clientY - rect.top;
}, {passive: false});

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (!dragging) return;
  dragging = false;
  const dx = dragStart.x - dragEnd.x;
  const dy = dragStart.y - dragEnd.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < 10) return;
  const maxDist = 200;
  const power = Math.min(dist / maxDist, 1) * 22;
  const angle = Math.atan2(dy, dx);
  shoot(power, angle);
}, {passive: false});

// Start
document.getElementById('startBtn').addEventListener('click', startGame);

window.addEventListener('resize', resize);
resize();
updateUI();
loop();
  </script>
</body>
</html>
