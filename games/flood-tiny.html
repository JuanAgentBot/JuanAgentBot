<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLOOD TINY / ZERO game lab</title>
  <meta name="theme-color" content="#0a0a0f">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared.css">
  <style>
    main {
      max-width: 420px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      text-align: center;
    }

    .back {
      display: inline-block;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      margin-bottom: 1.5rem;
      text-align: left;
      width: 100%;
    }

    .back:hover { color: var(--accent-cyan); }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent-cyan);
      letter-spacing: 0.12em;
      margin-bottom: 0.3rem;
      text-shadow: 0 0 20px var(--glow-cyan);
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1rem;
      font-size: 0.8rem;
    }

    .stat-label {
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }

    .stat-value {
      color: var(--accent-cyan);
      font-weight: 700;
      text-shadow: 0 0 8px var(--glow-cyan-soft);
    }

    .stat-value.warn {
      color: var(--accent-magenta);
      text-shadow: 0 0 8px var(--glow-magenta);
    }

    #board {
      display: inline-grid;
      gap: 2px;
      border: 2px solid var(--border);
      margin-bottom: 1.2rem;
      background: var(--border);
    }

    .cell {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 4px;
      transition: background-color 0.12s ease-out;
    }

    .cell.wave {
      animation: waveFlash 0.4s ease-out;
    }

    @keyframes waveFlash {
      0% { transform: scale(1); filter: brightness(1); border-radius: 4px; }
      30% { transform: scale(1.2); filter: brightness(1.7); border-radius: 8px; }
      100% { transform: scale(1); filter: brightness(1); border-radius: 4px; }
    }

    .color-picker {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      margin-bottom: 1.2rem;
    }

    .color-btn {
      width: 52px;
      height: 52px;
      border: 2px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      padding: 0;
    }

    .color-btn:hover { transform: scale(1.15); }
    .color-btn.current {
      border-color: var(--text-bright);
      box-shadow: 0 0 14px rgba(224, 224, 232, 0.3);
    }
    .color-btn.disabled {
      opacity: 0.4;
      cursor: default;
      transform: none !important;
    }

    .message {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
      min-height: 1.4em;
    }

    .message.win {
      color: var(--accent-green);
      text-shadow: 0 0 10px rgba(57, 255, 20, 0.4);
    }

    .message.lose {
      color: var(--accent-magenta);
      text-shadow: 0 0 10px var(--glow-magenta);
    }

    .best {
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-bottom: 1rem;
    }

    .best span {
      color: var(--accent-green);
      text-shadow: 0 0 6px rgba(57, 255, 20, 0.3);
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      margin-bottom: 1rem;
      overflow: hidden;
      border-radius: 3px;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent-cyan);
      transition: width 0.3s;
      box-shadow: 0 0 8px var(--glow-cyan-soft);
      border-radius: 3px;
    }

    .progress-fill.high {
      background: var(--accent-magenta);
      box-shadow: 0 0 8px var(--glow-magenta);
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      padding: 0.3rem 0.8rem;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn:hover {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }

    .help {
      color: var(--text-dim);
      font-size: 0.65rem;
      line-height: 1.6;
      letter-spacing: 0.04em;
      margin-top: 1.5rem;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }

    .variant-nav {
      margin-top: 1rem;
      font-size: 0.65rem;
      letter-spacing: 0.06em;
    }

    .variant-nav a {
      color: var(--accent-purple);
      text-decoration: none;
      transition: color 0.2s;
    }
    .variant-nav a:hover { color: var(--accent-cyan); }
  </style>
  <script>(function(){var t=localStorage.getItem('zero-theme');if(!t&&window.matchMedia('(prefers-color-scheme:light)').matches)t='light';if(t==='light')document.documentElement.setAttribute('data-theme','light')})()</script>
</head>
<body>
  <main>
    <a href="./" class="back">&lt; GAME LAB</a>
    <h1>FLOOD TINY</h1>
    <p class="subtitle">6&times;6 GRID &middot; 4 COLORS &middot; BIG CHUNKY CELLS</p>

    <div class="controls">
      <button class="btn" id="new-btn">NEW GAME</button>
    </div>

    <div class="stats">
      <div><span class="stat-label">MOVES </span><span class="stat-value" id="moves">0</span><span class="stat-label"> / </span><span class="stat-value" id="max-moves">12</span></div>
      <div><span class="stat-label">FILLED </span><span class="stat-value" id="filled">0%</span></div>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

    <div id="board"></div>

    <div class="color-picker" id="picker"></div>

    <div class="message" id="message"></div>

    <div class="best" id="best-display"></div>

    <div class="variant-nav">
      <a href="flood.html">CLASSIC</a> &middot;
      <a href="flood-mega.html">MEGA</a> &middot;
      <a href="flood-lava.html">LAVA</a> &middot;
      <a href="flood-ice.html">ICE</a> &middot;
      <a href="flood-cluster.html">CLUSTER</a>
    </div>

    <div class="help">
      CLICK A COLOR TO FLOOD FROM THE TOP-LEFT<br>
      4 COLORS, 12 MOVES — QUICK AND PUNCHY<br>
      KEYS 1-4 TO PICK COLORS &middot; N FOR NEW GAME
    </div>
  </main>

  <script>
    const COLORS = ['#ff2d7b', '#00f0ff', '#39ff14', '#9d4edd'];
    const COLOR_NAMES = ['MAGENTA', 'CYAN', 'GREEN', 'PURPLE'];
    const GRID_SIZE = 6;
    const MAX_MOVES = 12;
    const WAVE_DELAY = 55;

    let grid = [];
    let moves = 0;
    let gameOver = false;
    let animating = false;
    let best = null;

    const boardEl = document.getElementById('board');
    const pickerEl = document.getElementById('picker');
    const movesEl = document.getElementById('moves');
    const maxMovesEl = document.getElementById('max-moves');
    const filledEl = document.getElementById('filled');
    const messageEl = document.getElementById('message');
    const bestEl = document.getElementById('best-display');
    const progressEl = document.getElementById('progress');

    try { best = JSON.parse(localStorage.getItem('zero-flood-tiny-best')); } catch(e) {}

    function saveBest() {
      localStorage.setItem('zero-flood-tiny-best', JSON.stringify(best));
    }

    function init() {
      moves = 0;
      gameOver = false;
      animating = false;
      messageEl.textContent = '';
      messageEl.className = 'message';
      grid = [];

      for (let r = 0; r < GRID_SIZE; r++) {
        grid[r] = [];
        for (let c = 0; c < GRID_SIZE; c++) {
          grid[r][c] = Math.floor(Math.random() * COLORS.length);
        }
      }

      renderBoard();
      renderPicker();
      updateStats();
      updateBestDisplay();
    }

    function renderBoard() {
      boardEl.innerHTML = '';
      boardEl.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 1fr)`;
      const cellSize = Math.min(Math.floor((Math.min(360, window.innerWidth - 60)) / GRID_SIZE), 56);
      boardEl.style.width = (cellSize * GRID_SIZE + (GRID_SIZE - 1) * 2) + 'px';

      for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.style.backgroundColor = COLORS[grid[r][c]];
          cell.style.width = cellSize + 'px';
          cell.style.height = cellSize + 'px';
          boardEl.appendChild(cell);
        }
      }
    }

    function renderPicker() {
      pickerEl.innerHTML = '';
      const currentColor = grid[0][0];
      COLORS.forEach((color, i) => {
        const btn = document.createElement('button');
        btn.className = 'color-btn';
        if (i === currentColor) btn.classList.add('current');
        if (animating) btn.classList.add('disabled');
        btn.style.backgroundColor = color;
        btn.title = COLOR_NAMES[i] + ' [' + (i + 1) + ']';
        btn.addEventListener('click', () => pickColor(i));
        pickerEl.appendChild(btn);
      });
    }

    async function pickColor(colorIndex) {
      if (gameOver || animating) return;
      const currentColor = grid[0][0];
      if (colorIndex === currentColor) return;

      moves++;
      animating = true;
      renderPicker();
      await floodAnimated(currentColor, colorIndex);
      animating = false;
      renderPicker();
      updateStats();

      const pct = getFilledPercent();
      if (pct === 100) {
        gameOver = true;
        messageEl.textContent = 'CLEARED IN ' + moves + ' MOVES';
        messageEl.className = 'message win';
        if (!best || moves < best) {
          best = moves;
          saveBest();
          updateBestDisplay();
          messageEl.textContent += ' — NEW BEST!';
        }
      } else if (moves >= MAX_MOVES) {
        gameOver = true;
        messageEl.textContent = 'OUT OF MOVES — ' + pct + '% FILLED';
        messageEl.className = 'message lose';
      }
    }

    async function floodAnimated(oldColor, newColor) {
      const visited = Array.from({ length: GRID_SIZE }, () => new Array(GRID_SIZE).fill(false));
      const rings = [];
      const queue = [[0, 0, 0]];
      visited[0][0] = true;

      while (queue.length > 0) {
        const [r, c, dist] = queue.shift();
        if (grid[r][c] === oldColor) {
          if (!rings[dist]) rings[dist] = [];
          rings[dist].push({ r, c });
          for (const [nr, nc] of [[r-1,c],[r+1,c],[r,c-1],[r,c+1]]) {
            if (nr >= 0 && nr < GRID_SIZE && nc >= 0 && nc < GRID_SIZE && !visited[nr][nc]) {
              visited[nr][nc] = true;
              if (grid[nr][nc] === oldColor) queue.push([nr, nc, dist + 1]);
            }
          }
        }
      }

      for (const ring of rings) {
        if (!ring) continue;
        for (const { r, c } of ring) {
          grid[r][c] = newColor;
          const cell = boardEl.children[r * GRID_SIZE + c];
          if (cell) {
            cell.style.backgroundColor = COLORS[newColor];
            cell.classList.remove('wave');
            void cell.offsetWidth;
            cell.classList.add('wave');
          }
        }
        await delay(WAVE_DELAY);
      }
      await delay(400);
      boardEl.querySelectorAll('.wave').forEach(c => c.classList.remove('wave'));
    }

    function getFilledPercent() {
      const targetColor = grid[0][0];
      const visited = Array.from({ length: GRID_SIZE }, () => new Array(GRID_SIZE).fill(false));
      const stack = [[0, 0]];
      visited[0][0] = true;
      let count = 0;
      while (stack.length > 0) {
        const [r, c] = stack.pop();
        if (grid[r][c] === targetColor) {
          count++;
          for (const [nr, nc] of [[r-1,c],[r+1,c],[r,c-1],[r,c+1]]) {
            if (nr >= 0 && nr < GRID_SIZE && nc >= 0 && nc < GRID_SIZE && !visited[nr][nc]) {
              visited[nr][nc] = true;
              if (grid[nr][nc] === targetColor) stack.push([nr, nc]);
            }
          }
        }
      }
      return Math.round((count / (GRID_SIZE * GRID_SIZE)) * 100);
    }

    function updateStats() {
      movesEl.textContent = moves;
      maxMovesEl.textContent = MAX_MOVES;
      movesEl.classList.toggle('warn', moves > MAX_MOVES * 0.75);
      const pct = getFilledPercent();
      filledEl.textContent = pct + '%';
      progressEl.style.width = pct + '%';
      progressEl.classList.toggle('high', moves > MAX_MOVES * 0.75 && pct < 80);
    }

    function updateBestDisplay() {
      if (best) {
        bestEl.innerHTML = 'BEST: <span>' + best + ' MOVES</span>';
      } else {
        bestEl.textContent = '';
      }
    }

    function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

    document.getElementById('new-btn').addEventListener('click', () => { if (!animating) init(); });

    document.addEventListener('keydown', (e) => {
      if (e.key >= '1' && e.key <= '4') { e.preventDefault(); pickColor(parseInt(e.key) - 1); }
      else if (e.key === 'n' || e.key === 'N') { e.preventDefault(); if (!animating) init(); }
    });

    window.addEventListener('resize', () => { if (grid.length > 0 && !animating) renderBoard(); });

    init();
  </script>
  <script src="../theme-toggle.js"></script>
</body>
</html>
