<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KENO / ZERO game lab</title>
  <meta name="theme-color" content="#0a0a0f">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared.css">
  <style>
    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      text-align: center;
    }
    .back {
      display: inline-block;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      margin-bottom: 1.5rem;
      text-align: left;
      width: 100%;
    }
    .back:hover { color: var(--accent-cyan); }
    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent-magenta);
      letter-spacing: 0.1em;
      margin-bottom: 0.4rem;
      text-shadow: 0 0 20px var(--glow-magenta);
    }
    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .credits { color: var(--accent-green); font-weight: 700; }
    .picks-count { color: var(--accent-cyan); }
    .bet-section {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1rem;
      font-size: 0.75rem;
    }
    .bet-section label { color: var(--text-muted); }
    .bet-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-bright);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      padding: 0.3rem 0.6rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .bet-btn:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }
    .bet-amount {
      color: var(--accent-green);
      font-weight: 700;
      font-size: 0.85rem;
      min-width: 3rem;
      text-align: center;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 3px;
      margin: 0 auto 1rem;
      max-width: 480px;
    }
    .cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
      position: relative;
    }
    .cell:hover:not(.drawn):not(.locked) {
      border-color: var(--accent-cyan);
      color: var(--text-bright);
    }
    .cell.picked {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
      background: rgba(0, 240, 255, 0.08);
      text-shadow: 0 0 8px var(--glow-cyan);
    }
    .cell.drawn {
      border-color: var(--accent-magenta);
      color: var(--accent-magenta);
      background: rgba(255, 45, 123, 0.1);
      text-shadow: 0 0 8px var(--glow-magenta);
    }
    .cell.hit {
      border-color: var(--accent-green);
      color: var(--accent-green);
      background: rgba(57, 255, 20, 0.12);
      text-shadow: 0 0 10px rgba(57, 255, 20, 0.6);
      animation: hitPulse 0.4s ease-out;
    }
    @keyframes hitPulse {
      0% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .cell.locked { cursor: default; }
    .actions {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      margin-bottom: 1rem;
    }
    .btn {
      background: none;
      border: 1px solid var(--accent-magenta);
      color: var(--accent-magenta);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.5rem 1.4rem;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: all 0.2s;
    }
    .btn:hover {
      background: rgba(255, 45, 123, 0.1);
      box-shadow: 0 0 12px var(--glow-magenta);
    }
    .btn:disabled {
      opacity: 0.3;
      cursor: default;
      box-shadow: none;
    }
    .btn.secondary {
      border-color: var(--border);
      color: var(--text-muted);
    }
    .btn.secondary:hover {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
      background: rgba(0, 240, 255, 0.05);
      box-shadow: 0 0 12px var(--glow-cyan-soft);
    }
    .result {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
      min-height: 1.6rem;
      line-height: 1.6rem;
    }
    .result .win {
      color: var(--accent-green);
      font-weight: 700;
      text-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
    }
    .result .lose { color: var(--accent-magenta); }
    .paytable {
      margin: 0 auto 1.5rem;
      max-width: 400px;
      border: 1px solid var(--border);
      padding: 0.8rem;
      text-align: left;
    }
    .paytable-title {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--accent-purple);
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .paytable-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      padding: 0.15rem 0;
      color: var(--text-dim);
    }
    .paytable-row .mult { color: var(--accent-green); }
    .paytable-row.active {
      color: var(--text-bright);
    }
    .paytable-row.active .mult {
      text-shadow: 0 0 8px rgba(57, 255, 20, 0.5);
    }
    .controls-help {
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-top: 1rem;
      line-height: 1.5;
    }
    .draw-counter {
      font-size: 0.75rem;
      color: var(--accent-purple);
      margin-bottom: 0.5rem;
      min-height: 1.2rem;
    }
    .quick-pick-row {
      display: flex;
      justify-content: center;
      gap: 0.4rem;
      margin-bottom: 0.8rem;
    }
    .qp-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      padding: 0.2rem 0.5rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .qp-btn:hover {
      border-color: var(--accent-purple);
      color: var(--accent-purple);
    }
    .qp-btn:disabled { opacity: 0.3; cursor: default; }
  </style>
  <script>(function(){var t=localStorage.getItem('zero-theme');if(!t&&window.matchMedia('(prefers-color-scheme:light)').matches)t='light';if(t==='light')document.documentElement.setAttribute('data-theme','light')})()</script>
</head>
<body>
  <main>
    <a href="./" class="back">&lt; GAME LAB</a>
    <h1>KENO</h1>

    <div class="info-bar">
      <span>CREDITS: <span class="credits" id="credits">1000</span></span>
      <span>PICKS: <span class="picks-count" id="picks-count">0</span>/10</span>
    </div>

    <div class="bet-section">
      <label>BET:</label>
      <button class="bet-btn" id="bet-down">&minus;</button>
      <span class="bet-amount" id="bet-amount">10</span>
      <button class="bet-btn" id="bet-up">+</button>
    </div>

    <div class="quick-pick-row" id="quick-picks"></div>

    <div class="draw-counter" id="draw-counter"></div>
    <div class="result" id="result"></div>

    <div class="board" id="board"></div>

    <div class="actions">
      <button class="btn secondary" id="clear-btn">CLEAR</button>
      <button class="btn" id="draw-btn" disabled>DRAW</button>
    </div>

    <div class="paytable" id="paytable">
      <div class="paytable-title">PAYTABLE</div>
      <div id="paytable-rows"></div>
    </div>

    <div class="controls-help">
      CLICK numbers to pick (up to 10) · QUICK PICK for random selections<br>
      DRAW to reveal 20 numbers · Match more picks for bigger payouts
    </div>
  </main>

  <script src="../theme-toggle.js"></script>
  <script>
  (function() {
    'use strict';

    // Paytables: picks -> { hits: multiplier }
    const PAYTABLES = {
      1:  { 0: 0, 1: 3 },
      2:  { 0: 0, 1: 1, 2: 9 },
      3:  { 0: 0, 1: 0, 2: 3, 3: 25 },
      4:  { 0: 0, 1: 0, 2: 2, 3: 8, 4: 60 },
      5:  { 0: 0, 1: 0, 2: 1, 3: 4, 4: 20, 5: 200 },
      6:  { 0: 0, 1: 0, 2: 0, 3: 3, 4: 8, 5: 75, 6: 500 },
      7:  { 0: 0, 1: 0, 2: 0, 3: 2, 4: 5, 5: 25, 6: 150, 7: 1000 },
      8:  { 0: 0, 1: 0, 2: 0, 3: 1, 4: 4, 5: 12, 6: 75, 7: 500, 8: 2500 },
      9:  { 0: 0, 1: 0, 2: 0, 3: 1, 4: 3, 5: 8, 6: 40, 7: 200, 8: 1500, 9: 5000 },
      10: { 0: 0, 1: 0, 2: 0, 3: 0, 4: 2, 5: 5, 6: 20, 7: 100, 8: 750, 9: 3000, 10: 10000 }
    };

    let credits = 1000;
    let bet = 10;
    const betSteps = [1, 2, 5, 10, 25, 50, 100];
    let betIndex = 3;
    let picked = new Set();
    let drawn = new Set();
    let drawing = false;
    let drawQueue = [];
    let drawIndex = 0;

    const boardEl = document.getElementById('board');
    const creditsEl = document.getElementById('credits');
    const picksCountEl = document.getElementById('picks-count');
    const betAmountEl = document.getElementById('bet-amount');
    const drawBtn = document.getElementById('draw-btn');
    const clearBtn = document.getElementById('clear-btn');
    const resultEl = document.getElementById('result');
    const drawCounterEl = document.getElementById('draw-counter');
    const paytableRowsEl = document.getElementById('paytable-rows');
    const quickPicksEl = document.getElementById('quick-picks');
    const betDownBtn = document.getElementById('bet-down');
    const betUpBtn = document.getElementById('bet-up');

    const cells = [];

    // Build board
    for (let i = 1; i <= 80; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.textContent = i;
      cell.dataset.num = i;
      cell.addEventListener('click', () => togglePick(i));
      boardEl.appendChild(cell);
      cells[i] = cell;
    }

    // Quick pick buttons
    [1, 3, 5, 7, 10].forEach(n => {
      const btn = document.createElement('button');
      btn.className = 'qp-btn';
      btn.textContent = 'QP ' + n;
      btn.addEventListener('click', () => quickPick(n));
      quickPicksEl.appendChild(btn);
    });

    function togglePick(num) {
      if (drawing) return;
      if (picked.has(num)) {
        picked.delete(num);
        cells[num].classList.remove('picked');
      } else if (picked.size < 10) {
        picked.add(num);
        cells[num].classList.add('picked');
      }
      updateUI();
    }

    function quickPick(count) {
      if (drawing) return;
      clearBoard();
      const nums = [];
      for (let i = 1; i <= 80; i++) nums.push(i);
      shuffle(nums);
      for (let i = 0; i < count; i++) {
        picked.add(nums[i]);
        cells[nums[i]].classList.add('picked');
      }
      updateUI();
    }

    function clearBoard() {
      if (drawing) return;
      picked.forEach(n => cells[n].classList.remove('picked'));
      picked.clear();
      drawn.forEach(n => {
        cells[n].classList.remove('drawn', 'hit');
      });
      drawn.clear();
      resultEl.textContent = '';
      drawCounterEl.textContent = '';
      updateUI();
    }

    function updateUI() {
      creditsEl.textContent = credits;
      picksCountEl.textContent = picked.size;
      betAmountEl.textContent = bet;
      drawBtn.disabled = picked.size === 0 || drawing || credits < bet;
      clearBtn.disabled = drawing;
      document.querySelectorAll('.qp-btn').forEach(b => b.disabled = drawing);
      betDownBtn.disabled = drawing || betIndex === 0;
      betUpBtn.disabled = drawing || betIndex === betSteps.length - 1;
      updatePaytable();
    }

    function updatePaytable() {
      paytableRowsEl.innerHTML = '';
      const numPicks = picked.size || 1;
      const table = PAYTABLES[numPicks];
      if (!table) return;
      for (let hits = numPicks; hits >= 0; hits--) {
        const mult = table[hits] || 0;
        if (mult === 0 && hits < numPicks - 2) continue;
        const row = document.createElement('div');
        row.className = 'paytable-row';
        const label = document.createElement('span');
        label.textContent = hits + ' of ' + numPicks + ' hits';
        const val = document.createElement('span');
        val.className = 'mult';
        val.textContent = mult === 0 ? '—' : 'x' + mult + ' (' + (mult * bet) + ')';
        row.appendChild(label);
        row.appendChild(val);
        paytableRowsEl.appendChild(row);
      }
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function startDraw() {
      if (picked.size === 0 || drawing || credits < bet) return;

      // Reset previous draw visuals
      drawn.forEach(n => {
        cells[n].classList.remove('drawn', 'hit');
      });
      drawn.clear();
      resultEl.textContent = '';

      // Deduct bet
      credits -= bet;
      drawing = true;
      updateUI();

      // Generate 20 random draws
      const nums = [];
      for (let i = 1; i <= 80; i++) nums.push(i);
      shuffle(nums);
      drawQueue = nums.slice(0, 20);
      drawIndex = 0;

      drawNext();
    }

    function drawNext() {
      if (drawIndex >= drawQueue.length) {
        finishDraw();
        return;
      }

      const num = drawQueue[drawIndex];
      drawn.add(num);
      const cell = cells[num];

      if (picked.has(num)) {
        cell.classList.add('hit');
      } else {
        cell.classList.add('drawn');
      }

      drawIndex++;
      drawCounterEl.textContent = 'DRAWING: ' + drawIndex + ' / 20';

      // Faster as we go
      const delay = drawIndex < 5 ? 120 : drawIndex < 12 ? 80 : 50;
      setTimeout(drawNext, delay);
    }

    function finishDraw() {
      drawing = false;

      let hits = 0;
      picked.forEach(n => { if (drawn.has(n)) hits++; });

      const table = PAYTABLES[picked.size];
      const mult = table ? (table[hits] || 0) : 0;
      const winnings = mult * bet;

      credits += winnings;

      if (winnings > 0) {
        resultEl.innerHTML = '<span class="win">' + hits + ' HITS — WON ' + winnings + ' CREDITS (x' + mult + ')</span>';
      } else {
        resultEl.innerHTML = '<span class="lose">' + hits + ' HITS — NO WIN</span>';
      }

      drawCounterEl.textContent = 'DRAW COMPLETE · ' + hits + '/' + picked.size + ' MATCHED';

      // Highlight winning rows in paytable
      const rows = paytableRowsEl.querySelectorAll('.paytable-row');
      rows.forEach(row => {
        const label = row.querySelector('span').textContent;
        if (label.startsWith(hits + ' of ')) {
          row.classList.add('active');
        } else {
          row.classList.remove('active');
        }
      });

      updateUI();

      if (credits <= 0) {
        setTimeout(() => {
          resultEl.innerHTML += '<br><span class="lose">OUT OF CREDITS — CLICK CLEAR TO RESET</span>';
          credits = 1000;
          updateUI();
        }, 1500);
      }
    }

    // Bet controls
    betDownBtn.addEventListener('click', () => {
      if (drawing || betIndex <= 0) return;
      betIndex--;
      bet = betSteps[betIndex];
      updateUI();
    });

    betUpBtn.addEventListener('click', () => {
      if (drawing || betIndex >= betSteps.length - 1) return;
      betIndex++;
      bet = betSteps[betIndex];
      updateUI();
    });

    drawBtn.addEventListener('click', startDraw);
    clearBtn.addEventListener('click', clearBoard);

    // Keyboard: space to draw, c to clear
    document.addEventListener('keydown', e => {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        startDraw();
      } else if (e.key === 'c' || e.key === 'C') {
        clearBoard();
      }
    });

    updateUI();
  })();
  </script>
</body>
</html>
