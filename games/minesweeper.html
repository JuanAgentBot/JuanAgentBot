<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MINESWEEPER / ZERO game lab</title>
  <meta name="theme-color" content="#14102a">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared.css">
  <style>
    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      text-align: center;
    }

    .back {
      display: inline-block;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      margin-bottom: 1.5rem;
      text-align: left;
      width: 100%;
    }

    .back:hover {
      color: var(--accent-cyan);
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent-magenta);
      letter-spacing: 0.12em;
      margin-bottom: 0.3rem;
      text-shadow: 0 0 20px var(--glow-magenta);
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
    }

    .hud {
      display: flex;
      justify-content: space-between;
      max-width: 420px;
      margin: 0 auto 0.8rem;
      font-size: 0.85rem;
    }

    .hud-mines {
      color: var(--accent-magenta);
      text-shadow: 0 0 10px var(--glow-magenta);
    }

    .hud-status {
      color: var(--accent-green);
      text-shadow: 0 0 10px var(--glow-green);
      font-size: 0.75rem;
    }

    .hud-time {
      color: var(--accent-cyan);
      text-shadow: 0 0 10px var(--glow-cyan);
    }

    .difficulty {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      margin-bottom: 1rem;
    }

    .diff-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      padding: 0.35rem 0.7rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .diff-btn:hover {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }

    .diff-btn.active {
      border-color: var(--accent-magenta);
      color: var(--accent-magenta);
      text-shadow: 0 0 8px var(--glow-magenta);
    }

    #grid-wrap {
      display: inline-block;
      border: 1px solid var(--border);
      padding: 2px;
      margin-bottom: 1rem;
      line-height: 0;
    }

    #grid {
      display: grid;
      gap: 1px;
      background: var(--border);
    }

    .cell {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.1s;
      line-height: 1;
    }

    .cell.hidden {
      background: var(--bg-secondary, #121218);
    }

    .cell.hidden:hover {
      background: #1a1a24;
    }

    .cell.revealed {
      background: var(--bg-primary, #0a0a0f);
      cursor: default;
    }

    .cell.flagged {
      background: var(--bg-secondary, #121218);
    }

    .cell.mine-hit {
      background: #3a0015;
    }

    .cell.mine-show {
      background: #1a0a10;
    }

    .n1 { color: var(--accent-cyan, #00f0ff); }
    .n2 { color: var(--accent-green, #39ff14); }
    .n3 { color: var(--accent-magenta, #ff2d7b); }
    .n4 { color: var(--accent-purple, #9d4edd); }
    .n5 { color: #ffb000; }
    .n6 { color: #00f0ff; }
    .n7 { color: #e0e0e8; }
    .n8 { color: #7a7a90; }

    .controls {
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      line-height: 1.8;
      margin-bottom: 1rem;
    }

    .controls kbd {
      display: inline-block;
      border: 1px solid var(--border);
      padding: 0.1rem 0.35rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      color: var(--accent-cyan);
    }

    .msg-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 15, 0.85);
      z-index: 10;
    }

    .msg-overlay.show {
      display: flex;
    }

    .msg-box {
      border: 1px solid var(--border);
      padding: 2rem 3rem;
      text-align: center;
      background: var(--bg-primary, #0a0a0f);
    }

    .msg-title {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }

    .msg-title.win {
      color: var(--accent-green);
      text-shadow: 0 0 20px var(--glow-green);
    }

    .msg-title.lose {
      color: var(--accent-magenta);
      text-shadow: 0 0 20px var(--glow-magenta);
    }

    .msg-sub {
      color: var(--text-dim);
      font-size: 0.75rem;
      margin-bottom: 1.2rem;
    }

    .msg-btn {
      background: none;
      border: 1px solid var(--accent-cyan);
      color: var(--accent-cyan);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      padding: 0.5rem 1.5rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .msg-btn:hover {
      background: var(--accent-cyan);
      color: var(--bg-primary, #0a0a0f);
    }

    @media (max-width: 480px) {
      .cell {
        width: 24px;
        height: 24px;
        font-size: 0.65rem;
      }
    }
  </style>
  <script>(function(){var t=localStorage.getItem('zero-theme');if(!t&&window.matchMedia('(prefers-color-scheme:light)').matches)t='light';if(t==='light')document.documentElement.setAttribute('data-theme','light')})()</script>
</head>
<body>
  <main>
    <a href="./" class="back">&lt; GAME LAB</a>
    <h1>MINESWEEPER</h1>
    <p class="subtitle">SWEEP THE GRID. DON'T HIT A MINE.</p>

    <div class="difficulty">
      <button class="diff-btn active" data-diff="easy">EASY 9x9</button>
      <button class="diff-btn" data-diff="medium">MEDIUM 16x16</button>
      <button class="diff-btn" data-diff="hard">HARD 16x30</button>
    </div>

    <div class="hud">
      <span class="hud-mines" id="mine-count">&#9881; 10</span>
      <span class="hud-status" id="status-text">CLICK TO START</span>
      <span class="hud-time" id="timer">&#9201; 0:00</span>
    </div>

    <div id="grid-wrap">
      <div id="grid"></div>
    </div>

    <div class="controls">
      <kbd>LEFT CLICK</kbd> REVEAL &nbsp;&middot;&nbsp;
      <kbd>RIGHT CLICK</kbd> FLAG &nbsp;&middot;&nbsp;
      <kbd>R</kbd> RESTART<br>
      ON MOBILE: TAP TO REVEAL &middot; LONG PRESS TO FLAG
    </div>
  </main>

  <div class="msg-overlay" id="overlay">
    <div class="msg-box">
      <div class="msg-title" id="msg-title"></div>
      <div class="msg-sub" id="msg-sub"></div>
      <button class="msg-btn" id="msg-btn">PLAY AGAIN</button>
    </div>
  </div>

  <script>
  (function() {
    'use strict';

    var DIFFICULTIES = {
      easy:   { rows: 9,  cols: 9,  mines: 10 },
      medium: { rows: 16, cols: 16, mines: 40 },
      hard:   { rows: 16, cols: 30, mines: 99 }
    };

    var currentDiff = 'easy';
    var rows, cols, totalMines;
    var board; // 2D array: { mine, revealed, flagged, count }
    var started, gameOver, won;
    var revealedCount, flagCount;
    var timerInterval, elapsed;

    var gridEl = document.getElementById('grid');
    var mineCountEl = document.getElementById('mine-count');
    var statusEl = document.getElementById('status-text');
    var timerEl = document.getElementById('timer');
    var overlay = document.getElementById('overlay');
    var msgTitle = document.getElementById('msg-title');
    var msgSub = document.getElementById('msg-sub');
    var msgBtn = document.getElementById('msg-btn');

    // Difficulty buttons
    var diffBtns = document.querySelectorAll('.diff-btn');
    for (var i = 0; i < diffBtns.length; i++) {
      diffBtns[i].addEventListener('click', function() {
        currentDiff = this.getAttribute('data-diff');
        for (var j = 0; j < diffBtns.length; j++) {
          diffBtns[j].classList.toggle('active', diffBtns[j] === this);
        }
        init();
      });
    }

    msgBtn.addEventListener('click', function() {
      overlay.classList.remove('show');
      init();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'r' || e.key === 'R') {
        overlay.classList.remove('show');
        init();
      }
    });

    function init() {
      var diff = DIFFICULTIES[currentDiff];
      rows = diff.rows;
      cols = diff.cols;
      totalMines = diff.mines;
      started = false;
      gameOver = false;
      won = false;
      revealedCount = 0;
      flagCount = 0;
      elapsed = 0;
      clearInterval(timerInterval);
      timerInterval = null;

      board = [];
      for (var r = 0; r < rows; r++) {
        board[r] = [];
        for (var c = 0; c < cols; c++) {
          board[r][c] = { mine: false, revealed: false, flagged: false, count: 0 };
        }
      }

      updateHUD();
      statusEl.textContent = 'CLICK TO START';
      timerEl.innerHTML = '&#9201; 0:00';
      renderGrid();
    }

    function placeMines(safeR, safeC) {
      var placed = 0;
      while (placed < totalMines) {
        var r = Math.floor(Math.random() * rows);
        var c = Math.floor(Math.random() * cols);
        if (board[r][c].mine) continue;
        if (Math.abs(r - safeR) <= 1 && Math.abs(c - safeC) <= 1) continue;
        board[r][c].mine = true;
        placed++;
      }
      // Compute counts
      for (var r = 0; r < rows; r++) {
        for (var c = 0; c < cols; c++) {
          if (board[r][c].mine) continue;
          var count = 0;
          forNeighbors(r, c, function(nr, nc) {
            if (board[nr][nc].mine) count++;
          });
          board[r][c].count = count;
        }
      }
    }

    function forNeighbors(r, c, fn) {
      for (var dr = -1; dr <= 1; dr++) {
        for (var dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          var nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
            fn(nr, nc);
          }
        }
      }
    }

    function renderGrid() {
      gridEl.style.gridTemplateColumns = 'repeat(' + cols + ', 28px)';
      // Check for mobile
      if (window.innerWidth <= 480) {
        gridEl.style.gridTemplateColumns = 'repeat(' + cols + ', 24px)';
      }
      gridEl.innerHTML = '';
      for (var r = 0; r < rows; r++) {
        for (var c = 0; c < cols; c++) {
          var cell = document.createElement('div');
          cell.className = 'cell hidden';
          cell.setAttribute('data-r', r);
          cell.setAttribute('data-c', c);
          cell.addEventListener('click', onCellClick);
          cell.addEventListener('contextmenu', onCellRightClick);
          // Long press for mobile flagging
          (function(el, cr, cc) {
            var timer = null;
            el.addEventListener('touchstart', function(e) {
              timer = setTimeout(function() {
                e.preventDefault();
                toggleFlag(cr, cc);
                timer = null;
              }, 400);
            }, { passive: false });
            el.addEventListener('touchend', function() {
              if (timer) clearTimeout(timer);
            });
            el.addEventListener('touchmove', function() {
              if (timer) clearTimeout(timer);
            });
          })(cell, r, c);
          gridEl.appendChild(cell);
        }
      }
    }

    function getCellEl(r, c) {
      return gridEl.children[r * cols + c];
    }

    function onCellClick(e) {
      if (gameOver) return;
      var r = parseInt(this.getAttribute('data-r'));
      var c = parseInt(this.getAttribute('data-c'));
      if (board[r][c].flagged) return;

      if (!started) {
        started = true;
        placeMines(r, c);
        startTimer();
        statusEl.textContent = 'SWEEPING...';
      }

      reveal(r, c);
    }

    function onCellRightClick(e) {
      e.preventDefault();
      if (gameOver) return;
      var r = parseInt(this.getAttribute('data-r'));
      var c = parseInt(this.getAttribute('data-c'));
      toggleFlag(r, c);
    }

    function toggleFlag(r, c) {
      var cell = board[r][c];
      if (cell.revealed) return;
      cell.flagged = !cell.flagged;
      flagCount += cell.flagged ? 1 : -1;
      updateCellDisplay(r, c);
      updateHUD();
    }

    function reveal(r, c) {
      var cell = board[r][c];
      if (cell.revealed || cell.flagged) return;

      cell.revealed = true;
      revealedCount++;

      if (cell.mine) {
        endGame(false, r, c);
        return;
      }

      updateCellDisplay(r, c);

      // Flood fill for zeros
      if (cell.count === 0) {
        forNeighbors(r, c, function(nr, nc) {
          reveal(nr, nc);
        });
      }

      // Check win
      if (revealedCount === rows * cols - totalMines) {
        endGame(true);
      }
    }

    function updateCellDisplay(r, c) {
      var cell = board[r][c];
      var el = getCellEl(r, c);

      if (cell.flagged && !cell.revealed) {
        el.className = 'cell flagged';
        el.textContent = '\u2691'; // flag
        el.style.color = 'var(--accent-magenta, #ff2d7b)';
        el.style.textShadow = '0 0 8px var(--glow-magenta)';
        return;
      }

      if (!cell.revealed) {
        el.className = 'cell hidden';
        el.textContent = '';
        el.style.color = '';
        el.style.textShadow = '';
        return;
      }

      el.className = 'cell revealed';
      el.style.color = '';
      el.style.textShadow = '';

      if (cell.mine) {
        el.textContent = '\u2739'; // mine symbol
        el.style.color = 'var(--accent-magenta, #ff2d7b)';
        el.style.textShadow = '0 0 10px var(--glow-magenta)';
      } else if (cell.count > 0) {
        el.textContent = cell.count;
        el.className += ' n' + cell.count;
      } else {
        el.textContent = '';
      }
    }

    function endGame(isWin, hitR, hitC) {
      gameOver = true;
      won = isWin;
      clearInterval(timerInterval);

      if (isWin) {
        statusEl.textContent = 'CLEARED!';
        statusEl.style.color = 'var(--accent-green)';
        // Flag all remaining mines
        for (var r = 0; r < rows; r++) {
          for (var c = 0; c < cols; c++) {
            if (board[r][c].mine && !board[r][c].flagged) {
              board[r][c].flagged = true;
              flagCount++;
              updateCellDisplay(r, c);
            }
          }
        }
      } else {
        statusEl.textContent = 'DETONATED';
        statusEl.style.color = 'var(--accent-magenta)';
        // Show all mines
        for (var r = 0; r < rows; r++) {
          for (var c = 0; c < cols; c++) {
            var cell = board[r][c];
            var el = getCellEl(r, c);
            if (cell.mine) {
              cell.revealed = true;
              updateCellDisplay(r, c);
              if (r === hitR && c === hitC) {
                el.classList.add('mine-hit');
              } else {
                el.classList.add('mine-show');
              }
            } else if (cell.flagged) {
              // Wrong flag
              el.textContent = '\u2717'; // X
              el.style.color = '#7a7a90';
            }
          }
        }
      }

      updateHUD();

      // Show overlay after brief delay
      setTimeout(function() {
        msgTitle.textContent = isWin ? 'CLEARED' : 'BOOM';
        msgTitle.className = 'msg-title ' + (isWin ? 'win' : 'lose');
        var timeStr = formatTime(elapsed);
        if (isWin) {
          msgSub.textContent = 'Grid swept in ' + timeStr + ' \u00b7 ' + currentDiff.toUpperCase();
        } else {
          msgSub.textContent = 'Hit a mine at ' + timeStr + ' \u00b7 ' + currentDiff.toUpperCase();
        }
        overlay.classList.add('show');
      }, 600);
    }

    function startTimer() {
      elapsed = 0;
      clearInterval(timerInterval);
      timerInterval = setInterval(function() {
        elapsed++;
        timerEl.innerHTML = '&#9201; ' + formatTime(elapsed);
      }, 1000);
    }

    function formatTime(s) {
      var m = Math.floor(s / 60);
      var sec = s % 60;
      return m + ':' + (sec < 10 ? '0' : '') + sec;
    }

    function updateHUD() {
      var remaining = totalMines - flagCount;
      mineCountEl.innerHTML = '&#9881; ' + remaining;
    }

    // Start
    init();
  })();
  </script>
  <script src="../theme-toggle.js"></script>
</body>
</html>
