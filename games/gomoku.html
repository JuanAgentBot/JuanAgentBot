<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOMOKU / ZERO game lab</title>
  <meta name="theme-color" content="#0a0a0f">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared.css">
  <style>
    main {
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
      text-align: center;
    }

    .back {
      display: inline-block;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      margin-bottom: 1.5rem;
      text-align: left;
      width: 100%;
      transition: color 0.3s;
    }

    .back:hover { color: var(--accent-cyan); }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent-magenta);
      letter-spacing: 0.1em;
      margin-bottom: 0.3rem;
      text-shadow: 0 0 20px var(--glow-magenta);
    }

    .sub {
      color: var(--text-dim);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      margin-bottom: 1.2rem;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .controls button {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      padding: 0.4rem 0.8rem;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .controls button:hover {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }

    .controls button.active {
      border-color: var(--accent-magenta);
      color: var(--accent-magenta);
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.6rem;
      padding: 0 0.2rem;
    }

    .turn-indicator {
      font-size: 0.7rem;
      letter-spacing: 0.06em;
    }

    .score-display {
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.06em;
    }

    .board-wrapper {
      position: relative;
      display: inline-block;
      margin-bottom: 1rem;
    }

    canvas {
      display: block;
      border: 1px solid var(--border);
      cursor: crosshair;
    }

    .message {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      margin-bottom: 0.8rem;
      min-height: 1.4em;
    }

    .help {
      color: var(--text-dim);
      font-size: 0.6rem;
      letter-spacing: 0.05em;
      line-height: 1.6;
      margin-top: 1rem;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }
  </style>
  <script>(function(){var t=localStorage.getItem('zero-theme');if(!t&&window.matchMedia('(prefers-color-scheme:light)').matches)t='light';if(t==='light')document.documentElement.setAttribute('data-theme','light')})()</script>
</head>
<body>
  <main>
    <a href="./" class="back">&lt; GAME LAB</a>
    <h1>GOMOKU</h1>
    <p class="sub">FIVE IN A ROW</p>

    <div class="controls">
      <button id="btn-easy" class="active" onclick="setDifficulty(0)">EASY</button>
      <button id="btn-medium" onclick="setDifficulty(1)">MEDIUM</button>
      <button id="btn-hard" onclick="setDifficulty(2)">HARD</button>
      <button id="btn-new" onclick="newGame()">NEW GAME</button>
    </div>

    <div class="status-bar">
      <div class="turn-indicator" id="turn"></div>
      <div class="score-display" id="score"></div>
    </div>

    <div class="board-wrapper">
      <canvas id="board"></canvas>
    </div>

    <div class="message" id="msg"></div>

    <div class="help">
      CLICK TO PLACE A STONE &middot; GET FIVE IN A ROW TO WIN<br>
      HORIZONTAL, VERTICAL, OR DIAGONAL &middot; YOU ARE CYAN, CPU IS MAGENTA
    </div>
  </main>

  <script>
  (function() {
    const SIZE = 15;
    const EMPTY = 0, PLAYER = 1, CPU = 2;

    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const msgEl = document.getElementById('msg');
    const turnEl = document.getElementById('turn');
    const scoreEl = document.getElementById('score');

    // Colors - read from CSS vars with fallbacks
    const style = getComputedStyle(document.documentElement);
    function cv(name, fallback) { return style.getPropertyValue(name).trim() || fallback; }

    let CYAN, MAGENTA, GREEN, PURPLE, BG, GRID_COLOR, TEXT_COLOR, DIM;
    function loadColors() {
      const s = getComputedStyle(document.documentElement);
      CYAN = s.getPropertyValue('--accent-cyan').trim() || '#00f0ff';
      MAGENTA = s.getPropertyValue('--accent-magenta').trim() || '#ff2d7b';
      GREEN = s.getPropertyValue('--accent-green').trim() || '#39ff14';
      PURPLE = s.getPropertyValue('--accent-purple').trim() || '#9d4edd';
      BG = s.getPropertyValue('--bg-primary').trim() || '#0a0a0f';
      GRID_COLOR = s.getPropertyValue('--border').trim() || '#7a7a90';
      TEXT_COLOR = s.getPropertyValue('--text-bright').trim() || '#e0e0e8';
      DIM = s.getPropertyValue('--text-dim').trim() || '#7a7a90';
    }
    loadColors();

    let grid, gameOver, difficulty, hoverR, hoverC;
    let scores = { player: 0, cpu: 0, draw: 0 };
    let currentTurn;
    let lastMove = null;
    let winLine = null;
    let cellSize, padding, boardPx;

    // Difficulty: 0=easy, 1=medium, 2=hard
    difficulty = 0;

    function calcSizes() {
      const maxW = Math.min(560, window.innerWidth - 32);
      padding = 20;
      cellSize = Math.floor((maxW - padding * 2) / (SIZE - 1));
      boardPx = cellSize * (SIZE - 1) + padding * 2;
      canvas.width = boardPx;
      canvas.height = boardPx;
    }

    function toPixel(rc) {
      return padding + rc * cellSize;
    }

    function toGrid(px) {
      const g = Math.round((px - padding) / cellSize);
      return Math.max(0, Math.min(SIZE - 1, g));
    }

    function newGame() {
      grid = [];
      for (let r = 0; r < SIZE; r++) {
        grid[r] = [];
        for (let c = 0; c < SIZE; c++) grid[r][c] = EMPTY;
      }
      gameOver = false;
      currentTurn = PLAYER;
      lastMove = null;
      winLine = null;
      hoverR = -1;
      hoverC = -1;
      setMsg('');
      updateStatus();
      draw();
    }

    function setMsg(text, color) {
      msgEl.textContent = text;
      msgEl.style.color = color || TEXT_COLOR;
      if (color) {
        msgEl.style.textShadow = '0 0 10px ' + color;
      } else {
        msgEl.style.textShadow = 'none';
      }
    }

    function updateStatus() {
      if (gameOver) {
        turnEl.textContent = '';
      } else {
        turnEl.innerHTML = currentTurn === PLAYER
          ? '<span style="color:' + CYAN + '">&#9679;</span> YOUR TURN'
          : '<span style="color:' + MAGENTA + '">&#9679;</span> CPU THINKING...';
      }
      scoreEl.textContent = 'W ' + scores.player + ' / L ' + scores.cpu + ' / D ' + scores.draw;
    }

    window.setDifficulty = function(d) {
      difficulty = d;
      document.getElementById('btn-easy').className = d === 0 ? 'active' : '';
      document.getElementById('btn-medium').className = d === 1 ? 'active' : '';
      document.getElementById('btn-hard').className = d === 2 ? 'active' : '';
      newGame();
    };

    window.newGame = newGame;

    // --- Drawing ---
    function draw() {
      loadColors();
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, boardPx, boardPx);

      // Grid lines
      ctx.strokeStyle = GRID_COLOR;
      ctx.lineWidth = 0.5;
      for (let i = 0; i < SIZE; i++) {
        const p = toPixel(i);
        ctx.beginPath();
        ctx.moveTo(padding, p);
        ctx.lineTo(boardPx - padding, p);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(p, padding);
        ctx.lineTo(p, boardPx - padding);
        ctx.stroke();
      }

      // Star points (for 15x15 board: center and 4 corners of the 3rd line)
      const stars = [[3,3],[3,11],[7,7],[11,3],[11,11]];
      ctx.fillStyle = GRID_COLOR;
      for (const [r,c] of stars) {
        ctx.beginPath();
        ctx.arc(toPixel(c), toPixel(r), 3, 0, Math.PI * 2);
        ctx.fill();
      }

      // Hover indicator
      if (!gameOver && currentTurn === PLAYER && hoverR >= 0 && hoverC >= 0 && grid[hoverR][hoverC] === EMPTY) {
        ctx.fillStyle = CYAN;
        ctx.globalAlpha = 0.25;
        ctx.beginPath();
        ctx.arc(toPixel(hoverC), toPixel(hoverR), cellSize * 0.38, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      // Stones
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (grid[r][c] !== EMPTY) {
            drawStone(r, c, grid[r][c]);
          }
        }
      }

      // Win line highlight
      if (winLine) {
        ctx.strokeStyle = GREEN;
        ctx.lineWidth = 3;
        ctx.shadowColor = GREEN;
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.moveTo(toPixel(winLine[0][1]), toPixel(winLine[0][0]));
        ctx.lineTo(toPixel(winLine[4][1]), toPixel(winLine[4][0]));
        ctx.stroke();
        ctx.shadowBlur = 0;
      }

      // Last move marker
      if (lastMove) {
        const [lr, lc] = lastMove;
        ctx.strokeStyle = GREEN;
        ctx.lineWidth = 2;
        ctx.shadowColor = GREEN;
        ctx.shadowBlur = 6;
        const x = toPixel(lc), y = toPixel(lr), s = 4;
        ctx.beginPath();
        ctx.moveTo(x - s, y - s);
        ctx.lineTo(x + s, y - s);
        ctx.lineTo(x + s, y + s);
        ctx.lineTo(x - s, y + s);
        ctx.closePath();
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
    }

    function drawStone(r, c, who) {
      const x = toPixel(c), y = toPixel(r);
      const radius = cellSize * 0.38;
      const color = who === PLAYER ? CYAN : MAGENTA;

      // Glow
      ctx.shadowColor = color;
      ctx.shadowBlur = 10;

      // Stone body
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();

      // Inner highlight
      ctx.shadowBlur = 0;
      ctx.fillStyle = who === PLAYER ? 'rgba(0,240,255,0.3)' : 'rgba(255,45,123,0.3)';
      ctx.beginPath();
      ctx.arc(x - radius * 0.2, y - radius * 0.2, radius * 0.45, 0, Math.PI * 2);
      ctx.fill();
    }

    // --- Input ---
    canvas.addEventListener('mousemove', function(e) {
      const rect = canvas.getBoundingClientRect();
      const sx = canvas.width / rect.width;
      const sy = canvas.height / rect.height;
      hoverR = toGrid((e.clientY - rect.top) * sy);
      hoverC = toGrid((e.clientX - rect.left) * sx);
      draw();
    });

    canvas.addEventListener('mouseleave', function() {
      hoverR = -1;
      hoverC = -1;
      draw();
    });

    canvas.addEventListener('click', function(e) {
      if (gameOver || currentTurn !== PLAYER) return;
      const rect = canvas.getBoundingClientRect();
      const sx = canvas.width / rect.width;
      const sy = canvas.height / rect.height;
      const r = toGrid((e.clientY - rect.top) * sy);
      const c = toGrid((e.clientX - rect.left) * sx);
      if (grid[r][c] !== EMPTY) return;
      placeStone(r, c, PLAYER);
    });

    // Touch support
    canvas.addEventListener('touchstart', function(e) {
      e.preventDefault();
      if (gameOver || currentTurn !== PLAYER) return;
      const touch = e.touches[0];
      const rect = canvas.getBoundingClientRect();
      const sx = canvas.width / rect.width;
      const sy = canvas.height / rect.height;
      const r = toGrid((touch.clientY - rect.top) * sy);
      const c = toGrid((touch.clientX - rect.left) * sx);
      if (grid[r][c] !== EMPTY) return;
      placeStone(r, c, PLAYER);
    });

    function placeStone(r, c, who) {
      grid[r][c] = who;
      lastMove = [r, c];

      const win = checkWin(r, c, who);
      if (win) {
        winLine = win;
        gameOver = true;
        if (who === PLAYER) {
          scores.player++;
          setMsg('YOU WIN!', CYAN);
        } else {
          scores.cpu++;
          setMsg('CPU WINS', MAGENTA);
        }
        updateStatus();
        draw();
        return;
      }

      if (isFull()) {
        gameOver = true;
        scores.draw++;
        setMsg('DRAW', PURPLE);
        updateStatus();
        draw();
        return;
      }

      currentTurn = who === PLAYER ? CPU : PLAYER;
      updateStatus();
      draw();

      if (currentTurn === CPU) {
        setTimeout(cpuMove, 200 + Math.random() * 300);
      }
    }

    function isFull() {
      for (let r = 0; r < SIZE; r++)
        for (let c = 0; c < SIZE; c++)
          if (grid[r][c] === EMPTY) return false;
      return true;
    }

    // --- Win check ---
    const DIRS = [[0,1],[1,0],[1,1],[1,-1]];

    function checkWin(r, c, who) {
      for (const [dr, dc] of DIRS) {
        const line = [[r, c]];
        // Forward
        for (let i = 1; i < 5; i++) {
          const nr = r + dr * i, nc = c + dc * i;
          if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE || grid[nr][nc] !== who) break;
          line.push([nr, nc]);
        }
        // Backward
        for (let i = 1; i < 5; i++) {
          const nr = r - dr * i, nc = c - dc * i;
          if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE || grid[nr][nc] !== who) break;
          line.unshift([nr, nc]);
        }
        if (line.length >= 5) {
          return line.slice(0, 5);
        }
      }
      return null;
    }

    // --- CPU AI ---
    function cpuMove() {
      if (gameOver) return;
      const move = findBestMove();
      if (move) placeStone(move[0], move[1], CPU);
    }

    function findBestMove() {
      // Get candidate moves (near existing stones)
      const candidates = getCandidates();
      if (candidates.length === 0) {
        // First move: play center
        return [7, 7];
      }

      let bestScore = -Infinity;
      let bestMoves = [];

      for (const [r, c] of candidates) {
        const score = evaluateMove(r, c);
        if (score > bestScore) {
          bestScore = score;
          bestMoves = [[r, c]];
        } else if (score === bestScore) {
          bestMoves.push([r, c]);
        }
      }

      // Add some randomness for easy mode
      if (difficulty === 0 && Math.random() < 0.3 && candidates.length > 1) {
        return candidates[Math.floor(Math.random() * candidates.length)];
      }

      return bestMoves[Math.floor(Math.random() * bestMoves.length)];
    }

    function getCandidates() {
      const seen = new Set();
      const cands = [];
      const range = difficulty >= 2 ? 2 : 1;

      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (grid[r][c] !== EMPTY) {
            for (let dr = -range; dr <= range; dr++) {
              for (let dc = -range; dc <= range; dc++) {
                const nr = r + dr, nc = c + dc;
                if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && grid[nr][nc] === EMPTY) {
                  const key = nr * SIZE + nc;
                  if (!seen.has(key)) {
                    seen.add(key);
                    cands.push([nr, nc]);
                  }
                }
              }
            }
          }
        }
      }
      return cands;
    }

    function evaluateMove(r, c) {
      // Score for CPU placing here
      grid[r][c] = CPU;
      const cpuScore = evaluatePosition(r, c, CPU);
      grid[r][c] = EMPTY;

      // Score for blocking player
      grid[r][c] = PLAYER;
      const playerScore = evaluatePosition(r, c, PLAYER);
      grid[r][c] = EMPTY;

      // Offense vs defense weight by difficulty
      const offenseWeight = difficulty === 0 ? 1.0 : difficulty === 1 ? 1.1 : 1.15;
      const defenseWeight = difficulty === 0 ? 0.9 : difficulty === 1 ? 1.05 : 1.1;

      return cpuScore * offenseWeight + playerScore * defenseWeight;
    }

    function evaluatePosition(r, c, who) {
      let total = 0;

      for (const [dr, dc] of DIRS) {
        const { count, openEnds, gaps } = countLine(r, c, dr, dc, who);

        // Scoring: prioritize longer lines and open ends
        if (count >= 5) {
          total += 1000000; // Win
        } else if (count === 4) {
          if (openEnds === 2) total += 50000; // Open four - almost unstoppable
          else if (openEnds === 1) total += 5000; // Half-open four
        } else if (count === 3) {
          if (openEnds === 2) total += 5000; // Open three - very strong
          else if (openEnds === 1) total += 500;
        } else if (count === 2) {
          if (openEnds === 2) total += 200;
          else if (openEnds === 1) total += 30;
        } else if (count === 1) {
          if (openEnds === 2) total += 10;
          else if (openEnds === 1) total += 2;
        }
      }

      // Center proximity bonus
      const centerDist = Math.abs(r - 7) + Math.abs(c - 7);
      total += Math.max(0, 14 - centerDist);

      return total;
    }

    function countLine(r, c, dr, dc, who) {
      let count = 1;
      let openEnds = 0;

      // Forward
      let fr = r + dr, fc = c + dc;
      while (fr >= 0 && fr < SIZE && fc >= 0 && fc < SIZE && grid[fr][fc] === who) {
        count++;
        fr += dr;
        fc += dc;
      }
      if (fr >= 0 && fr < SIZE && fc >= 0 && fc < SIZE && grid[fr][fc] === EMPTY) {
        openEnds++;
      }

      // Backward
      let br = r - dr, bc = c - dc;
      while (br >= 0 && br < SIZE && bc >= 0 && bc < SIZE && grid[br][bc] === who) {
        count++;
        br -= dr;
        bc -= dc;
      }
      if (br >= 0 && br < SIZE && bc >= 0 && bc < SIZE && grid[br][bc] === EMPTY) {
        openEnds++;
      }

      return { count, openEnds };
    }

    // --- Init ---
    function init() {
      calcSizes();
      newGame();
    }

    window.addEventListener('resize', function() {
      calcSizes();
      draw();
    });

    init();
  })();
  </script>
  <script src="../theme-toggle.js"></script>
</body>
</html>
