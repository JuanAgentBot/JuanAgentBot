<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLOCK PUZZLE / ZERO game lab</title>
  <meta name="theme-color" content="#0a0a0f">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared.css">
  <style>
    * { touch-action: manipulation; }
    main {
      max-width: 520px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      text-align: center;
      user-select: none;
      overflow-x: hidden;
    }
    .back {
      display: inline-block;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      margin-bottom: 1.5rem;
      text-align: left;
      width: 100%;
    }
    .back:hover { color: var(--accent-cyan); }
    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent-magenta);
      letter-spacing: 0.1em;
      margin: 0 0 0.3rem;
      text-shadow: 0 0 20px var(--glow-magenta);
    }
    .score-row {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin: 0.8rem 0 1rem;
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 0.06em;
    }
    .score-row span { color: var(--accent-cyan); font-weight: 700; }

    #board-wrap {
      position: relative;
      display: inline-block;
      margin: 0 auto;
      max-width: 100%;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 2px;
      border: 1px solid var(--border);
      padding: 2px;
      background: var(--border);
      max-width: 100%;
      box-sizing: border-box;
    }
    .cell {
      width: 100%;
      aspect-ratio: 1;
      background: var(--bg);
      transition: background 0.1s, box-shadow 0.1s;
    }
    .cell.filled { box-shadow: inset 0 0 6px rgba(0,0,0,0.4); }
    .cell.preview {
      background: rgba(0, 240, 255, 0.25);
      box-shadow: inset 0 0 8px rgba(0, 240, 255, 0.15);
    }
    .cell.preview-bad {
      background: rgba(255, 23, 68, 0.2);
    }
    .cell.clearing {
      animation: clearFlash 0.35s ease-out;
    }
    @keyframes clearFlash {
      0% { filter: brightness(2); transform: scale(1.1); }
      100% { filter: brightness(1); transform: scale(1); }
    }

    #pieces-tray {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      margin: 1.2rem auto 0;
      min-height: 90px;
      align-items: center;
      flex-wrap: wrap;
    }
    .piece-holder {
      display: inline-grid;
      gap: 2px;
      padding: 8px;
      border: 1px solid transparent;
      cursor: grab;
      min-width: 44px;
      min-height: 44px;
      transition: border-color 0.2s, transform 0.15s, opacity 0.2s;
    }
    .piece-holder:hover {
      border-color: var(--accent-cyan);
      transform: scale(1.08);
    }
    .piece-holder.selected {
      border-color: var(--accent-magenta);
      box-shadow: 0 0 12px var(--glow-magenta-soft);
      transform: scale(1.1);
    }
    .piece-holder.used {
      opacity: 0.15;
      pointer-events: none;
      cursor: default;
    }
    .pblock {
      width: 16px;
      height: 16px;
    }
    .pblock.on { box-shadow: inset 0 0 4px rgba(0,0,0,0.3); }
    .pblock.off { background: transparent; }

    .controls {
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-top: 1rem;
      line-height: 1.6;
      letter-spacing: 0.04em;
    }

    @media (max-width: 480px) {
      main { padding: 1rem 0.75rem 3rem; }
      h1 { font-size: 1.2rem; }
      .score-row { gap: 1rem; font-size: 0.7rem; }
      #pieces-tray { gap: 0.8rem; }
    }

    #overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10,10,15,0.92);
      z-index: 100;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    #overlay.show { display: flex; }
    #overlay h2 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent-magenta);
      letter-spacing: 0.1em;
      margin-bottom: 0.8rem;
      text-shadow: 0 0 20px var(--glow-magenta);
    }
    #overlay .final-score {
      font-size: 1rem;
      color: var(--accent-cyan);
      margin-bottom: 0.5rem;
    }
    #overlay .final-best {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-bottom: 1.5rem;
    }
    #overlay button {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--bg);
      background: var(--accent-magenta);
      border: none;
      padding: 0.7rem 2rem;
      min-height: 44px;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: background 0.2s;
    }
    #overlay button:hover { background: var(--accent-cyan); }
  </style>
  <script>(function(){var t=localStorage.getItem('zero-theme');if(!t&&window.matchMedia('(prefers-color-scheme:light)').matches)t='light';if(t==='light')document.documentElement.setAttribute('data-theme','light')})()</script>
</head>
<body>
  <main>
    <a href="./" class="back">&lt; GAME LAB</a>
    <h1>BLOCK PUZZLE</h1>
    <div class="score-row">
      <div>SCORE <span id="score">0</span></div>
      <div>BEST <span id="best">0</span></div>
      <div>LINES <span id="lines">0</span></div>
    </div>

    <div id="board-wrap">
      <div id="board"></div>
    </div>

    <div id="pieces-tray"></div>

    <div class="controls">
      TAP A PIECE, THEN TAP THE BOARD TO PLACE IT<br>
      FILL A ROW OR COLUMN TO CLEAR IT<br>
      GAME OVER WHEN NO PIECE FITS
    </div>

    <div id="overlay">
      <h2>GAME OVER</h2>
      <div class="final-score">SCORE: <span id="final-score">0</span></div>
      <div class="final-best">BEST: <span id="final-best">0</span></div>
      <button id="restart-btn">PLAY AGAIN</button>
    </div>
  </main>

  <script>
  (function() {
    'use strict';

    const COLS = 10, ROWS = 10;
    const COLORS = ['#ff2d7b','#00f0ff','#39ff14','#9d4edd','#ff6ac1','#ffb000'];
    const BEST_KEY = 'zero-block-puzzle-best';

    // Piece shapes: each is array of [row, col] offsets
    const SHAPES = [
      // Singles
      { cells: [[0,0]], name: '1x1' },
      // Lines
      { cells: [[0,0],[0,1]], name: '1x2' },
      { cells: [[0,0],[1,0]], name: '2x1' },
      { cells: [[0,0],[0,1],[0,2]], name: '1x3' },
      { cells: [[0,0],[1,0],[2,0]], name: '3x1' },
      { cells: [[0,0],[0,1],[0,2],[0,3]], name: '1x4' },
      { cells: [[0,0],[1,0],[2,0],[3,0]], name: '4x1' },
      { cells: [[0,0],[0,1],[0,2],[0,3],[0,4]], name: '1x5' },
      { cells: [[0,0],[1,0],[2,0],[3,0],[4,0]], name: '5x1' },
      // Squares
      { cells: [[0,0],[0,1],[1,0],[1,1]], name: '2x2' },
      { cells: [[0,0],[0,1],[0,2],[1,0],[1,1],[1,2],[2,0],[2,1],[2,2]], name: '3x3' },
      // L shapes
      { cells: [[0,0],[1,0],[1,1]], name: 'L1' },
      { cells: [[0,0],[0,1],[1,0]], name: 'L2' },
      { cells: [[0,0],[0,1],[1,1]], name: 'L3' },
      { cells: [[0,0],[1,0],[1,-1]], name: 'L4' },
      // Big L shapes
      { cells: [[0,0],[1,0],[2,0],[2,1],[2,2]], name: 'BL1' },
      { cells: [[0,0],[0,1],[0,2],[1,0],[2,0]], name: 'BL2' },
      { cells: [[0,0],[0,1],[0,2],[1,2],[2,2]], name: 'BL3' },
      { cells: [[0,0],[1,0],[2,0],[2,-1],[2,-2]], name: 'BL4' },
      // T shapes
      { cells: [[0,0],[0,1],[0,2],[1,1]], name: 'T1' },
      { cells: [[0,0],[1,0],[1,1],[2,0]], name: 'T2' },
      { cells: [[0,1],[1,0],[1,1],[1,2]], name: 'T3' },
      { cells: [[0,0],[1,0],[1,-1],[2,0]], name: 'T4' },
      // S/Z shapes
      { cells: [[0,0],[0,1],[1,1],[1,2]], name: 'S1' },
      { cells: [[0,1],[0,2],[1,0],[1,1]], name: 'Z1' },
      { cells: [[0,0],[1,0],[1,1],[2,1]], name: 'S2' },
      { cells: [[0,1],[1,0],[1,1],[2,0]], name: 'Z2' },
      // Plus
      { cells: [[0,1],[1,0],[1,1],[1,2],[2,1]], name: 'plus' },
    ];

    let grid = [];
    let score = 0;
    let linesCleared = 0;
    let best = parseInt(localStorage.getItem(BEST_KEY)) || 0;
    let pieces = []; // current 3 pieces
    let selectedPiece = -1;

    const boardEl = document.getElementById('board');
    const trayEl = document.getElementById('pieces-tray');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const linesEl = document.getElementById('lines');
    const overlay = document.getElementById('overlay');
    const finalScoreEl = document.getElementById('final-score');
    const finalBestEl = document.getElementById('final-best');
    const restartBtn = document.getElementById('restart-btn');

    function init() {
      grid = Array.from({length: ROWS}, () => Array(COLS).fill(null));
      score = 0;
      linesCleared = 0;
      selectedPiece = -1;
      bestEl.textContent = best;
      updateScore(0);
      buildBoard();
      dealPieces();
      overlay.classList.remove('show');
    }

    function buildBoard() {
      boardEl.innerHTML = '';
      const w = Math.min(360, window.innerWidth - 24);
      boardEl.style.width = w + 'px';
      boardEl.style.height = w + 'px';
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.dataset.r = r;
          cell.dataset.c = c;
          cell.addEventListener('click', () => placeAt(r, c));
          cell.addEventListener('mouseenter', () => showPreview(r, c));
          cell.addEventListener('mouseleave', clearPreview);
          boardEl.appendChild(cell);
        }
      }
      // Touch support: drag finger over board to preview, lift to place
      boardEl.addEventListener('touchstart', handleBoardTouch, {passive: false});
      boardEl.addEventListener('touchmove', handleBoardTouch, {passive: false});
      boardEl.addEventListener('touchend', handleBoardTouchEnd, {passive: false});
      renderGrid();
    }

    let lastTouchCell = null;

    function getCellFromTouch(e) {
      const touch = e.touches[0] || e.changedTouches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      if (el && el.classList.contains('cell') && el.dataset.r !== undefined) {
        return { r: parseInt(el.dataset.r), c: parseInt(el.dataset.c) };
      }
      return null;
    }

    function handleBoardTouch(e) {
      if (selectedPiece < 0) return;
      e.preventDefault();
      const cell = getCellFromTouch(e);
      if (cell) {
        const key = cell.r + ',' + cell.c;
        if (lastTouchCell !== key) {
          clearPreview();
          showPreview(cell.r, cell.c);
          lastTouchCell = key;
        }
      }
    }

    function handleBoardTouchEnd(e) {
      if (selectedPiece < 0) return;
      e.preventDefault();
      const cell = getCellFromTouch(e);
      if (cell) {
        placeAt(cell.r, cell.c);
      }
      clearPreview();
      lastTouchCell = null;
    }

    function renderGrid() {
      const cells = boardEl.children;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = cells[r * COLS + c];
          const val = grid[r][c];
          cell.className = 'cell' + (val ? ' filled' : '');
          cell.style.background = val || '';
        }
      }
    }

    function normalizeShape(cells) {
      const minR = Math.min(...cells.map(c => c[0]));
      const minC = Math.min(...cells.map(c => c[1]));
      return cells.map(([r,c]) => [r - minR, c - minC]);
    }

    function randomPiece() {
      const shape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
      const color = COLORS[Math.floor(Math.random() * COLORS.length)];
      return {
        cells: normalizeShape(shape.cells),
        color: color,
        used: false
      };
    }

    function dealPieces() {
      pieces = [randomPiece(), randomPiece(), randomPiece()];
      selectedPiece = -1;
      renderTray();
      checkGameOver();
    }

    function renderTray() {
      trayEl.innerHTML = '';
      pieces.forEach((p, idx) => {
        const maxR = Math.max(...p.cells.map(c => c[0])) + 1;
        const maxC = Math.max(...p.cells.map(c => c[1])) + 1;
        const holder = document.createElement('div');
        holder.className = 'piece-holder' + (p.used ? ' used' : '') + (idx === selectedPiece ? ' selected' : '');
        holder.style.gridTemplateColumns = `repeat(${maxC}, 18px)`;
        holder.style.gridTemplateRows = `repeat(${maxR}, 18px)`;
        if (!p.used) {
          holder.addEventListener('click', (e) => {
            e.stopPropagation();
            selectedPiece = (selectedPiece === idx) ? -1 : idx;
            renderTray();
          });
        }
        // Fill grid
        const set = new Set(p.cells.map(([r,c]) => r+','+c));
        for (let r = 0; r < maxR; r++) {
          for (let c = 0; c < maxC; c++) {
            const b = document.createElement('div');
            b.className = 'pblock ' + (set.has(r+','+c) ? 'on' : 'off');
            if (set.has(r+','+c)) b.style.background = p.color;
            holder.appendChild(b);
          }
        }
        trayEl.appendChild(holder);
      });
    }

    function canPlace(piece, startR, startC) {
      for (const [dr, dc] of piece.cells) {
        const r = startR + dr, c = startC + dc;
        if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return false;
        if (grid[r][c]) return false;
      }
      return true;
    }

    function canPlaceAnywhere(piece) {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (canPlace(piece, r, c)) return true;
        }
      }
      return false;
    }

    function showPreview(r, c) {
      clearPreview();
      if (selectedPiece < 0 || pieces[selectedPiece].used) return;
      const piece = pieces[selectedPiece];
      const valid = canPlace(piece, r, c);
      for (const [dr, dc] of piece.cells) {
        const pr = r + dr, pc = c + dc;
        if (pr >= 0 && pr < ROWS && pc >= 0 && pc < COLS) {
          const cell = boardEl.children[pr * COLS + pc];
          if (!grid[pr][pc]) {
            cell.classList.add(valid ? 'preview' : 'preview-bad');
          }
        }
      }
    }

    function clearPreview() {
      for (const cell of boardEl.children) {
        cell.classList.remove('preview', 'preview-bad');
      }
    }

    function placeAt(r, c) {
      if (selectedPiece < 0 || pieces[selectedPiece].used) return;
      const piece = pieces[selectedPiece];
      if (!canPlace(piece, r, c)) return;

      // Place piece
      for (const [dr, dc] of piece.cells) {
        grid[r + dr][c + dc] = piece.color;
      }
      const placePoints = piece.cells.length;
      piece.used = true;
      selectedPiece = -1;
      clearPreview();
      renderGrid();
      renderTray();

      // Check for completed lines
      setTimeout(() => {
        const cleared = clearLines();
        const linePoints = cleared * COLS * 2;
        const comboBonus = cleared > 1 ? cleared * cleared * 5 : 0;
        updateScore(placePoints + linePoints + comboBonus);

        // Check if all 3 pieces are used -> deal new ones
        if (pieces.every(p => p.used)) {
          setTimeout(dealPieces, 200);
        } else {
          checkGameOver();
        }
      }, 50);
    }

    function clearLines() {
      let rowsToClear = [];
      let colsToClear = [];

      for (let r = 0; r < ROWS; r++) {
        if (grid[r].every(cell => cell !== null)) rowsToClear.push(r);
      }
      for (let c = 0; c < COLS; c++) {
        let full = true;
        for (let r = 0; r < ROWS; r++) {
          if (!grid[r][c]) { full = false; break; }
        }
        if (full) colsToClear.push(c);
      }

      if (rowsToClear.length === 0 && colsToClear.length === 0) return 0;

      // Flash animation
      const cellsToFlash = new Set();
      for (const r of rowsToClear) {
        for (let c = 0; c < COLS; c++) cellsToFlash.add(r * COLS + c);
      }
      for (const c of colsToClear) {
        for (let r = 0; r < ROWS; r++) cellsToFlash.add(r * COLS + c);
      }
      for (const idx of cellsToFlash) {
        boardEl.children[idx].classList.add('clearing');
      }

      // Clear after animation
      setTimeout(() => {
        for (const r of rowsToClear) {
          for (let c = 0; c < COLS; c++) grid[r][c] = null;
        }
        for (const c of colsToClear) {
          for (let r = 0; r < ROWS; r++) grid[r][c] = null;
        }
        renderGrid();
      }, 300);

      const total = rowsToClear.length + colsToClear.length;
      linesCleared += total;
      linesEl.textContent = linesCleared;
      return total;
    }

    function updateScore(add) {
      score += add;
      scoreEl.textContent = score;
      if (score > best) {
        best = score;
        bestEl.textContent = best;
        localStorage.setItem(BEST_KEY, best);
      }
    }

    function checkGameOver() {
      const remaining = pieces.filter(p => !p.used);
      if (remaining.length === 0) return;
      const anyFits = remaining.some(p => canPlaceAnywhere(p));
      if (!anyFits) {
        setTimeout(gameOver, 400);
      }
    }

    function gameOver() {
      finalScoreEl.textContent = score;
      finalBestEl.textContent = best;
      overlay.classList.add('show');
    }

    restartBtn.addEventListener('click', init);
    window.addEventListener('resize', () => {
      buildBoard();
      renderTray();
    });

    init();
  })();
  </script>
</body>
</html>
