<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONNECT 4 / ZERO game lab</title>
  <meta name="theme-color" content="#0a0a0f">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared.css">
  <style>
    main {
      max-width: 520px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      text-align: center;
    }

    .back {
      display: inline-block;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      margin-bottom: 1.5rem;
      text-align: left;
      width: 100%;
      transition: color 0.3s;
    }

    .back:hover {
      color: var(--accent-cyan);
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--accent-magenta);
      letter-spacing: 0.1em;
      margin-bottom: 0.4rem;
      text-shadow: 0 0 20px var(--glow-magenta);
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
    }

    .controls-info {
      color: var(--text-dim);
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    .controls-info kbd {
      color: var(--accent-cyan);
      border: 1px solid var(--border);
      padding: 0.1em 0.4em;
      font-family: inherit;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding: 0.6rem 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .status-player {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.06em;
    }

    .status-score {
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.04em;
    }

    .score-cyan { color: #00f0ff; }
    .score-magenta { color: #ff2d7b; }

    .board-wrap {
      display: inline-block;
      position: relative;
    }

    .column-indicators {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 4px;
      padding: 0 2px;
    }

    .col-indicator {
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.2s;
      opacity: 0;
    }

    .col-indicator.active {
      opacity: 1;
    }

    .col-indicator .arrow {
      font-size: 1rem;
      color: #00f0ff;
      text-shadow: 0 0 8px rgba(0, 240, 255, 0.5);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      padding: 8px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
    }

    .cell {
      width: 56px;
      height: 56px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .cell:hover {
      border-color: #7a7a90;
    }

    .cell.disabled {
      cursor: default;
    }

    .disc {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      transition: transform 0.15s ease-out, opacity 0.15s;
    }

    .disc.cyan {
      background: #00f0ff;
      box-shadow: 0 0 12px rgba(0, 240, 255, 0.5), inset 0 -3px 6px rgba(0, 0, 0, 0.3);
    }

    .disc.magenta {
      background: #ff2d7b;
      box-shadow: 0 0 12px rgba(255, 45, 123, 0.5), inset 0 -3px 6px rgba(0, 0, 0, 0.3);
    }

    .disc.winning {
      animation: pulse-win 0.6s ease-in-out infinite alternate;
    }

    .disc.cyan.winning {
      animation-name: pulse-cyan;
    }

    .disc.magenta.winning {
      animation-name: pulse-magenta;
    }

    @keyframes pulse-cyan {
      from { box-shadow: 0 0 12px rgba(0, 240, 255, 0.5); }
      to { box-shadow: 0 0 30px rgba(0, 240, 255, 0.9), 0 0 60px rgba(0, 240, 255, 0.3); }
    }

    @keyframes pulse-magenta {
      from { box-shadow: 0 0 12px rgba(255, 45, 123, 0.5); }
      to { box-shadow: 0 0 30px rgba(255, 45, 123, 0.9), 0 0 60px rgba(255, 45, 123, 0.3); }
    }

    @keyframes drop {
      from { transform: translateY(-300px); opacity: 0; }
      50% { opacity: 1; }
      to { transform: translateY(0); }
    }

    .disc.dropping {
      animation: drop 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    .message {
      margin-top: 1.2rem;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      min-height: 1.5em;
    }

    .message.cyan { color: #00f0ff; text-shadow: 0 0 10px rgba(0, 240, 255, 0.5); }
    .message.magenta { color: #ff2d7b; text-shadow: 0 0 10px rgba(255, 45, 123, 0.5); }
    .message.draw { color: #9d4edd; text-shadow: 0 0 10px rgba(157, 78, 221, 0.5); }
    .message.green { color: #39ff14; text-shadow: 0 0 10px rgba(57, 255, 20, 0.5); }

    .btn-row {
      margin-top: 1.2rem;
      display: flex;
      gap: 0.8rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 0.5rem 1.2rem;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-bright);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, box-shadow 0.2s;
    }

    button:hover {
      border-color: #00f0ff;
      color: #00f0ff;
      box-shadow: 0 0 12px rgba(0, 240, 255, 0.2);
    }

    button.active {
      border-color: #39ff14;
      color: #39ff14;
    }

    .difficulty-label {
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      margin-top: 1rem;
      margin-bottom: 0.5rem;
    }

    @media (max-width: 480px) {
      .cell {
        width: 42px;
        height: 42px;
      }
      .disc {
        width: 32px;
        height: 32px;
      }
      h1 { font-size: 1.4rem; }
    }
  </style>
  <script>(function(){var t=localStorage.getItem('zero-theme');if(!t&&window.matchMedia('(prefers-color-scheme:light)').matches)t='light';if(t==='light')document.documentElement.setAttribute('data-theme','light')})()</script>
</head>
<body>
  <main>
    <a href="./" class="back">&lt; GAME LAB</a>
    <h1>CONNECT 4</h1>
    <p class="subtitle">DROP DISCS, LINE UP FOUR, BEAT THE CPU</p>
    <p class="controls-info">
      <kbd>1</kbd>-<kbd>7</kbd> or <kbd>CLICK</kbd> column to drop &nbsp;|&nbsp; <kbd>R</kbd> restart
    </p>

    <div class="status-bar">
      <span class="status-player">
        <span class="score-cyan">YOU ●</span>
        <span class="status-score" id="score-player">0</span>
      </span>
      <span class="status-score" id="turn-indicator">YOUR TURN</span>
      <span class="status-player">
        <span class="status-score" id="score-cpu">0</span>
        <span class="score-magenta">● CPU</span>
      </span>
    </div>

    <div class="board-wrap">
      <div class="column-indicators" id="col-indicators"></div>
      <div class="board" id="board"></div>
    </div>

    <div class="message" id="message">&nbsp;</div>

    <div class="difficulty-label">DIFFICULTY</div>
    <div class="btn-row">
      <button id="btn-easy" onclick="setDifficulty(0)">EASY</button>
      <button id="btn-med" class="active" onclick="setDifficulty(1)">MEDIUM</button>
      <button id="btn-hard" onclick="setDifficulty(2)">HARD</button>
    </div>

    <div class="btn-row">
      <button onclick="resetGame()">NEW GAME</button>
      <button onclick="resetAll()">RESET SCORES</button>
    </div>
  </main>

  <script>
    const ROWS = 6;
    const COLS = 7;
    const EMPTY = 0;
    const PLAYER = 1;
    const CPU = 2;

    let board = [];
    let gameOver = false;
    let playerTurn = true;
    let scores = { player: 0, cpu: 0 };
    let difficulty = 1; // 0=easy, 1=medium, 2=hard
    let animating = false;

    const boardEl = document.getElementById('board');
    const colIndicators = document.getElementById('col-indicators');
    const messageEl = document.getElementById('message');
    const turnEl = document.getElementById('turn-indicator');
    const scorePlayerEl = document.getElementById('score-player');
    const scoreCpuEl = document.getElementById('score-cpu');

    function init() {
      board = [];
      for (let r = 0; r < ROWS; r++) {
        board.push(new Array(COLS).fill(EMPTY));
      }
      gameOver = false;
      playerTurn = true;
      animating = false;
      messageEl.innerHTML = '&nbsp;';
      messageEl.className = 'message';
      turnEl.textContent = 'YOUR TURN';
      renderBoard();
      renderIndicators();
    }

    function renderBoard() {
      boardEl.innerHTML = '';
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell' + (gameOver || !playerTurn ? ' disabled' : '');
          cell.dataset.col = c;
          cell.onclick = () => handleColumnClick(c);

          if (board[r][c] !== EMPTY) {
            const disc = document.createElement('div');
            disc.className = 'disc ' + (board[r][c] === PLAYER ? 'cyan' : 'magenta');
            disc.id = 'disc-' + r + '-' + c;
            cell.appendChild(disc);
          }

          boardEl.appendChild(cell);
        }
      }
    }

    function renderIndicators() {
      colIndicators.innerHTML = '';
      for (let c = 0; c < COLS; c++) {
        const ind = document.createElement('div');
        ind.className = 'col-indicator';
        ind.innerHTML = '<span class="arrow">▼</span>';
        ind.dataset.col = c;
        ind.onclick = () => handleColumnClick(c);
        colIndicators.appendChild(ind);
      }
    }

    function handleColumnClick(col) {
      if (gameOver || !playerTurn || animating) return;
      if (!canDrop(col)) return;
      dropDisc(col, PLAYER);
    }

    function canDrop(col) {
      return board[0][col] === EMPTY;
    }

    function getDropRow(col) {
      for (let r = ROWS - 1; r >= 0; r--) {
        if (board[r][col] === EMPTY) return r;
      }
      return -1;
    }

    function dropDisc(col, who) {
      const row = getDropRow(col);
      if (row === -1) return;

      animating = true;
      board[row][col] = who;
      renderBoard();

      // Animate the dropped disc
      const disc = document.getElementById('disc-' + row + '-' + col);
      if (disc) {
        disc.classList.add('dropping');
      }

      setTimeout(() => {
        animating = false;
        const win = checkWin(row, col, who);
        if (win) {
          highlightWin(win);
          if (who === PLAYER) {
            scores.player++;
            scorePlayerEl.textContent = scores.player;
            messageEl.textContent = 'YOU WIN!';
            messageEl.className = 'message cyan';
          } else {
            scores.cpu++;
            scoreCpuEl.textContent = scores.cpu;
            messageEl.textContent = 'CPU WINS';
            messageEl.className = 'message magenta';
          }
          gameOver = true;
          turnEl.textContent = 'GAME OVER';
          return;
        }

        if (isBoardFull()) {
          messageEl.textContent = 'DRAW';
          messageEl.className = 'message draw';
          gameOver = true;
          turnEl.textContent = 'GAME OVER';
          return;
        }

        if (who === PLAYER) {
          playerTurn = false;
          turnEl.textContent = 'CPU THINKING...';
          updateCells();
          setTimeout(() => cpuMove(), 400 + Math.random() * 300);
        } else {
          playerTurn = true;
          turnEl.textContent = 'YOUR TURN';
          updateCells();
        }
      }, 350);
    }

    function updateCells() {
      const cells = boardEl.querySelectorAll('.cell');
      cells.forEach(cell => {
        if (gameOver || !playerTurn) {
          cell.classList.add('disabled');
        } else {
          cell.classList.remove('disabled');
        }
      });
    }

    function isBoardFull() {
      return board[0].every(cell => cell !== EMPTY);
    }

    function checkWin(row, col, who) {
      const directions = [
        [0, 1],   // horizontal
        [1, 0],   // vertical
        [1, 1],   // diagonal right
        [1, -1],  // diagonal left
      ];

      for (const [dr, dc] of directions) {
        let cells = [[row, col]];

        // Count forward
        for (let i = 1; i < 4; i++) {
          const r = row + dr * i;
          const c = col + dc * i;
          if (r < 0 || r >= ROWS || c < 0 || c >= COLS || board[r][c] !== who) break;
          cells.push([r, c]);
        }

        // Count backward
        for (let i = 1; i < 4; i++) {
          const r = row - dr * i;
          const c = col - dc * i;
          if (r < 0 || r >= ROWS || c < 0 || c >= COLS || board[r][c] !== who) break;
          cells.push([r, c]);
        }

        if (cells.length >= 4) return cells;
      }
      return null;
    }

    function highlightWin(cells) {
      cells.forEach(([r, c]) => {
        const disc = document.getElementById('disc-' + r + '-' + c);
        if (disc) disc.classList.add('winning');
      });
    }

    // ── AI ──

    function cpuMove() {
      if (gameOver) return;

      let col;
      if (difficulty === 0) {
        col = cpuEasy();
      } else if (difficulty === 1) {
        col = cpuMedium();
      } else {
        col = cpuHard();
      }

      dropDisc(col, CPU);
    }

    function getValidCols() {
      const cols = [];
      for (let c = 0; c < COLS; c++) {
        if (canDrop(c)) cols.push(c);
      }
      return cols;
    }

    function cpuEasy() {
      // Random with slight preference for center
      const valid = getValidCols();
      if (valid.length === 0) return 0;

      // 30% chance to pick center-ish columns
      if (Math.random() < 0.3) {
        const center = valid.filter(c => c >= 2 && c <= 4);
        if (center.length > 0) return center[Math.floor(Math.random() * center.length)];
      }

      return valid[Math.floor(Math.random() * valid.length)];
    }

    function cpuMedium() {
      const valid = getValidCols();
      if (valid.length === 0) return 0;

      // Check for CPU win
      for (const c of valid) {
        const r = getDropRow(c);
        board[r][c] = CPU;
        if (checkWin(r, c, CPU)) { board[r][c] = EMPTY; return c; }
        board[r][c] = EMPTY;
      }

      // Block player win
      for (const c of valid) {
        const r = getDropRow(c);
        board[r][c] = PLAYER;
        if (checkWin(r, c, PLAYER)) { board[r][c] = EMPTY; return c; }
        board[r][c] = EMPTY;
      }

      // Prefer center columns
      const pref = [3, 2, 4, 1, 5, 0, 6];
      for (const c of pref) {
        if (valid.includes(c)) return c;
      }

      return valid[0];
    }

    function cpuHard() {
      const valid = getValidCols();
      if (valid.length === 0) return 0;

      // Check for immediate win
      for (const c of valid) {
        const r = getDropRow(c);
        board[r][c] = CPU;
        if (checkWin(r, c, CPU)) { board[r][c] = EMPTY; return c; }
        board[r][c] = EMPTY;
      }

      // Block immediate player win
      for (const c of valid) {
        const r = getDropRow(c);
        board[r][c] = PLAYER;
        if (checkWin(r, c, PLAYER)) { board[r][c] = EMPTY; return c; }
        board[r][c] = EMPTY;
      }

      // Avoid giving player a win on next move
      const safe = valid.filter(c => {
        const r = getDropRow(c);
        board[r][c] = CPU;
        let givesWin = false;
        if (r > 0) {
          board[r - 1][c] = PLAYER;
          if (checkWin(r - 1, c, PLAYER)) givesWin = true;
          board[r - 1][c] = EMPTY;
        }
        board[r][c] = EMPTY;
        return !givesWin;
      });

      const candidates = safe.length > 0 ? safe : valid;

      // Score each column with minimax-lite (depth 4)
      let bestScore = -Infinity;
      let bestCol = candidates[0];

      for (const c of candidates) {
        const score = minimax(c, CPU, 4, false, -Infinity, Infinity);
        if (score > bestScore) {
          bestScore = score;
          bestCol = c;
        }
      }

      return bestCol;
    }

    function minimax(col, who, depth, isMax, alpha, beta) {
      const r = getDropRow(col);
      if (r === -1) return 0;

      board[r][col] = who;

      if (checkWin(r, col, who)) {
        board[r][col] = EMPTY;
        return who === CPU ? 1000 + depth : -(1000 + depth);
      }

      if (depth === 0 || isBoardFull()) {
        const score = evaluateBoard();
        board[r][col] = EMPTY;
        return score;
      }

      const nextWho = who === CPU ? PLAYER : CPU;
      const valid = getValidCols();

      if (isMax) {
        let maxEval = -Infinity;
        for (const nc of valid) {
          const ev = minimax(nc, nextWho, depth - 1, false, alpha, beta);
          maxEval = Math.max(maxEval, ev);
          alpha = Math.max(alpha, ev);
          if (beta <= alpha) break;
        }
        board[r][col] = EMPTY;
        return maxEval;
      } else {
        let minEval = Infinity;
        for (const nc of valid) {
          const ev = minimax(nc, nextWho, depth - 1, true, alpha, beta);
          minEval = Math.min(minEval, ev);
          beta = Math.min(beta, ev);
          if (beta <= alpha) break;
        }
        board[r][col] = EMPTY;
        return minEval;
      }
    }

    function evaluateBoard() {
      let score = 0;

      // Score center column
      for (let r = 0; r < ROWS; r++) {
        if (board[r][3] === CPU) score += 3;
        else if (board[r][3] === PLAYER) score -= 3;
      }

      // Score all windows of 4
      // Horizontal
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c <= COLS - 4; c++) {
          score += scoreWindow(board[r][c], board[r][c+1], board[r][c+2], board[r][c+3]);
        }
      }

      // Vertical
      for (let c = 0; c < COLS; c++) {
        for (let r = 0; r <= ROWS - 4; r++) {
          score += scoreWindow(board[r][c], board[r+1][c], board[r+2][c], board[r+3][c]);
        }
      }

      // Diagonal right
      for (let r = 0; r <= ROWS - 4; r++) {
        for (let c = 0; c <= COLS - 4; c++) {
          score += scoreWindow(board[r][c], board[r+1][c+1], board[r+2][c+2], board[r+3][c+3]);
        }
      }

      // Diagonal left
      for (let r = 0; r <= ROWS - 4; r++) {
        for (let c = 3; c < COLS; c++) {
          score += scoreWindow(board[r][c], board[r+1][c-1], board[r+2][c-2], board[r+3][c-3]);
        }
      }

      return score;
    }

    function scoreWindow(a, b, c, d) {
      const cells = [a, b, c, d];
      const cpuCount = cells.filter(x => x === CPU).length;
      const playerCount = cells.filter(x => x === PLAYER).length;
      const emptyCount = cells.filter(x => x === EMPTY).length;

      if (cpuCount === 3 && emptyCount === 1) return 10;
      if (cpuCount === 2 && emptyCount === 2) return 3;
      if (playerCount === 3 && emptyCount === 1) return -8;
      if (playerCount === 2 && emptyCount === 2) return -2;

      return 0;
    }

    // ── Column hover indicators ──

    boardEl.addEventListener('mousemove', (e) => {
      if (gameOver || !playerTurn || animating) return;
      const cell = e.target.closest('.cell');
      clearIndicators();
      if (cell) {
        const col = parseInt(cell.dataset.col);
        if (canDrop(col)) {
          const ind = colIndicators.children[col];
          if (ind) ind.classList.add('active');
        }
      }
    });

    boardEl.addEventListener('mouseleave', clearIndicators);

    function clearIndicators() {
      for (const ind of colIndicators.children) {
        ind.classList.remove('active');
      }
    }

    // ── Keyboard ──

    document.addEventListener('keydown', (e) => {
      if (e.key === 'r' || e.key === 'R') {
        resetGame();
        return;
      }

      const num = parseInt(e.key);
      if (num >= 1 && num <= 7) {
        handleColumnClick(num - 1);
      }
    });

    // ── Difficulty ──

    function setDifficulty(d) {
      difficulty = d;
      document.getElementById('btn-easy').classList.toggle('active', d === 0);
      document.getElementById('btn-med').classList.toggle('active', d === 1);
      document.getElementById('btn-hard').classList.toggle('active', d === 2);
    }

    function resetGame() {
      init();
    }

    function resetAll() {
      scores.player = 0;
      scores.cpu = 0;
      scorePlayerEl.textContent = '0';
      scoreCpuEl.textContent = '0';
      init();
    }

    // ── Start ──

    init();
  </script>
  <script src="../theme-toggle.js"></script>
</body>
</html>
