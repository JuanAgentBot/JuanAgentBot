<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLOOD ICE / ZERO game lab</title>
  <meta name="theme-color" content="#0a0a0f">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared.css">
  <style>
    main {
      max-width: 520px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      text-align: center;
    }

    .back {
      display: inline-block;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      margin-bottom: 1.5rem;
      text-align: left;
      width: 100%;
    }
    .back:hover { color: #88ddff; }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: #66ccff;
      letter-spacing: 0.12em;
      margin-bottom: 0.3rem;
      text-shadow: 0 0 20px rgba(102, 204, 255, 0.6);
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .controls button {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      padding: 0.3rem 0.8rem;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: border-color 0.2s, color 0.2s;
    }
    .controls button:hover { border-color: #88ddff; color: #88ddff; }
    .controls button.active { border-color: #66ccff; color: #66ccff; }

    .stats {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1rem;
      font-size: 0.75rem;
    }

    .stat-label { color: var(--text-dim); letter-spacing: 0.08em; }
    .stat-value { color: #88ddff; font-weight: 700; text-shadow: 0 0 8px rgba(136, 221, 255, 0.4); }
    .stat-value.warn { color: #4477ff; text-shadow: 0 0 8px rgba(68, 119, 255, 0.5); }

    #board {
      display: inline-grid;
      gap: 1px;
      border: 1px solid #1a3344;
      margin-bottom: 1rem;
      background: #0d1a22;
    }

    .cell {
      width: 100%;
      aspect-ratio: 1;
      transition: background-color 0.15s ease-out;
    }

    .cell.wave {
      animation: iceWave 0.5s ease-out;
    }

    @keyframes iceWave {
      0% { transform: scale(1); filter: brightness(1) saturate(1); }
      20% { transform: scale(1.12); filter: brightness(1.8) saturate(0.6); }
      60% { transform: scale(1.03); filter: brightness(1.2) saturate(0.9); }
      100% { transform: scale(1); filter: brightness(1) saturate(1); }
    }

    .color-picker {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 1.2rem;
    }

    .color-btn {
      width: 40px;
      height: 40px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      padding: 0;
    }
    .color-btn:hover { transform: scale(1.15); }
    .color-btn.current { border-color: #fff; box-shadow: 0 0 14px rgba(136, 221, 255, 0.5); }
    .color-btn.disabled { opacity: 0.4; cursor: default; transform: none !important; }

    .message {
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
      min-height: 1.4em;
    }
    .message.win { color: #aaeeff; text-shadow: 0 0 12px rgba(170, 238, 255, 0.5); }
    .message.lose { color: #4477ff; text-shadow: 0 0 12px rgba(68, 119, 255, 0.5); }

    .best { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 1rem; }
    .best span { color: #aaeeff; text-shadow: 0 0 6px rgba(170, 238, 255, 0.4); }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--bg-secondary);
      border: 1px solid #1a3344;
      margin-bottom: 1rem;
      overflow: hidden;
    }
    .progress-fill { height: 100%; background: #66ccff; transition: width 0.3s; box-shadow: 0 0 8px rgba(102, 204, 255, 0.4); }
    .progress-fill.high { background: #4477ff; box-shadow: 0 0 8px rgba(68, 119, 255, 0.5); }

    .help {
      color: var(--text-dim);
      font-size: 0.65rem;
      line-height: 1.6;
      letter-spacing: 0.04em;
      margin-top: 1.5rem;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }

    .variant-nav {
      margin-top: 1rem;
      font-size: 0.65rem;
      letter-spacing: 0.06em;
    }
    .variant-nav a { color: #88ddff; text-decoration: none; transition: color 0.2s; }
    .variant-nav a:hover { color: #aaeeff; }

    @media (max-width: 400px) {
      .color-btn { width: 32px; height: 32px; }
    }
  </style>
  <script>(function(){var t=localStorage.getItem('zero-theme');if(!t&&window.matchMedia('(prefers-color-scheme:light)').matches)t='light';if(t==='light')document.documentElement.setAttribute('data-theme','light')})()</script>
</head>
<body>
  <main>
    <a href="./" class="back">&lt; GAME LAB</a>
    <h1>FLOOD ICE</h1>
    <p class="subtitle">FROZEN PALETTE &middot; COOL TONES ONLY</p>

    <div class="controls">
      <button class="active" data-size="10">10x10</button>
      <button data-size="14">14x14</button>
      <button data-size="18">18x18</button>
      <button id="new-btn">NEW GAME</button>
    </div>

    <div class="stats">
      <div><span class="stat-label">MOVES </span><span class="stat-value" id="moves">0</span><span class="stat-label"> / </span><span class="stat-value" id="max-moves">25</span></div>
      <div><span class="stat-label">FILLED </span><span class="stat-value" id="filled">0%</span></div>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

    <div id="board"></div>

    <div class="color-picker" id="picker"></div>

    <div class="message" id="message"></div>
    <div class="best" id="best-display"></div>

    <div class="variant-nav">
      <a href="flood.html">CLASSIC</a> &middot;
      <a href="flood-tiny.html">TINY</a> &middot;
      <a href="flood-mega.html">MEGA</a> &middot;
      <a href="flood-lava.html">LAVA</a> &middot;
      <a href="flood-cluster.html">CLUSTER</a>
    </div>

    <div class="help">
      SAME RULES, FROZEN PALETTE<br>
      ALL COOL TONES — SUBTLE DIFFERENCES, ICY PRECISION<br>
      KEYS 1-6 TO PICK COLORS &middot; N FOR NEW GAME
    </div>
  </main>

  <script>
    const COLORS = ['#2244aa', '#4488dd', '#66ccff', '#88eeff', '#3366bb', '#aaddff'];
    const COLOR_NAMES = ['DEEP', 'OCEAN', 'SKY', 'FROST', 'COBALT', 'MIST'];
    const SIZES = { 10: 25, 14: 30, 18: 40 };
    const WAVE_DELAY = 32;

    let gridSize = 10;
    let maxMoves = 25;
    let grid = [];
    let moves = 0;
    let gameOver = false;
    let animating = false;
    let best = {};

    const boardEl = document.getElementById('board');
    const pickerEl = document.getElementById('picker');
    const movesEl = document.getElementById('moves');
    const maxMovesEl = document.getElementById('max-moves');
    const filledEl = document.getElementById('filled');
    const messageEl = document.getElementById('message');
    const bestEl = document.getElementById('best-display');
    const progressEl = document.getElementById('progress');

    try { best = JSON.parse(localStorage.getItem('zero-flood-ice-best') || '{}'); } catch(e) { best = {}; }
    function saveBest() { localStorage.setItem('zero-flood-ice-best', JSON.stringify(best)); }

    function init() {
      moves = 0;
      gameOver = false;
      animating = false;
      messageEl.textContent = '';
      messageEl.className = 'message';
      maxMoves = SIZES[gridSize];
      grid = [];
      for (let r = 0; r < gridSize; r++) {
        grid[r] = [];
        for (let c = 0; c < gridSize; c++) grid[r][c] = Math.floor(Math.random() * COLORS.length);
      }
      renderBoard(); renderPicker(); updateStats(); updateBestDisplay();
    }

    function renderBoard() {
      boardEl.innerHTML = '';
      boardEl.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
      const cellSize = Math.min(Math.floor((Math.min(480, window.innerWidth - 48)) / gridSize), 36);
      boardEl.style.width = (cellSize * gridSize + gridSize - 1) + 'px';
      for (let r = 0; r < gridSize; r++) {
        for (let c = 0; c < gridSize; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.style.backgroundColor = COLORS[grid[r][c]];
          cell.style.width = cellSize + 'px';
          cell.style.height = cellSize + 'px';
          boardEl.appendChild(cell);
        }
      }
    }

    function renderPicker() {
      pickerEl.innerHTML = '';
      const cur = grid[0][0];
      COLORS.forEach((color, i) => {
        const btn = document.createElement('button');
        btn.className = 'color-btn';
        if (i === cur) btn.classList.add('current');
        if (animating) btn.classList.add('disabled');
        btn.style.backgroundColor = color;
        btn.title = COLOR_NAMES[i] + ' [' + (i + 1) + ']';
        btn.addEventListener('click', () => pickColor(i));
        pickerEl.appendChild(btn);
      });
    }

    async function pickColor(ci) {
      if (gameOver || animating) return;
      const cur = grid[0][0];
      if (ci === cur) return;
      moves++;
      animating = true;
      renderPicker();
      await floodAnimated(cur, ci);
      animating = false;
      renderPicker(); updateStats();
      const pct = getFilledPercent();
      if (pct === 100) {
        gameOver = true;
        messageEl.textContent = 'ICE CLEARED IN ' + moves + ' MOVES';
        messageEl.className = 'message win';
        const key = 's' + gridSize;
        if (!best[key] || moves < best[key]) { best[key] = moves; saveBest(); updateBestDisplay(); messageEl.textContent += ' — NEW BEST!'; }
      } else if (moves >= maxMoves) {
        gameOver = true;
        messageEl.textContent = 'OUT OF MOVES — ' + pct + '% FILLED';
        messageEl.className = 'message lose';
      }
    }

    async function floodAnimated(oldColor, newColor) {
      const visited = Array.from({ length: gridSize }, () => new Array(gridSize).fill(false));
      const rings = [];
      const queue = [[0, 0, 0]];
      visited[0][0] = true;
      while (queue.length > 0) {
        const [r, c, dist] = queue.shift();
        if (grid[r][c] === oldColor) {
          if (!rings[dist]) rings[dist] = [];
          rings[dist].push({ r, c });
          for (const [nr, nc] of [[r-1,c],[r+1,c],[r,c-1],[r,c+1]]) {
            if (nr >= 0 && nr < gridSize && nc >= 0 && nc < gridSize && !visited[nr][nc]) {
              visited[nr][nc] = true;
              if (grid[nr][nc] === oldColor) queue.push([nr, nc, dist + 1]);
            }
          }
        }
      }
      for (const ring of rings) {
        if (!ring) continue;
        for (const { r, c } of ring) {
          grid[r][c] = newColor;
          const cell = boardEl.children[r * gridSize + c];
          if (cell) {
            cell.style.backgroundColor = COLORS[newColor];
            cell.classList.remove('wave');
            void cell.offsetWidth;
            cell.classList.add('wave');
          }
        }
        await delay(WAVE_DELAY);
      }
      await delay(350);
      boardEl.querySelectorAll('.wave').forEach(c => c.classList.remove('wave'));
    }

    function getFilledPercent() {
      const t = grid[0][0];
      const visited = Array.from({ length: gridSize }, () => new Array(gridSize).fill(false));
      const stack = [[0, 0]];
      visited[0][0] = true;
      let count = 0;
      while (stack.length > 0) {
        const [r, c] = stack.pop();
        if (grid[r][c] === t) {
          count++;
          for (const [nr, nc] of [[r-1,c],[r+1,c],[r,c-1],[r,c+1]]) {
            if (nr >= 0 && nr < gridSize && nc >= 0 && nc < gridSize && !visited[nr][nc]) {
              visited[nr][nc] = true;
              if (grid[nr][nc] === t) stack.push([nr, nc]);
            }
          }
        }
      }
      return Math.round((count / (gridSize * gridSize)) * 100);
    }

    function updateStats() {
      movesEl.textContent = moves;
      maxMovesEl.textContent = maxMoves;
      movesEl.classList.toggle('warn', moves > maxMoves * 0.75);
      const pct = getFilledPercent();
      filledEl.textContent = pct + '%';
      progressEl.style.width = pct + '%';
      progressEl.classList.toggle('high', moves > maxMoves * 0.75 && pct < 80);
    }

    function updateBestDisplay() {
      const key = 's' + gridSize;
      if (best[key]) bestEl.innerHTML = 'BEST ' + gridSize + 'x' + gridSize + ': <span>' + best[key] + ' MOVES</span>';
      else bestEl.textContent = '';
    }

    function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

    document.querySelectorAll('[data-size]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (animating) return;
        document.querySelectorAll('[data-size]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        gridSize = parseInt(btn.dataset.size);
        init();
      });
    });

    document.getElementById('new-btn').addEventListener('click', () => { if (!animating) init(); });

    document.addEventListener('keydown', (e) => {
      if (e.key >= '1' && e.key <= '6') { e.preventDefault(); pickColor(parseInt(e.key) - 1); }
      else if (e.key === 'n' || e.key === 'N') { e.preventDefault(); if (!animating) init(); }
    });

    window.addEventListener('resize', () => { if (grid.length > 0 && !animating) renderBoard(); });

    init();
  </script>
  <script src="../theme-toggle.js"></script>
</body>
</html>
