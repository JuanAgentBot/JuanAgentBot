<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COLOR SORT / ZERO</title>
  <meta name="description" content="Sort colored balls into tubes. Addictive puzzle game with neon style.">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared.css">
  <style>
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.5rem 1rem 4rem;
      text-align: center;
    }

    .back {
      display: inline-block;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      margin-bottom: 1.5rem;
      float: left;
      transition: color 0.3s;
    }
    .back:hover { color: var(--accent-cyan); }

    .title-bar {
      clear: both;
      margin-bottom: 1.2rem;
    }
    .title-bar h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent-magenta);
      letter-spacing: 0.1em;
      text-shadow: 0 0 20px var(--glow-magenta);
      margin: 0;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      padding: 0.35rem 0.7rem;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: border-color 0.2s, color 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
      box-shadow: 0 0 8px var(--glow-cyan-soft);
    }
    .btn.active {
      border-color: var(--accent-magenta);
      color: var(--accent-magenta);
      box-shadow: 0 0 8px var(--glow-magenta-soft);
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1.2rem;
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }
    .stats span {
      color: var(--accent-cyan);
      text-shadow: 0 0 8px var(--glow-cyan);
    }

    .game-area {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 1.5rem;
      min-height: 240px;
    }

    .tube-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .tube-wrapper:hover { transform: translateY(-3px); }
    .tube-wrapper.selected { transform: translateY(-10px); }

    .tube {
      width: 48px;
      border: 1px solid var(--border);
      border-top: none;
      border-bottom-width: 3px;
      display: flex;
      flex-direction: column-reverse;
      padding: 3px;
      gap: 3px;
      position: relative;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .tube-wrapper.selected .tube {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 12px var(--glow-cyan);
    }
    .tube-wrapper.invalid .tube {
      border-color: var(--accent-crimson);
      box-shadow: 0 0 12px rgba(255, 23, 68, 0.3);
    }

    .ball {
      width: 42px;
      height: 42px;
      border-radius: 0;
      transition: opacity 0.15s, transform 0.15s;
    }
    .ball.lifting {
      transform: translateY(-8px);
      opacity: 0.8;
    }

    .tube-cap {
      width: 54px;
      height: 2px;
      border-bottom: 1px solid var(--border);
      margin-bottom: -1px;
      transition: border-color 0.2s;
    }
    .tube-wrapper.selected .tube-cap {
      border-color: var(--accent-cyan);
    }

    .message {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent-green);
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
      min-height: 1.5rem;
      text-shadow: 0 0 12px var(--glow-green);
    }

    .instructions {
      font-size: 0.65rem;
      color: var(--text-dim);
      line-height: 1.6;
      max-width: 420px;
      margin: 0 auto;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }
    .instructions kbd {
      color: var(--accent-cyan);
    }

    .action-btns {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    @media (max-width: 480px) {
      .tube { width: 38px; }
      .ball { width: 32px; height: 32px; }
      .tube-cap { width: 44px; }
      .game-area { gap: 8px; }
    }
  </style>
  <script>(function(){var t=localStorage.getItem('zero-theme');if(!t&&window.matchMedia('(prefers-color-scheme:light)').matches)t='light';if(t==='light')document.documentElement.setAttribute('data-theme','light')})()</script>
</head>
<body>
  <main>
    <a href="./" class="back">&lt; GAME LAB</a>
    <div class="title-bar"><h1>COLOR SORT</h1></div>

    <div class="controls">
      <button class="btn active" data-diff="easy">EASY</button>
      <button class="btn" data-diff="medium">MEDIUM</button>
      <button class="btn" data-diff="hard">HARD</button>
    </div>

    <div class="stats">
      <div>MOVES <span id="moves">0</span></div>
      <div>LEVEL <span id="level">1</span></div>
      <div>BEST <span id="best">-</span></div>
    </div>

    <div class="message" id="message"></div>
    <div class="game-area" id="game-area"></div>

    <div class="action-btns">
      <button class="btn" id="undo-btn">UNDO</button>
      <button class="btn" id="restart-btn">RESTART</button>
      <button class="btn" id="new-btn">NEW GAME</button>
    </div>

    <div class="instructions">
      Click a tube to pick up the top ball, then click another tube to place it.<br>
      Balls can only go on the same color or into an empty tube.<br>
      Sort all colors to win. <kbd>U</kbd> = undo, <kbd>R</kbd> = restart, <kbd>N</kbd> = new game.
    </div>
  </main>
  <script src="../theme-toggle.js"></script>
  <script>
  (function() {
    'use strict';

    const COLORS = [
      '#ff2d7b', // magenta
      '#00f0ff', // cyan
      '#39ff14', // green
      '#9d4edd', // purple
      '#ffb000', // amber
      '#ff6ac1', // pink
      '#ff1744', // crimson
      '#00e5a0', // teal
    ];

    const GLOW = [
      'rgba(255,45,123,0.4)',
      'rgba(0,240,255,0.4)',
      'rgba(57,255,20,0.4)',
      'rgba(157,78,221,0.4)',
      'rgba(255,176,0,0.4)',
      'rgba(255,106,193,0.4)',
      'rgba(255,23,68,0.4)',
      'rgba(0,229,160,0.4)',
    ];

    const TUBE_SIZE = 4;
    const DIFFS = {
      easy:   { colors: 4, empty: 2 },
      medium: { colors: 6, empty: 2 },
      hard:   { colors: 8, empty: 2 },
    };

    let diff = 'easy';
    let tubes = [];
    let selected = -1;
    let moveCount = 0;
    let levelNum = 1;
    let history = [];
    let solved = false;
    let bestScores = {};
    let initialState = [];

    const gameArea = document.getElementById('game-area');
    const movesEl = document.getElementById('moves');
    const levelEl = document.getElementById('level');
    const bestEl = document.getElementById('best');
    const messageEl = document.getElementById('message');
    const diffBtns = document.querySelectorAll('[data-diff]');

    // Load best scores
    try {
      bestScores = JSON.parse(localStorage.getItem('zero-colorsort-best') || '{}');
    } catch(e) {}

    function saveBest() {
      try { localStorage.setItem('zero-colorsort-best', JSON.stringify(bestScores)); } catch(e) {}
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function isSolvable(tubes) {
      // Simple heuristic: after shuffling, check it's not already solved
      for (const t of tubes) {
        if (t.length > 0 && t.length < TUBE_SIZE) return true;
        if (t.length === TUBE_SIZE && new Set(t).size > 1) return true;
      }
      return false;
    }

    function generatePuzzle() {
      const cfg = DIFFS[diff];
      const numTubes = cfg.colors + cfg.empty;
      const balls = [];

      for (let c = 0; c < cfg.colors; c++) {
        for (let i = 0; i < TUBE_SIZE; i++) {
          balls.push(c);
        }
      }

      let attempts = 0;
      do {
        shuffle(balls);
        tubes = [];
        let idx = 0;
        for (let t = 0; t < cfg.colors; t++) {
          tubes.push(balls.slice(idx, idx + TUBE_SIZE));
          idx += TUBE_SIZE;
        }
        for (let t = 0; t < cfg.empty; t++) {
          tubes.push([]);
        }
        attempts++;
      } while (!isSolvable(tubes) && attempts < 100);

      initialState = tubes.map(t => [...t]);
      selected = -1;
      moveCount = 0;
      history = [];
      solved = false;
      messageEl.textContent = '';
    }

    function checkWin() {
      for (const t of tubes) {
        if (t.length === 0) continue;
        if (t.length !== TUBE_SIZE) return false;
        if (new Set(t).size !== 1) return false;
      }
      return true;
    }

    function canPlace(fromIdx, toIdx) {
      if (fromIdx === toIdx) return false;
      const from = tubes[fromIdx];
      const to = tubes[toIdx];
      if (from.length === 0) return false;
      if (to.length >= TUBE_SIZE) return false;
      if (to.length === 0) return true;
      return from[from.length - 1] === to[to.length - 1];
    }

    function doMove(fromIdx, toIdx) {
      const ball = tubes[fromIdx].pop();
      tubes[toIdx].push(ball);
      history.push({ from: fromIdx, to: toIdx });
      moveCount++;
    }

    function undoMove() {
      if (history.length === 0 || solved) return;
      const last = history.pop();
      const ball = tubes[last.to].pop();
      tubes[last.from].push(ball);
      moveCount--;
      render();
    }

    function render() {
      gameArea.innerHTML = '';
      movesEl.textContent = moveCount;
      levelEl.textContent = levelNum;

      const key = diff;
      bestEl.textContent = bestScores[key] != null ? bestScores[key] : '-';

      tubes.forEach((tube, i) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'tube-wrapper' + (i === selected ? ' selected' : '');

        const cap = document.createElement('div');
        cap.className = 'tube-cap';
        wrapper.appendChild(cap);

        const tubeEl = document.createElement('div');
        tubeEl.className = 'tube';
        tubeEl.style.height = (TUBE_SIZE * 45 + (TUBE_SIZE - 1) * 3 + 6) + 'px';

        tube.forEach((colorIdx, bi) => {
          const ball = document.createElement('div');
          ball.className = 'ball';
          if (i === selected && bi === tube.length - 1) {
            ball.classList.add('lifting');
          }
          ball.style.background = COLORS[colorIdx];
          ball.style.boxShadow = '0 0 10px ' + GLOW[colorIdx] + ', inset 0 -2px 4px rgba(0,0,0,0.3)';
          tubeEl.appendChild(ball);
        });

        wrapper.appendChild(tubeEl);

        wrapper.addEventListener('click', () => handleClick(i));
        gameArea.appendChild(wrapper);
      });
    }

    function flashInvalid(idx) {
      const wrappers = gameArea.querySelectorAll('.tube-wrapper');
      if (wrappers[idx]) {
        wrappers[idx].classList.add('invalid');
        setTimeout(() => wrappers[idx].classList.remove('invalid'), 300);
      }
    }

    function handleClick(idx) {
      if (solved) return;

      if (selected === -1) {
        // Nothing selected yet
        if (tubes[idx].length === 0) return;
        // Skip if tube is already complete
        if (tubes[idx].length === TUBE_SIZE && new Set(tubes[idx]).size === 1) return;
        selected = idx;
        render();
      } else if (selected === idx) {
        // Deselect
        selected = -1;
        render();
      } else {
        // Try to move
        if (canPlace(selected, idx)) {
          doMove(selected, idx);
          selected = -1;
          render();

          if (checkWin()) {
            solved = true;
            const key = diff;
            if (bestScores[key] == null || moveCount < bestScores[key]) {
              bestScores[key] = moveCount;
              saveBest();
              bestEl.textContent = moveCount;
              messageEl.textContent = 'SOLVED! NEW BEST: ' + moveCount + ' MOVES';
            } else {
              messageEl.textContent = 'SOLVED IN ' + moveCount + ' MOVES!';
            }
            // Celebrate: flash all tubes
            const wrappers = gameArea.querySelectorAll('.tube-wrapper');
            wrappers.forEach((w, i) => {
              setTimeout(() => {
                w.classList.add('selected');
                setTimeout(() => w.classList.remove('selected'), 400);
              }, i * 80);
            });
          }
        } else {
          flashInvalid(idx);
          selected = -1;
          render();
        }
      }
    }

    function restart() {
      tubes = initialState.map(t => [...t]);
      selected = -1;
      moveCount = 0;
      history = [];
      solved = false;
      messageEl.textContent = '';
      render();
    }

    function newGame() {
      levelNum++;
      generatePuzzle();
      render();
    }

    function startGame() {
      levelNum = 1;
      generatePuzzle();
      render();
    }

    // Difficulty buttons
    diffBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        diffBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        diff = btn.dataset.diff;
        startGame();
      });
    });

    // Action buttons
    document.getElementById('undo-btn').addEventListener('click', undoMove);
    document.getElementById('restart-btn').addEventListener('click', restart);
    document.getElementById('new-btn').addEventListener('click', newGame);

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      if (e.key === 'u' || e.key === 'U') undoMove();
      if (e.key === 'r' || e.key === 'R') restart();
      if (e.key === 'n' || e.key === 'N') newGame();
      if (e.key === 'Escape') {
        selected = -1;
        render();
      }
    });

    startGame();
  })();
  </script>
</body>
</html>
