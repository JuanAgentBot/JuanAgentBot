<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEON SLICE / ZERO game lab</title>
  <meta name="theme-color" content="#0a0a0f">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared.css">
  <style>
    main {
      max-width: 520px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      text-align: center;
    }
    .back {
      display: inline-block;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      margin-bottom: 1.5rem;
      text-align: left;
      width: 100%;
      transition: color 0.3s;
    }
    .back:hover { color: var(--accent-cyan); }
    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent-magenta);
      letter-spacing: 0.1em;
      margin-bottom: 0.3rem;
      text-shadow: 0 0 20px var(--glow-magenta);
    }
    .sub {
      color: var(--text-dim);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      margin-bottom: 1.2rem;
    }
    #hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.8rem;
      font-size: 0.75rem;
    }
    #hud .score { color: var(--accent-cyan); }
    #hud .combo { color: var(--accent-green); }
    #hud .lives { color: var(--accent-magenta); }
    #hud .best { color: var(--text-dim); }
    canvas {
      display: block;
      margin: 0 auto;
      border: 1px solid var(--border);
      cursor: crosshair;
      touch-action: none;
    }
    .info {
      color: var(--text-dim);
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      margin-top: 0.8rem;
      line-height: 1.6;
    }
    #start-btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.6rem 1.5rem;
      background: transparent;
      border: 1px solid var(--accent-magenta);
      color: var(--accent-magenta);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }
    #start-btn:hover {
      background: rgba(255,45,123,0.1);
      box-shadow: 0 0 16px rgba(255,45,123,0.3);
    }
  </style>
  <script>(function(){var t=localStorage.getItem('zero-theme');if(!t&&window.matchMedia('(prefers-color-scheme:light)').matches)t='light';if(t==='light')document.documentElement.setAttribute('data-theme','light')})()</script>
</head>
<body>
  <main>
    <a href="./" class="back">&lt; GAME LAB</a>
    <h1>NEON SLICE</h1>
    <p class="sub">DRAG TO SLICE &middot; DODGE BOMBS</p>
    <div id="hud">
      <span class="score">SCORE: <b id="score-val">0</b></span>
      <span class="combo" id="combo-val"></span>
      <span class="lives" id="lives-val"></span>
      <span class="best">BEST: <b id="best-val">0</b></span>
    </div>
    <canvas id="c" width="480" height="560"></canvas>
    <button id="start-btn">START</button>
    <p class="info">CLICK AND DRAG to slice neon shapes &middot; AVOID BOMBS (&#9760;) &middot; MISS 3 shapes = game over<br>BIGGER COMBOS = MORE POINTS &middot; TOUCH WORKS TOO</p>
  </main>
<script>
(function(){
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const startBtn = document.getElementById('start-btn');
  const scoreEl = document.getElementById('score-val');
  const comboEl = document.getElementById('combo-val');
  const livesEl = document.getElementById('lives-val');
  const bestEl = document.getElementById('best-val');

  const W = canvas.width, H = canvas.height;
  const MAGENTA = '#ff2d7b', CYAN = '#00f0ff', GREEN = '#39ff14', PURPLE = '#9d4edd';
  const COLORS = [MAGENTA, CYAN, GREEN, PURPLE, '#ff6ac1', '#ffb000'];
  const BOMB_COLOR = '#ff1744';
  const BG = '#0a0a0f';

  let shapes = [];
  let slicedPieces = [];
  let trail = [];
  let slicing = false;
  let score = 0;
  let combo = 0;
  let maxCombo = 0;
  let lives = 3;
  let best = parseInt(localStorage.getItem('neon-slice-best')) || 0;
  let running = false;
  let gameOver = false;
  let spawnTimer = 0;
  let spawnInterval = 80;
  let difficulty = 1;
  let frameCount = 0;
  let particles = [];
  let sliceTrailPoints = [];

  bestEl.textContent = best;

  const SHAPE_TYPES = ['circle', 'diamond', 'hexagon', 'star', 'triangle'];

  function rand(a, b) { return Math.random() * (b - a) + a; }
  function randInt(a, b) { return Math.floor(rand(a, b + 1)); }

  function spawnShape() {
    const isBomb = Math.random() < 0.12 + difficulty * 0.01;
    const type = isBomb ? 'bomb' : SHAPE_TYPES[randInt(0, SHAPE_TYPES.length - 1)];
    const r = rand(28, 42);
    const x = rand(r + 20, W - r - 20);
    const vx = rand(-1.5, 1.5);
    const vy = rand(-10, -7) - difficulty * 0.3;
    const color = isBomb ? BOMB_COLOR : COLORS[randInt(0, COLORS.length - 1)];
    const spin = rand(-0.04, 0.04);
    shapes.push({
      type, x, y: H + r, vx, vy, r, color, spin, angle: 0,
      sliced: false, missed: false, gravity: 0.12 + difficulty * 0.005
    });
  }

  function spawnBatch() {
    const count = randInt(1, Math.min(2 + Math.floor(difficulty / 2), 5));
    for (let i = 0; i < count; i++) {
      setTimeout(() => spawnShape(), i * rand(50, 200));
    }
  }

  function drawShape(ctx, s, alpha) {
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.angle);
    ctx.globalAlpha = alpha || 1;
    ctx.fillStyle = s.color;
    ctx.shadowColor = s.color;
    ctx.shadowBlur = 12;

    if (s.type === 'bomb') {
      // Skull-ish bomb: circle with X
      ctx.beginPath();
      ctx.arc(0, 0, s.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = BG;
      ctx.font = `bold ${s.r}px 'JetBrains Mono', monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('☠', 0, 2);
    } else if (s.type === 'circle') {
      ctx.beginPath();
      ctx.arc(0, 0, s.r, 0, Math.PI * 2);
      ctx.fill();
    } else if (s.type === 'diamond') {
      ctx.beginPath();
      ctx.moveTo(0, -s.r);
      ctx.lineTo(s.r * 0.7, 0);
      ctx.lineTo(0, s.r);
      ctx.lineTo(-s.r * 0.7, 0);
      ctx.closePath();
      ctx.fill();
    } else if (s.type === 'hexagon') {
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = Math.PI / 3 * i - Math.PI / 6;
        ctx.lineTo(Math.cos(a) * s.r, Math.sin(a) * s.r);
      }
      ctx.closePath();
      ctx.fill();
    } else if (s.type === 'star') {
      ctx.beginPath();
      for (let i = 0; i < 10; i++) {
        const a = Math.PI / 5 * i - Math.PI / 2;
        const rad = i % 2 === 0 ? s.r : s.r * 0.45;
        ctx.lineTo(Math.cos(a) * rad, Math.sin(a) * rad);
      }
      ctx.closePath();
      ctx.fill();
    } else if (s.type === 'triangle') {
      ctx.beginPath();
      ctx.moveTo(0, -s.r);
      ctx.lineTo(s.r * 0.87, s.r * 0.5);
      ctx.lineTo(-s.r * 0.87, s.r * 0.5);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  function spawnSliceParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const a = rand(0, Math.PI * 2);
      const speed = rand(2, 6);
      particles.push({
        x, y,
        vx: Math.cos(a) * speed,
        vy: Math.sin(a) * speed,
        life: 1,
        decay: rand(0.02, 0.05),
        color,
        size: rand(2, 5)
      });
    }
  }

  function sliceShape(s) {
    s.sliced = true;
    spawnSliceParticles(s.x, s.y, s.color, 15);

    // Create two halves flying apart
    const angle = rand(0, Math.PI);
    for (let side = -1; side <= 1; side += 2) {
      slicedPieces.push({
        type: s.type, x: s.x, y: s.y,
        vx: Math.cos(angle) * 3 * side + s.vx,
        vy: s.vy - 2,
        r: s.r * 0.8, color: s.color,
        angle: s.angle, spin: s.spin + side * 0.08,
        life: 1, decay: 0.025,
        clipAngle: angle, clipSide: side,
        gravity: 0.15
      });
    }
  }

  function drawSlicedPiece(p) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle);
    ctx.globalAlpha = p.life;

    // Clip to half
    ctx.beginPath();
    const ca = p.clipAngle - p.angle;
    if (p.clipSide > 0) {
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, p.r * 2, ca, ca + Math.PI);
    } else {
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, p.r * 2, ca + Math.PI, ca + Math.PI * 2);
    }
    ctx.closePath();
    ctx.clip();

    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;

    if (p.type === 'circle') {
      ctx.beginPath();
      ctx.arc(0, 0, p.r, 0, Math.PI * 2);
      ctx.fill();
    } else if (p.type === 'diamond') {
      ctx.beginPath();
      ctx.moveTo(0, -p.r);
      ctx.lineTo(p.r * 0.7, 0);
      ctx.lineTo(0, p.r);
      ctx.lineTo(-p.r * 0.7, 0);
      ctx.closePath();
      ctx.fill();
    } else if (p.type === 'hexagon') {
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = Math.PI / 3 * i - Math.PI / 6;
        ctx.lineTo(Math.cos(a) * p.r, Math.sin(a) * p.r);
      }
      ctx.closePath();
      ctx.fill();
    } else if (p.type === 'star') {
      ctx.beginPath();
      for (let i = 0; i < 10; i++) {
        const a = Math.PI / 5 * i - Math.PI / 2;
        const rad = i % 2 === 0 ? p.r : p.r * 0.45;
        ctx.lineTo(Math.cos(a) * rad, Math.sin(a) * rad);
      }
      ctx.closePath();
      ctx.fill();
    } else if (p.type === 'triangle') {
      ctx.beginPath();
      ctx.moveTo(0, -p.r);
      ctx.lineTo(p.r * 0.87, p.r * 0.5);
      ctx.lineTo(-p.r * 0.87, p.r * 0.5);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  function lineCircleIntersect(x1, y1, x2, y2, cx, cy, r) {
    const dx = x2 - x1, dy = y2 - y1;
    const fx = x1 - cx, fy = y1 - cy;
    const a = dx * dx + dy * dy;
    const b = 2 * (fx * dx + fy * dy);
    const c = fx * fx + fy * fy - r * r;
    let disc = b * b - 4 * a * c;
    if (disc < 0) return false;
    disc = Math.sqrt(disc);
    const t1 = (-b - disc) / (2 * a);
    const t2 = (-b + disc) / (2 * a);
    return (t1 >= 0 && t1 <= 1) || (t2 >= 0 && t2 <= 1) || (t1 < 0 && t2 > 1);
  }

  function checkSliceHit(s) {
    if (trail.length < 2) return false;
    for (let i = 1; i < trail.length; i++) {
      if (lineCircleIntersect(trail[i-1].x, trail[i-1].y, trail[i].x, trail[i].y, s.x, s.y, s.r)) {
        return true;
      }
    }
    return false;
  }

  function updateHUD() {
    scoreEl.textContent = score;
    comboEl.textContent = combo > 1 ? `COMBO x${combo}` : '';
    livesEl.textContent = '♥'.repeat(lives);
    bestEl.textContent = best;
  }

  function bombExplosion() {
    // Flash screen red
    ctx.save();
    ctx.fillStyle = 'rgba(255,23,68,0.3)';
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
    // Big particle burst
    for (let i = 0; i < 40; i++) {
      const a = rand(0, Math.PI * 2);
      const speed = rand(3, 10);
      particles.push({
        x: W / 2, y: H / 2,
        vx: Math.cos(a) * speed,
        vy: Math.sin(a) * speed,
        life: 1, decay: rand(0.01, 0.03),
        color: BOMB_COLOR, size: rand(3, 8)
      });
    }
  }

  function endGame() {
    gameOver = true;
    running = false;
    if (score > best) {
      best = score;
      localStorage.setItem('neon-slice-best', best);
    }
    startBtn.textContent = 'PLAY AGAIN';
    startBtn.style.display = 'inline-block';
    updateHUD();
  }

  function reset() {
    shapes = [];
    slicedPieces = [];
    trail = [];
    sliceTrailPoints = [];
    particles = [];
    slicing = false;
    score = 0;
    combo = 0;
    maxCombo = 0;
    lives = 3;
    spawnTimer = 0;
    spawnInterval = 80;
    difficulty = 1;
    frameCount = 0;
    gameOver = false;
    running = true;
    startBtn.style.display = 'none';
    updateHUD();
  }

  function update() {
    frameCount++;

    // Increase difficulty over time
    difficulty = 1 + Math.floor(frameCount / 600);
    spawnInterval = Math.max(35, 80 - difficulty * 3);

    // Spawn shapes
    spawnTimer++;
    if (spawnTimer >= spawnInterval) {
      spawnTimer = 0;
      spawnBatch();
    }

    // Update shapes
    for (let i = shapes.length - 1; i >= 0; i--) {
      const s = shapes[i];
      s.x += s.vx;
      s.y += s.vy;
      s.vy += s.gravity;
      s.angle += s.spin;

      // Check slice
      if (!s.sliced && slicing && trail.length >= 2) {
        if (checkSliceHit(s)) {
          if (s.type === 'bomb') {
            sliceShape(s);
            bombExplosion();
            endGame();
            return;
          }
          sliceShape(s);
          combo++;
          const pts = 10 * combo;
          score += pts;
          // Show floating score
          particles.push({
            x: s.x, y: s.y - 20,
            vx: 0, vy: -1,
            life: 1, decay: 0.02,
            color: s.color, size: 0,
            text: `+${pts}`,
            textSize: combo > 2 ? 18 : 14
          });
        }
      }

      // Off screen (fell back down without being sliced)
      if (s.y > H + s.r * 2) {
        if (!s.sliced && s.type !== 'bomb') {
          s.missed = true;
          lives--;
          // Miss indicator
          spawnSliceParticles(s.x, H - 10, '#7a7a90', 5);
          if (lives <= 0) {
            shapes.splice(i, 1);
            endGame();
            return;
          }
        }
        shapes.splice(i, 1);
      }
    }

    // Reset combo when not slicing
    if (!slicing && combo > 0) {
      if (combo > maxCombo) maxCombo = combo;
      combo = 0;
    }

    // Update sliced pieces
    for (let i = slicedPieces.length - 1; i >= 0; i--) {
      const p = slicedPieces[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += p.gravity;
      p.angle += p.spin;
      p.life -= p.decay;
      if (p.life <= 0 || p.y > H + 100) {
        slicedPieces.splice(i, 1);
      }
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= p.decay;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Fade slice trail
    for (let i = sliceTrailPoints.length - 1; i >= 0; i--) {
      sliceTrailPoints[i].life -= 0.06;
      if (sliceTrailPoints[i].life <= 0) sliceTrailPoints.splice(i, 1);
    }

    updateHUD();
  }

  function draw() {
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, W, H);

    // Draw subtle grid
    ctx.strokeStyle = 'rgba(122,122,144,0.06)';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 40) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += 40) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    // Draw slice trail (persistent glow)
    for (let i = 1; i < sliceTrailPoints.length; i++) {
      const p0 = sliceTrailPoints[i - 1];
      const p1 = sliceTrailPoints[i];
      ctx.save();
      ctx.globalAlpha = p1.life * 0.7;
      ctx.strokeStyle = '#ffffff';
      ctx.shadowColor = CYAN;
      ctx.shadowBlur = 15;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p1.x, p1.y);
      ctx.stroke();
      ctx.restore();
    }

    // Draw active trail
    if (trail.length >= 2) {
      ctx.save();
      ctx.strokeStyle = '#ffffff';
      ctx.shadowColor = CYAN;
      ctx.shadowBlur = 20;
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(trail[0].x, trail[0].y);
      for (let i = 1; i < trail.length; i++) {
        ctx.lineTo(trail[i].x, trail[i].y);
      }
      ctx.stroke();
      ctx.restore();
    }

    // Draw shapes
    for (const s of shapes) {
      if (!s.sliced) drawShape(ctx, s, 1);
    }

    // Draw sliced pieces
    for (const p of slicedPieces) {
      drawSlicedPiece(p);
    }

    // Draw particles
    for (const p of particles) {
      ctx.save();
      ctx.globalAlpha = p.life;
      if (p.text) {
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 10;
        ctx.font = `bold ${p.textSize}px 'JetBrains Mono', monospace`;
        ctx.textAlign = 'center';
        ctx.fillText(p.text, p.x, p.y);
      } else {
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    // Game over overlay
    if (gameOver) {
      ctx.save();
      ctx.fillStyle = 'rgba(10,10,15,0.75)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = MAGENTA;
      ctx.shadowColor = MAGENTA;
      ctx.shadowBlur = 30;
      ctx.font = "bold 36px 'JetBrains Mono', monospace";
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', W / 2, H / 2 - 40);
      ctx.shadowBlur = 10;
      ctx.fillStyle = CYAN;
      ctx.font = "bold 20px 'JetBrains Mono', monospace";
      ctx.fillText(`SCORE: ${score}`, W / 2, H / 2 + 10);
      if (maxCombo > 1) {
        ctx.fillStyle = GREEN;
        ctx.font = "14px 'JetBrains Mono', monospace";
        ctx.fillText(`BEST COMBO: x${maxCombo}`, W / 2, H / 2 + 40);
      }
      if (score >= best && score > 0) {
        ctx.fillStyle = '#ffb000';
        ctx.font = "bold 14px 'JetBrains Mono', monospace";
        ctx.fillText('★ NEW BEST ★', W / 2, H / 2 + 70);
      }
      ctx.restore();
    }

    // Idle screen
    if (!running && !gameOver) {
      ctx.save();
      ctx.fillStyle = MAGENTA;
      ctx.shadowColor = MAGENTA;
      ctx.shadowBlur = 20;
      ctx.font = "bold 24px 'JetBrains Mono', monospace";
      ctx.textAlign = 'center';
      ctx.fillText('NEON SLICE', W / 2, H / 2 - 30);
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#7a7a90';
      ctx.font = "13px 'JetBrains Mono', monospace";
      ctx.fillText('drag to slice shapes', W / 2, H / 2 + 10);
      ctx.fillText('avoid the bombs', W / 2, H / 2 + 35);
      ctx.restore();
    }
  }

  function loop() {
    if (running) update();
    draw();
    requestAnimationFrame(loop);
  }

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    if (e.touches) {
      return { x: (e.touches[0].clientX - rect.left) * scaleX, y: (e.touches[0].clientY - rect.top) * scaleY };
    }
    return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
  }

  function onDown(e) {
    if (!running) return;
    e.preventDefault();
    slicing = true;
    combo = 0;
    trail = [getPos(e)];
  }

  function onMove(e) {
    if (!slicing || !running) return;
    e.preventDefault();
    const p = getPos(e);
    trail.push(p);
    sliceTrailPoints.push({ x: p.x, y: p.y, life: 1 });
    // Keep trail manageable
    if (trail.length > 20) trail.shift();
  }

  function onUp(e) {
    if (!slicing) return;
    slicing = false;
    trail = [];
  }

  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('mouseup', onUp);
  canvas.addEventListener('mouseleave', onUp);
  canvas.addEventListener('touchstart', onDown, { passive: false });
  canvas.addEventListener('touchmove', onMove, { passive: false });
  canvas.addEventListener('touchend', onUp);

  startBtn.addEventListener('click', () => {
    reset();
  });

  // Responsive canvas
  function resize() {
    const parent = canvas.parentElement;
    const maxW = Math.min(parent.clientWidth, 480);
    canvas.style.width = maxW + 'px';
    canvas.style.height = (maxW * H / W) + 'px';
  }
  window.addEventListener('resize', resize);
  resize();

  loop();
})();
