<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIPE PUZZLE / ZERO game lab</title>
  <meta name="theme-color" content="#14102a">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared.css">
  <style>
    main {
      max-width: 520px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      text-align: center;
    }
    .back {
      display: inline-block;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      margin-bottom: 1.5rem;
      text-align: left;
      width: 100%;
      transition: color 0.3s;
    }
    .back:hover { color: var(--accent-cyan); }
    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent-magenta);
      letter-spacing: 0.1em;
      margin: 0 0 1.2rem;
      text-shadow: 0 0 20px var(--glow-magenta);
    }
    .controls {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 1rem;
    }
    .sz-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      padding: 0.4rem 0.8rem;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
    }
    .sz-btn:hover { border-color: var(--accent-cyan); color: var(--text-bright); }
    .sz-btn.active {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
      box-shadow: 0 0 8px var(--glow-cyan-soft);
    }
    .stats {
      display: flex;
      justify-content: center;
      gap: 2rem;
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      margin-bottom: 1rem;
    }
    #game {
      display: block;
      margin: 0 auto;
      cursor: pointer;
    }
    .hint {
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      margin: 1rem 0;
    }
    #new-game {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      padding: 0.5rem 1.2rem;
      border: 1px solid var(--accent-magenta);
      background: transparent;
      color: var(--accent-magenta);
      cursor: pointer;
      transition: all 0.2s;
    }
    #new-game:hover {
      background: var(--accent-magenta);
      color: var(--bg-void);
      box-shadow: 0 0 12px var(--glow-magenta);
    }
    #win-msg {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--accent-green);
      letter-spacing: 0.1em;
      margin: 1rem 0;
      text-shadow: 0 0 16px var(--glow-green);
      display: none;
    }
    #win-msg.show { display: block; }
  </style>
  <script>(function(){var t=localStorage.getItem('zero-theme');if(!t&&window.matchMedia('(prefers-color-scheme:light)').matches)t='light';if(t==='light')document.documentElement.setAttribute('data-theme','light')})()</script>
</head>
<body>
<main>
  <a href="./" class="back">&lt; GAME LAB</a>
  <h1>PIPE PUZZLE</h1>
  <div class="controls">
    <button class="sz-btn active" data-size="0">5&times;5</button>
    <button class="sz-btn" data-size="1">7&times;7</button>
    <button class="sz-btn" data-size="2">9&times;9</button>
  </div>
  <div class="stats">
    <span id="stat-moves">MOVES: 0</span>
    <span id="stat-timer">TIME: 0:00</span>
  </div>
  <canvas id="game"></canvas>
  <p class="hint">CLICK to rotate &middot; RIGHT-CLICK to reverse &middot; connect all pipes</p>
  <button id="new-game">NEW PUZZLE</button>
  <div id="win-msg">&#9632; CONNECTED &#9632;</div>
</main>
<script>
(function() {
  'use strict';

  var canvas = document.getElementById('game');
  var ctx = canvas.getContext('2d');
  var movesEl = document.getElementById('stat-moves');
  var timerEl = document.getElementById('stat-timer');
  var winEl = document.getElementById('win-msg');

  /* ── Theme-aware canvas colors ── */
  function css(prop) {
    return getComputedStyle(document.documentElement).getPropertyValue(prop).trim();
  }
  function colors() {
    return {
      bg: css('--bg-void'),
      cell: css('--bg-panel'),
      border: css('--border'),
      matched: css('--accent-cyan'),
      unmatched: css('--accent-magenta'),
      solved: css('--accent-green'),
      dim: css('--text-dim'),
      hover: css('--border-hover')
    };
  }

  /* ── Constants ── */
  // Directions: 0=Up, 1=Right, 2=Down, 3=Left
  var DR = [-1, 0, 1, 0];
  var DC = [0, 1, 0, -1];
  var SIZES = [5, 7, 9];

  /* ── State ── */
  var level = 0;
  var rows = 5, cols = 5;
  var grid = [];     // grid[r][c] = { base: bitmask, rot: 0-3 }
  var moves = 0;
  var startTime = 0;
  var solved = false;
  var hoverR = -1, hoverC = -1;
  var cellSize = 0;
  var canvasW = 0;

  /* ── Connection helpers ── */
  function rotateCW(conn) {
    return ((conn << 1) | (conn >> 3)) & 0xF;
  }
  function rotateN(conn, n) {
    n = ((n % 4) + 4) % 4;
    for (var i = 0; i < n; i++) conn = rotateCW(conn);
    return conn;
  }
  function getConn(r, c) {
    return rotateN(grid[r][c].base, grid[r][c].rot);
  }
  function armOK(r, c, d) {
    var conn = getConn(r, c);
    if (!(conn & (1 << d))) return true;
    var nr = r + DR[d], nc = c + DC[d];
    if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) return false;
    return !!(getConn(nr, nc) & (1 << ((d + 2) % 4)));
  }
  function checkSolved() {
    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        var conn = getConn(r, c);
        for (var d = 0; d < 4; d++) {
          var has = !!(conn & (1 << d));
          var nr = r + DR[d], nc = c + DC[d];
          if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) {
            if (has) return false;
          } else {
            var nhas = !!(getConn(nr, nc) & (1 << ((d + 2) % 4)));
            if (has !== nhas) return false;
          }
        }
      }
    }
    return true;
  }

  /* ── Puzzle generation (randomized DFS spanning tree + extra edges) ── */
  function generate() {
    rows = SIZES[level];
    cols = SIZES[level];

    var edges = [];
    for (var r = 0; r < rows; r++) {
      edges[r] = [];
      for (var c = 0; c < cols; c++) edges[r][c] = {};
    }

    // Randomized DFS for spanning tree
    var visited = [];
    for (var r = 0; r < rows; r++) {
      visited[r] = [];
      for (var c = 0; c < cols; c++) visited[r][c] = false;
    }
    var stack = [[0, 0]];
    visited[0][0] = true;

    while (stack.length > 0) {
      var top = stack[stack.length - 1];
      var cr = top[0], cc = top[1];
      var dirs = [];
      for (var d = 0; d < 4; d++) {
        var nr = cr + DR[d], nc = cc + DC[d];
        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && !visited[nr][nc]) {
          dirs.push(d);
        }
      }
      if (dirs.length === 0) { stack.pop(); continue; }
      var pd = dirs[Math.floor(Math.random() * dirs.length)];
      var pnr = cr + DR[pd], pnc = cc + DC[pd];
      visited[pnr][pnc] = true;
      edges[cr][cc][pd] = true;
      edges[pnr][pnc][(pd + 2) % 4] = true;
      stack.push([pnr, pnc]);
    }

    // Add extra edges for more complex pipe shapes
    var extra = Math.floor(rows * cols * 0.2);
    for (var i = 0; i < extra; i++) {
      var er = Math.floor(Math.random() * rows);
      var ec = Math.floor(Math.random() * cols);
      var ed = Math.floor(Math.random() * 4);
      var enr = er + DR[ed], enc = ec + DC[ed];
      if (enr >= 0 && enr < rows && enc >= 0 && enc < cols && !edges[er][ec][ed]) {
        edges[er][ec][ed] = true;
        edges[enr][enc][(ed + 2) % 4] = true;
      }
    }

    // Build grid
    grid = [];
    for (var r = 0; r < rows; r++) {
      grid[r] = [];
      for (var c = 0; c < cols; c++) {
        var base = 0;
        for (var d = 0; d < 4; d++) {
          if (edges[r][c][d]) base |= (1 << d);
        }
        grid[r][c] = { base: base, rot: 0 };
      }
    }

    // Scramble until not solved
    var attempts = 0;
    do {
      for (var r = 0; r < rows; r++) {
        for (var c = 0; c < cols; c++) {
          grid[r][c].rot = Math.floor(Math.random() * 4);
        }
      }
      attempts++;
    } while (checkSolved() && attempts < 200);

    moves = 0;
    startTime = Date.now();
    solved = false;
    winEl.classList.remove('show');
    movesEl.textContent = 'MOVES: 0';
  }

  /* ── Canvas sizing ── */
  function resize() {
    canvasW = Math.min(480, window.innerWidth - 48);
    cellSize = canvasW / cols;
    var dpr = window.devicePixelRatio || 1;
    canvas.style.width = canvasW + 'px';
    canvas.style.height = canvasW + 'px';
    canvas.width = Math.round(canvasW * dpr);
    canvas.height = Math.round(canvasW * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    draw();
  }

  /* ── Drawing ── */
  function draw() {
    var C = colors();
    var cs = cellSize;
    var pw = Math.max(4, Math.floor(cs * 0.22));
    var hw = pw / 2;

    // Background
    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, canvasW, canvasW);

    // Cell backgrounds
    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        var x = c * cs, y = r * cs;
        ctx.fillStyle = C.cell;
        ctx.fillRect(x + 0.5, y + 0.5, cs - 1, cs - 1);
        if (r === hoverR && c === hoverC && !solved) {
          ctx.fillStyle = C.hover;
          ctx.globalAlpha = 0.25;
          ctx.fillRect(x + 0.5, y + 0.5, cs - 1, cs - 1);
          ctx.globalAlpha = 1;
        }
      }
    }

    // Grid lines
    ctx.strokeStyle = C.border;
    ctx.lineWidth = 1;
    for (var i = 0; i <= rows; i++) {
      var ly = Math.round(i * cs) + 0.5;
      ctx.beginPath(); ctx.moveTo(0, ly); ctx.lineTo(canvasW, ly); ctx.stroke();
    }
    for (var i = 0; i <= cols; i++) {
      var lx = Math.round(i * cs) + 0.5;
      ctx.beginPath(); ctx.moveTo(lx, 0); ctx.lineTo(lx, canvasW); ctx.stroke();
    }

    // Pipes
    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        var conn = getConn(r, c);
        if (conn === 0) continue;

        var x = c * cs, y = r * cs;
        var cx = x + cs / 2, cy = y + cs / 2;
        var allOK = true;

        // Draw arms
        for (var d = 0; d < 4; d++) {
          if (!(conn & (1 << d))) continue;
          var ok = armOK(r, c, d);
          if (!ok) allOK = false;
          var color = solved ? C.solved : ok ? C.matched : C.unmatched;

          ctx.fillStyle = color;
          ctx.shadowColor = color;
          ctx.shadowBlur = (ok || solved) ? 8 : 0;

          switch (d) {
            case 0: ctx.fillRect(cx - hw, y + 1, pw, cs / 2 - 1); break;
            case 1: ctx.fillRect(cx, cy - hw, cs / 2 - 1, pw); break;
            case 2: ctx.fillRect(cx - hw, cy, pw, cs / 2 - 1); break;
            case 3: ctx.fillRect(x + 1, cy - hw, cs / 2 - 1, pw); break;
          }
          ctx.shadowBlur = 0;
        }

        // Hub
        var hubColor = solved ? C.solved : allOK ? C.matched : C.dim;
        ctx.fillStyle = hubColor;
        ctx.shadowColor = hubColor;
        ctx.shadowBlur = (allOK || solved) ? 6 : 0;
        ctx.fillRect(cx - hw, cy - hw, pw, pw);
        ctx.shadowBlur = 0;
      }
    }
  }

  /* ── Input ── */
  function cellAt(e) {
    var rect = canvas.getBoundingClientRect();
    var ex = (e.clientX !== undefined ? e.clientX : e.touches[0].clientX) - rect.left;
    var ey = (e.clientY !== undefined ? e.clientY : e.touches[0].clientY) - rect.top;
    var gc = Math.floor(ex / cellSize), gr = Math.floor(ey / cellSize);
    if (gr < 0 || gr >= rows || gc < 0 || gc >= cols) return null;
    return [gr, gc];
  }

  function doRotate(r, c, dir) {
    if (solved) return;
    grid[r][c].rot = (grid[r][c].rot + dir + 4) % 4;
    moves++;
    movesEl.textContent = 'MOVES: ' + moves;
    draw();
    if (checkSolved()) {
      solved = true;
      winEl.classList.add('show');
      draw();
    }
  }

  canvas.addEventListener('mousedown', function(e) {
    var cell = cellAt(e);
    if (!cell) return;
    if (e.button === 0) doRotate(cell[0], cell[1], 1);
    else if (e.button === 2) doRotate(cell[0], cell[1], 3);
  });
  canvas.addEventListener('contextmenu', function(e) { e.preventDefault(); });

  canvas.addEventListener('mousemove', function(e) {
    var cell = cellAt(e);
    var nr = cell ? cell[0] : -1, nc = cell ? cell[1] : -1;
    if (nr !== hoverR || nc !== hoverC) { hoverR = nr; hoverC = nc; draw(); }
  });
  canvas.addEventListener('mouseleave', function() {
    if (hoverR !== -1) { hoverR = hoverC = -1; draw(); }
  });

  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    var cell = cellAt(e);
    if (cell) doRotate(cell[0], cell[1], 1);
  });

  /* ── Controls ── */
  document.querySelectorAll('.sz-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.sz-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      level = parseInt(btn.dataset.size);
      generate();
      resize();
    });
  });
  document.getElementById('new-game').addEventListener('click', function() {
    generate();
    resize();
  });

  /* ── Timer ── */
  setInterval(function() {
    if (!solved && startTime > 0) {
      var s = Math.floor((Date.now() - startTime) / 1000);
      var m = Math.floor(s / 60);
      s = s % 60;
      timerEl.textContent = 'TIME: ' + m + ':' + (s < 10 ? '0' : '') + s;
    }
  }, 500);

  /* ── Theme change listener ── */
  var observer = new MutationObserver(function() { draw(); });
  observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

  /* ── Init ── */
  window.addEventListener('resize', resize);
  generate();
  resize();
})();
</script>
<script src="../theme-toggle.js"></script>
</body>
</html>
