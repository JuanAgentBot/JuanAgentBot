<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="theme-color" content="#14102a">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared.css">
  <style>
    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      text-align: center;
    }

    .back {
      display: inline-block;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      margin-bottom: 1.5rem;
      text-align: left;
      width: 100%;
    }

    .back:hover {
      color: var(--accent-cyan);
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent-magenta);
      letter-spacing: 0.12em;
      margin-bottom: 0.3rem;
      text-shadow: 0 0 20px var(--glow-magenta);
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 0.7rem;

    .game-area {
      display: flex;
      justify-content: center;
      gap: 1.5rem;

    canvas {
      border: 1px solid var(--border);

    }

    .side-panel {
      display: flex;

      gap: 1rem;

    }

    .panel-box {

    .panel-label {

    .panel-value {

    }

    #next-canvas {

    }

    .controls {

    .controls kbd {
      display: inline-block;

    .overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;

    }

    .overlay-title {
      font-size: 1.2rem;

      text-shadow: 0 0 20px var(--glow-magenta);
    }

    .overlay-text {

    }

    .overlay-score {

    .board-wrapper {

    .controls-touch {
      display: none;
      font-size: 0.65rem;

    }

    @media (max-width: 500px) {
      main { padding: 0.5rem 0.5rem 0.5rem; }
      h1 { font-size: 1.1rem; margin-bottom: 0.1rem; }
      .subtitle { margin-bottom: 0.4rem; font-size: 0.55rem; }
      .game-area { flex-direction: column; align-items: center; gap: 0.4rem; }
      .side-panel { order: -1; flex-direction: row; flex-wrap: wrap; justify-content: center; min-width: auto; gap: 0.4rem; }
      .panel-box { padding: 0.3rem 0.6rem; }
      .panel-label { font-size: 0.5rem; margin-bottom: 0.2rem; }

      #next-canvas { width: 50px; height: 40px; }
      canvas#board {
        width: min(70vw, calc((100vh - 200px) / 2));
        width: min(70vw, calc((100svh - 200px) / 2));
        height: min(140vw, calc(100vh - 200px));

    }
  </style>
  <script>(function(){var t=localStorage.getItem('zero-theme');if(!t&&window.matchMedia('(prefers-color-scheme:light)').matches)t='light';if(t==='light')document.documentElement.setAttribute('data-theme','light')})()</script>
</head>
<body>
  <main>
    <a href="./" class="back">&lt; GAME LAB</a>
    <h1>FALLING BLOCKS</h1>
    <p class="subtitle">STACK PIECES, CLEAR LINES, SURVIVE</p>

    <div class="game-area">
      <div class="board-wrapper">
        <canvas id="board" width="250" height="500"></canvas>
        <div id="overlay" class="overlay">
          <div class="overlay-title">FALLING BLOCKS</div>
          <div class="overlay-text">PRESS ENTER TO START</div>
        </div>
      </div>
      <div class="side-panel">
        <div class="panel-box">
          <div class="panel-label">NEXT</div>
          <canvas id="next-canvas" width="100" height="80"></canvas>
        </div>
        <div class="panel-box">
          <div class="panel-label">SCORE</div>
          <div class="panel-value" id="score">0</div>
        </div>
        <div class="panel-box">
          <div class="panel-label">LINES</div>
          <div class="panel-value" id="lines">0</div>
        </div>
        <div class="panel-box">
          <div class="panel-label">LEVEL</div>
          <div class="panel-value level" id="level">1</div>
        </div>
      </div>
    </div>

    <div class="controls-touch">
      TAP ROTATE &nbsp; DRAG &#8592;&#8594; MOVE &nbsp; SWIPE &#8595; DROP
    </div>

    <div class="controls">
      <kbd>&#8592;</kbd> <kbd>&#8594;</kbd> MOVE &nbsp;
      <kbd>&#8593;</kbd> ROTATE &nbsp;
      <kbd>&#8595;</kbd> SOFT DROP &nbsp;
      <kbd>SPACE</kbd> HARD DROP &nbsp;
      <kbd>P</kbd> PAUSE
    </div>
  </main>

  <script>
  (function() {
    const COLS = 10;
    const ROWS = 20;
    const CELL = 25;
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const nextCanvas = document.getElementById('next-canvas');
    const nextCtx = nextCanvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const scoreEl = document.getElementById('score');
    const linesEl = document.getElementById('lines');
    const levelEl = document.getElementById('level');

    // Brand colors for pieces
    const COLORS = {
      I: '#00f0ff', // Electric Cyan
      O: '#ffb000', // Amber
      T: '#9d4edd', // Purple Haze
      S: '#39ff14', // Matrix Green
      Z: '#ff2d7b', // Neon Magenta
      L: '#ff6ac1', // Hot Pink
      J: '#00f0ff', // Electric Cyan (lighter shade used differently)
    };

    const GLOW = {
      I: 'rgba(0, 240, 255, 0.4)',
      O: 'rgba(255, 176, 0, 0.4)',
      T: 'rgba(157, 78, 221, 0.4)',
      S: 'rgba(57, 255, 20, 0.4)',
      Z: 'rgba(255, 45, 123, 0.4)',
      L: 'rgba(255, 106, 193, 0.4)',
      J: 'rgba(0, 240, 255, 0.3)',
    };

    // Piece shapes (each rotation state)
    const SHAPES = {
      I: [[0,0],[1,0],[2,0],[3,0]],
      O: [[0,0],[1,0],[0,1],[1,1]],
      T: [[0,0],[1,0],[2,0],[1,1]],
      S: [[1,0],[2,0],[0,1],[1,1]],
      Z: [[0,0],[1,0],[1,1],[2,1]],
      L: [[0,0],[1,0],[2,0],[0,1]],
      J: [[0,0],[1,0],[2,0],[2,1]],
    };

    const PIECE_TYPES = ['I','O','T','S','Z','L','J'];

    let board, piece, nextType, score, lines, level, gameOver, paused, dropInterval, lastDrop, animFrame, started;
    const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

    // Line-clear animation state
    let clearing = false, clearRows = [], clearStart = 0, clearSeeds = {};
    const CLEAR_FLASH_MS = 280;
    const CLEAR_DISSOLVE_MS = 320;

    // Neon phosphor trail
    let trail = [];
    const TRAIL_DURATION = 250;

    // Combo tracking
    let combo = 0;

    function createBoard() {
      return Array.from({length: ROWS}, () => Array(COLS).fill(null));
    }

    function randomType() {
      return PIECE_TYPES[Math.floor(Math.random() * PIECE_TYPES.length)];
    }

    function createPiece(type) {
      const cells = SHAPES[type].map(([x,y]) => [x, y]);
      return {
        type: type,
        cells: cells,
        x: Math.floor((COLS - 3) / 2),
        y: 0,
      };
    }

    function rotateCells(cells) {
      // Find bounding box
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (const [x,y] of cells) {
        minX = Math.min(minX, x);
        minY = Math.min(minY, y);
        maxX = Math.max(maxX, x);
        maxY = Math.max(maxY, y);
      }
      const cx = (minX + maxX) / 2;
      const cy = (minY + maxY) / 2;
      // Rotate 90 degrees clockwise around center
      return cells.map(([x,y]) => {
        const dx = x - cx;
        const dy = y - cy;
        return [Math.round(cx + dy), Math.round(cy - dx)];
      });
    }

    function fits(cells, px, py) {
      for (const [cx, cy] of cells) {
        const bx = px + cx;
        const by = py + cy;
        if (bx < 0 || bx >= COLS || by >= ROWS) return false;
        if (by >= 0 && board[by][bx] !== null) return false;
      }
      return true;
    }

    function lock() {
      for (const [cx, cy] of piece.cells) {
        const bx = piece.x + cx;
        const by = piece.y + cy;
        if (by >= 0 && by < ROWS) {
          board[by][bx] = piece.type;
        }
      }
      // Find completed lines
      const full = [];
      for (let r = 0; r < ROWS; r++) {
        if (board[r].every(c => c !== null)) full.push(r);
      }
      if (full.length > 0) {
        combo++;
        clearing = true;
        clearRows = full;
        clearStart = performance.now();
        clearSeeds = {};
        for (const r of full) {
          for (let c = 0; c < COLS; c++) {
            clearSeeds[r * COLS + c] = Math.random() * 0.4;
          }
        }
      } else {
        combo = 0;
        spawn();
      }
    }

    function finishClear() {
      const cleared = clearRows.length;
      clearRows.sort((a, b) => b - a);
      for (const r of clearRows) {
        board.splice(r, 1);
        board.unshift(Array(COLS).fill(null));
      }
      const pts = [0, 100, 300, 500, 800];
      score += (pts[cleared] || 800) * level;
      lines += cleared;
      level = Math.floor(lines / 10) + 1;
      dropInterval = Math.max(80, 500 - (level - 1) * 40);
      scoreEl.textContent = score;
      linesEl.textContent = lines;
      levelEl.textContent = level;
      clearing = false;
      clearRows = [];
      lastDrop = performance.now();
      spawn();
    }

    function spawn() {
      piece = createPiece(nextType);
      nextType = randomType();
      drawNext();
      if (!fits(piece.cells, piece.x, piece.y)) {
        gameOver = true;
        showOverlay('GAME OVER', 'SCORE: ' + score, isTouch ? 'TAP TO RESTART' : 'PRESS ENTER TO RESTART');
      }
    }

    function ghostY() {
      let gy = piece.y;
      while (fits(piece.cells, piece.x, gy + 1)) gy++;
      return gy;
    }

    function drawCell(context, x, y, type, alpha) {
      const color = COLORS[type];
      const glow = GLOW[type];
      context.globalAlpha = alpha || 1;
      context.fillStyle = color;
      context.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2);
      // Inner highlight
      context.fillStyle = 'rgba(255,255,255,0.12)';
      context.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, 3);
      context.fillRect(x * CELL + 1, y * CELL + 1, 3, CELL - 2);
      // Glow
      context.shadowColor = glow;
      context.shadowBlur = 8;
      context.fillStyle = color;
      context.fillRect(x * CELL + 2, y * CELL + 2, CELL - 4, CELL - 4);
      context.shadowBlur = 0;
      context.globalAlpha = 1;
    }

    function getComputedColor(prop) {
      return getComputedStyle(document.documentElement).getPropertyValue(prop).trim();
    }

    function draw() {
      const bgColor = getComputedColor('--bg') || '#0a0a0f';
      const borderColor = getComputedColor('--border') || '#7a7a90';

      ctx.fillStyle = bgColor;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Screen shake for combos
      let shaking = false;
      if (clearing && combo >= 2) {
        const shakeElapsed = performance.now() - clearStart;
        if (shakeElapsed < CLEAR_FLASH_MS) {
          shaking = true;
          const intensity = Math.min(combo, 5) * 1.5;
          ctx.save();
          ctx.translate((Math.random() - 0.5) * intensity, (Math.random() - 0.5) * intensity);
        }
      }

      // Grid lines (pulse with drop rhythm)
      const gridPulse = started && !gameOver && !paused
        ? 0.06 + Math.sin(performance.now() / (dropInterval || 500) * Math.PI) * 0.04
        : 0.08;
      ctx.strokeStyle = 'rgba(122, 122, 144, ' + gridPulse.toFixed(3) + ')';
      ctx.lineWidth = 1;
      for (let c = 1; c < COLS; c++) {
        ctx.beginPath();
        ctx.moveTo(c * CELL, 0);
        ctx.lineTo(c * CELL, canvas.height);
        ctx.stroke();
      }
      for (let r = 1; r < ROWS; r++) {
        ctx.beginPath();
        ctx.moveTo(0, r * CELL);
        ctx.lineTo(canvas.width, r * CELL);
        ctx.stroke();
      }

      // Locked cells
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (!board[r][c]) continue;
          if (clearing && clearRows.includes(r)) {
            const elapsed = performance.now() - clearStart;
            const type = board[r][c];
            if (elapsed < CLEAR_FLASH_MS) {
              // Flash: rapid white pulses with expanding glow
              const t = elapsed / CLEAR_FLASH_MS;
              const pulse = Math.pow(Math.abs(Math.sin(t * Math.PI * 3)), 0.6);
              ctx.fillStyle = COLORS[type];
              ctx.fillRect(c * CELL + 1, r * CELL + 1, CELL - 2, CELL - 2);
              ctx.globalAlpha = pulse * 0.9;
              ctx.fillStyle = '#ffffff';
              ctx.fillRect(c * CELL + 1, r * CELL + 1, CELL - 2, CELL - 2);
              ctx.shadowColor = 'rgba(255, 255, 255, 0.8)';
              ctx.shadowBlur = 8 + pulse * 16;
              ctx.fillRect(c * CELL + 2, r * CELL + 2, CELL - 4, CELL - 4);
              ctx.shadowBlur = 0;
              ctx.globalAlpha = 1;
            } else {
              // Dissolve: per-cell shrink + fade with staggered timing
              const dt = (elapsed - CLEAR_FLASH_MS) / CLEAR_DISSOLVE_MS;
              const delay = clearSeeds[r * COLS + c] || 0;
              const cellT = Math.max(0, Math.min(1, (dt - delay) / (1 - delay)));
              if (cellT >= 1) continue;
              const shrink = cellT * (CELL / 2);
              const w = Math.max(0, CELL - 2 - shrink * 2);
              ctx.globalAlpha = 1 - cellT;
              ctx.fillStyle = COLORS[type];
              ctx.shadowColor = GLOW[type];
              ctx.shadowBlur = 14 * (1 - cellT);
              ctx.fillRect(c * CELL + 1 + shrink, r * CELL + 1 + shrink, w, w);
              ctx.shadowBlur = 0;
              ctx.globalAlpha = 1;
            }
          } else {
            drawCell(ctx, c, r, board[r][c]);
          }
        }
      }

      // Neon phosphor trail
      const trailNow = performance.now();
      for (let i = trail.length - 1; i >= 0; i--) {
        const tr = trail[i];
        const age = trailNow - tr.time;
        if (age > TRAIL_DURATION) { trail.splice(i, 1); continue; }
        const alpha = (1 - age / TRAIL_DURATION) * 0.25;
        for (const [cx, cy] of tr.cells) {
          const bx = tr.x + cx;
          const by = tr.y + cy;
          if (by >= 0 && by < ROWS && bx >= 0 && bx < COLS) {
            ctx.globalAlpha = alpha;
            ctx.fillStyle = COLORS[tr.type];
            ctx.shadowColor = GLOW[tr.type];
            ctx.shadowBlur = 6;
            ctx.fillRect(bx * CELL + 1, by * CELL + 1, CELL - 2, CELL - 2);
            ctx.shadowBlur = 0;
          }
        }
      }
      ctx.globalAlpha = 1;

      if (piece && !gameOver && !clearing) {
        // Ghost piece
        const gy = ghostY();
        if (gy !== piece.y) {
          for (const [cx, cy] of piece.cells) {
            const bx = piece.x + cx;
            const by = gy + cy;
            if (by >= 0) {
              ctx.globalAlpha = 0.15;
              ctx.fillStyle = COLORS[piece.type];
              ctx.fillRect(bx * CELL + 1, by * CELL + 1, CELL - 2, CELL - 2);
              ctx.globalAlpha = 1;
            }
          }
        }

        // Active piece
        for (const [cx, cy] of piece.cells) {
          const bx = piece.x + cx;
          const by = piece.y + cy;
          if (by >= 0) drawCell(ctx, bx, by, piece.type);
        }
      }

      // Combo indicator
      if (combo >= 2 && clearing) {
        const comboElapsed = performance.now() - clearStart;
        const comboTotal = CLEAR_FLASH_MS + CLEAR_DISSOLVE_MS;
        const comboAlpha = Math.max(0, 1 - comboElapsed / comboTotal * 0.5);
        const fontSize = Math.min(24 + combo * 3, 40);
        ctx.globalAlpha = comboAlpha;
        ctx.font = 'bold ' + fontSize + 'px "JetBrains Mono", monospace';
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        ctx.shadowColor = combo >= 4 ? 'rgba(255, 45, 123, 0.9)' : 'rgba(0, 240, 255, 0.8)';
        ctx.shadowBlur = 12 + combo * 4;
        ctx.fillText('\u00d7' + combo, canvas.width / 2, canvas.height / 2);
        ctx.shadowBlur = 0;
        ctx.textAlign = 'left';
        ctx.globalAlpha = 1;
      }

      if (shaking) ctx.restore();
    }

    function drawNext() {
      const bgColor = getComputedColor('--bg') || '#0a0a0f';
      nextCtx.fillStyle = bgColor;
      nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
      const cells = SHAPES[nextType];
      // Center the piece in the preview
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      for (const [x,y] of cells) {
        minX = Math.min(minX, x);
        maxX = Math.max(maxX, x);
        minY = Math.min(minY, y);
        maxY = Math.max(maxY, y);
      }
      const pw = maxX - minX + 1;
      const ph = maxY - minY + 1;
      const previewCell = 20;
      const ox = Math.floor((nextCanvas.width - pw * previewCell) / 2) / previewCell - minX;
      const oy = Math.floor((nextCanvas.height - ph * previewCell) / 2) / previewCell - minY;

      for (const [cx, cy] of cells) {
        const px = (cx + ox);
        const py = (cy + oy);
        nextCtx.fillStyle = COLORS[nextType];
        nextCtx.shadowColor = GLOW[nextType];
        nextCtx.shadowBlur = 6;
        nextCtx.fillRect(px * previewCell + 1, py * previewCell + 1, previewCell - 2, previewCell - 2);
        nextCtx.shadowBlur = 0;
        // Inner highlight
        nextCtx.fillStyle = 'rgba(255,255,255,0.12)';
        nextCtx.fillRect(px * previewCell + 1, py * previewCell + 1, previewCell - 2, 2);
      }
    }

    function showOverlay(title, mid, sub) {
      overlay.style.display = 'flex';
      overlay.innerHTML = '<div class="overlay-title">' + title + '</div>' +
        (mid ? '<div class="overlay-score">' + mid + '</div>' : '') +
        '<div class="overlay-text">' + sub + '</div>';
    }

    function hideOverlay() {
      overlay.style.display = 'none';
    }

    function init() {
      board = createBoard();
      score = 0; lines = 0; level = 1;
      gameOver = false; paused = false;
      trail = []; combo = 0;
      dropInterval = 500;
      lastDrop = 0;
      scoreEl.textContent = '0';
      linesEl.textContent = '0';
      levelEl.textContent = '1';
      nextType = randomType();
      spawn();
      hideOverlay();
      started = true;
    }

    function tick(time) {
      animFrame = requestAnimationFrame(tick);
      if (gameOver || paused || !started) { draw(); return; }
      if (clearing) {
        if (time - clearStart >= CLEAR_FLASH_MS + CLEAR_DISSOLVE_MS) finishClear();
        draw();
        return;
      }
      if (time - lastDrop > dropInterval) {
        if (fits(piece.cells, piece.x, piece.y + 1)) {
          pushTrail();
          piece.y++;
        } else {
          lock();
        }
        lastDrop = time;
      }
      draw();
    }

    function pushTrail() {
      trail.push({cells: piece.cells.map(c => [...c]), x: piece.x, y: piece.y, type: piece.type, time: performance.now()});
    }

    function move(dx) {
      if (fits(piece.cells, piece.x + dx, piece.y)) piece.x += dx;
    }

    function rotate() {
      if (piece.type === 'O') return;
      const rotated = rotateCells(piece.cells);
      // Try normal position, then wall kicks
      const kicks = [0, -1, 1, -2, 2];
      for (const kick of kicks) {
        if (fits(rotated, piece.x + kick, piece.y)) {
          piece.cells = rotated;
          piece.x += kick;
          return;
        }
      }
    }

    function softDrop() {
      if (fits(piece.cells, piece.x, piece.y + 1)) {
        pushTrail();
        piece.y++;
        score += 1;
        scoreEl.textContent = score;
        lastDrop = performance.now();
      }
    }

    function hardDrop() {
      let dropped = 0;
      const dropNow = performance.now();
      while (fits(piece.cells, piece.x, piece.y + 1)) {
        trail.push({cells: piece.cells.map(c => [...c]), x: piece.x, y: piece.y, type: piece.type, time: dropNow - dropped * 20});
        piece.y++;
        dropped++;
      }
      score += dropped * 2;
      scoreEl.textContent = score;
      lock();
      lastDrop = performance.now();
    }

    // Keyboard
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        if (gameOver || !started) { init(); return; }
      }
      if (!started || gameOver || clearing) return;
      if (e.key === 'p' || e.key === 'P') {
        paused = !paused;
        if (paused) {
          showOverlay('PAUSED', null, 'PRESS P TO RESUME');
        } else {
          hideOverlay();
          lastDrop = performance.now();
        }
        return;
      }
      if (paused) return;
      switch(e.key) {
        case 'ArrowLeft': move(-1); e.preventDefault(); break;
        case 'ArrowRight': move(1); e.preventDefault(); break;
        case 'ArrowUp': rotate(); e.preventDefault(); break;
        case 'ArrowDown': softDrop(); e.preventDefault(); break;
        case ' ': hardDrop(); e.preventDefault(); break;
      }
    });

    // Touch gesture controls
    (function() {
      const wrapper = document.querySelector('.board-wrapper');
      let touchId = null;
      let startX = 0, startY = 0, startTime = 0;
      let lastX = 0, dragAccum = 0;
      const DRAG_STEP = 35;    // px per column move
      const TAP_DIST = 15;     // max px for a tap
      const TAP_TIME = 250;    // max ms for a tap
      const SWIPE_DIST = 40;   // min px for a swipe

      function findTouch(list, id) {
        for (let i = 0; i < list.length; i++) {
          if (list[i].identifier === id) return list[i];
        }
        return null;
      }

      wrapper.addEventListener('touchstart', function(e) {
        e.preventDefault();
        if (touchId !== null) return;
        var t = e.changedTouches[0];
        touchId = t.identifier;
        startX = lastX = t.clientX;
        startY = t.clientY;
        startTime = Date.now();
        dragAccum = 0;
      }, {passive: false});

      wrapper.addEventListener('touchmove', function(e) {
        e.preventDefault();
        var t = findTouch(e.changedTouches, touchId);
        if (!t || !started || gameOver || paused || clearing) return;
        var dx = t.clientX - lastX;
        lastX = t.clientX;
        dragAccum += dx;
        while (dragAccum > DRAG_STEP) { move(1); dragAccum -= DRAG_STEP; }
        while (dragAccum < -DRAG_STEP) { move(-1); dragAccum += DRAG_STEP; }
      }, {passive: false});

      wrapper.addEventListener('touchend', function(e) {
        e.preventDefault();
        var t = findTouch(e.changedTouches, touchId);
        if (!t) return;
        touchId = null;
        var dx = t.clientX - startX;
        var dy = t.clientY - startY;
        var dist = Math.sqrt(dx * dx + dy * dy);
        var elapsed = Date.now() - startTime;

        if (dist < TAP_DIST && elapsed < TAP_TIME) {
          // Tap → start or rotate
          if (!started || gameOver) { init(); return; }
          if (clearing) return;
          rotate();
        } else if (dy > SWIPE_DIST && Math.abs(dy) > Math.abs(dx) * 1.5) {
          // Swipe down → hard drop
          if (started && !gameOver && !paused && !clearing) hardDrop();
        }
      }, {passive: false});

      wrapper.addEventListener('touchcancel', function() { touchId = null; });

      // Prevent page scroll while game is active
      document.addEventListener('touchmove', function(e) {
        if (started && !gameOver) e.preventDefault();
      }, {passive: false});
    })();

    // Start
    board = createBoard();
    showOverlay('FALLING BLOCKS', null, isTouch ? 'TAP TO START' : 'PRESS ENTER TO START');
    draw();
    requestAnimationFrame(tick);
  })();
  </script>
  <script src="../theme-toggle.js"></script>
</body>
</html>
