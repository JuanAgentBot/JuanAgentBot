<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048 / ZERO game lab</title>
  <meta name="theme-color" content="#14102a">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared.css">
  <style>
    main {
      max-width: 480px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      text-align: center;
    }

    .back {
      display: inline-block;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      margin-bottom: 1.5rem;
      text-align: left;
      width: 100%;
    }

    .back:hover {
      color: var(--accent-cyan);
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent-magenta);
      letter-spacing: 0.12em;
      margin-bottom: 0.3rem;
      text-shadow: 0 0 20px var(--glow-magenta);
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .scores {
      display: flex;
      gap: 1rem;
    }

    .score-box {
      border: 1px solid var(--border);
      padding: 0.4rem 0.8rem;
      text-align: center;
      min-width: 70px;
    }

    .score-label {
      font-size: 0.55rem;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      margin-bottom: 0.15rem;
    }

    .score-value {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent-cyan);
      text-shadow: 0 0 8px var(--glow-cyan);
      letter-spacing: 0.04em;
    }

    .new-game-btn {
      background: none;
      border: 1px solid var(--accent-magenta);
      color: var(--accent-magenta);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 0.5rem 1rem;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .new-game-btn:hover {
      background: rgba(255, 45, 123, 0.1);
      box-shadow: 0 0 12px var(--glow-magenta);
    }

    .grid-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 6px;
      padding: 6px;
      touch-action: none;
    }

    .cell {
      background: rgba(122, 122, 144, 0.1);
      border: 1px solid rgba(122, 122, 144, 0.15);
    }

    .tile-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .tile {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      letter-spacing: 0.02em;
      transition: top 0.12s ease, left 0.12s ease;
      box-sizing: border-box;
    }

    .tile.pop {
      animation: tile-pop 0.2s ease;
    }

    .tile.new-tile {
      animation: tile-appear 0.2s ease;
    }

    @keyframes tile-pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    @keyframes tile-appear {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 15, 0.85);
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay-title {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }

    .overlay-title.win {
      color: #39ff14;
      text-shadow: 0 0 20px rgba(57, 255, 20, 0.6);
    }

    .overlay-title.lose {
      color: var(--accent-magenta);
      text-shadow: 0 0 20px var(--glow-magenta);
    }

    .overlay-sub {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-bottom: 1.5rem;
      letter-spacing: 0.06em;
    }

    .overlay-btn {
      background: none;
      border: 1px solid var(--accent-cyan);
      color: var(--accent-cyan);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 0.6rem 1.5rem;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      margin: 0.3rem;
    }

    .overlay-btn:hover {
      background: rgba(0, 240, 255, 0.1);
      box-shadow: 0 0 12px var(--glow-cyan);
    }

    .controls {
      margin-top: 1.2rem;
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      line-height: 1.8;
    }

    .controls kbd {
      display: inline-block;
      border: 1px solid var(--border);
      padding: 0.15em 0.45em;
      font-family: inherit;
      font-size: inherit;
      color: var(--text-muted);
    }
  </style>
  <script>(function(){var t=localStorage.getItem('zero-theme');if(!t&&window.matchMedia('(prefers-color-scheme:light)').matches)t='light';if(t==='light')document.documentElement.setAttribute('data-theme','light')})()</script>
</head>
<body>
  <main>
    <a href="./" class="back">&lt; GAME LAB</a>
    <h1>2048</h1>
    <p class="subtitle">SLIDE. MERGE. REACH 2048.</p>

    <div class="header-row">
      <div class="scores">
        <div class="score-box">
          <div class="score-label">SCORE</div>
          <div class="score-value" id="score">0</div>
        </div>
        <div class="score-box">
          <div class="score-label">BEST</div>
          <div class="score-value" id="best">0</div>
        </div>
      </div>
      <button class="new-game-btn" id="new-game">NEW GAME</button>
    </div>

    <div class="grid-container" id="grid">
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="tile-layer" id="tile-layer"></div>
      <div class="overlay" id="overlay">
        <div class="overlay-title" id="overlay-title"></div>
        <div class="overlay-sub" id="overlay-sub"></div>
        <div>
          <button class="overlay-btn" id="overlay-btn">TRY AGAIN</button>
          <button class="overlay-btn" id="overlay-continue" style="display:none">KEEP GOING</button>
        </div>
      </div>
    </div>

    <div class="controls">
      <kbd>&#8592;</kbd> <kbd>&#8593;</kbd> <kbd>&#8595;</kbd> <kbd>&#8594;</kbd> or swipe to slide tiles
      &middot; merge matching numbers &middot; reach <span style="color:#39ff14">2048</span> to win
    </div>
  </main>

  <script>
    (function() {
      var SIZE = 4;
      var grid = [];        // grid[row][col] = value or 0
      var score = 0;
      var bestScore = parseInt(localStorage.getItem('zero-2048-best')) || 0;
      var won = false;
      var gameOver = false;
      var keepGoing = false;

      var gridEl = document.getElementById('grid');
      var tileLayer = document.getElementById('tile-layer');
      var scoreEl = document.getElementById('score');
      var bestEl = document.getElementById('best');
      var overlay = document.getElementById('overlay');
      var overlayTitle = document.getElementById('overlay-title');
      var overlaySub = document.getElementById('overlay-sub');
      var overlayBtn = document.getElementById('overlay-btn');
      var overlayContinue = document.getElementById('overlay-continue');

      // Tile color scheme using brand colors
      var TILE_STYLES = {
        2:    { bg: 'rgba(122,122,144,0.25)', color: '#e0e0e8', border: '#7a7a90', glow: 'none', fontSize: 1 },
        4:    { bg: 'rgba(0,139,139,0.3)',     color: '#00f0ff', border: '#008b8b', glow: '0 0 8px rgba(0,240,255,0.3)', fontSize: 1 },
        8:    { bg: 'rgba(0,240,255,0.2)',      color: '#00f0ff', border: '#00f0ff', glow: '0 0 10px rgba(0,240,255,0.4)', fontSize: 1 },
        16:   { bg: 'rgba(157,78,221,0.25)',    color: '#9d4edd', border: '#9d4edd', glow: '0 0 10px rgba(157,78,221,0.4)', fontSize: 1 },
        32:   { bg: 'rgba(255,45,123,0.2)',     color: '#ff2d7b', border: '#ff2d7b', glow: '0 0 10px rgba(255,45,123,0.4)', fontSize: 1 },
        64:   { bg: 'rgba(255,106,193,0.2)',    color: '#ff6ac1', border: '#ff6ac1', glow: '0 0 10px rgba(255,106,193,0.4)', fontSize: 1 },
        128:  { bg: 'rgba(57,255,20,0.15)',     color: '#39ff14', border: '#39ff14', glow: '0 0 12px rgba(57,255,20,0.4)', fontSize: 0.85 },
        256:  { bg: 'rgba(51,255,51,0.2)',      color: '#33ff33', border: '#33ff33', glow: '0 0 14px rgba(51,255,51,0.5)', fontSize: 0.85 },
        512:  { bg: 'rgba(255,176,0,0.2)',      color: '#ffb000', border: '#ffb000', glow: '0 0 14px rgba(255,176,0,0.5)', fontSize: 0.85 },
        1024: { bg: 'rgba(255,23,68,0.2)',      color: '#ff1744', border: '#ff1744', glow: '0 0 16px rgba(255,23,68,0.5)', fontSize: 0.75 },
        2048: { bg: 'rgba(255,45,123,0.35)',    color: '#ff2d7b', border: '#ff2d7b', glow: '0 0 25px rgba(255,45,123,0.7)', fontSize: 0.75 }
      };

      function getStyle(val) {
        if (TILE_STYLES[val]) return TILE_STYLES[val];
        // For values beyond 2048
        return { bg: 'rgba(255,45,123,0.4)', color: '#ff2d7b', border: '#ff2d7b', glow: '0 0 30px rgba(255,45,123,0.8)', fontSize: 0.65 };
      }

      function init() {
        grid = [];
        for (var r = 0; r < SIZE; r++) {
          grid[r] = [];
          for (var c = 0; c < SIZE; c++) {
            grid[r][c] = 0;
          }
        }
        score = 0;
        won = false;
        gameOver = false;
        keepGoing = false;
        overlay.classList.remove('visible');
        overlayContinue.style.display = 'none';
        addRandomTile();
        addRandomTile();
        render();
        updateScore();
      }

      function emptyCells() {
        var cells = [];
        for (var r = 0; r < SIZE; r++)
          for (var c = 0; c < SIZE; c++)
            if (grid[r][c] === 0) cells.push({ r: r, c: c });
        return cells;
      }

      function addRandomTile() {
        var cells = emptyCells();
        if (cells.length === 0) return null;
        var cell = cells[Math.floor(Math.random() * cells.length)];
        grid[cell.r][cell.c] = Math.random() < 0.9 ? 2 : 4;
        return cell;
      }

      function updateScore() {
        scoreEl.textContent = score;
        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem('zero-2048-best', bestScore);
        }
        bestEl.textContent = bestScore;
      }

      function getTileSize() {
        var gridRect = gridEl.getBoundingClientRect();
        var gap = 6;
        var padding = 6;
        var totalGap = padding * 2 + gap * (SIZE - 1);
        var tileSize = (gridRect.width - totalGap) / SIZE;
        return { size: tileSize, gap: gap, padding: padding, gridWidth: gridRect.width };
      }

      function getTilePos(r, c, dims) {
        var x = dims.padding + c * (dims.size + dims.gap);
        var y = dims.padding + r * (dims.size + dims.gap);
        return { x: x, y: y };
      }

      var newTileCell = null;
      var mergedCells = [];

      function render() {
        tileLayer.innerHTML = '';
        var dims = getTileSize();

        for (var r = 0; r < SIZE; r++) {
          for (var c = 0; c < SIZE; c++) {
            var val = grid[r][c];
            if (val === 0) continue;

            var style = getStyle(val);
            var pos = getTilePos(r, c, dims);
            var tile = document.createElement('div');
            tile.className = 'tile';

            // Check if this is a new tile
            if (newTileCell && newTileCell.r === r && newTileCell.c === c) {
              tile.classList.add('new-tile');
            }
            // Check if this cell had a merge
            for (var m = 0; m < mergedCells.length; m++) {
              if (mergedCells[m].r === r && mergedCells[m].c === c) {
                tile.classList.add('pop');
                break;
              }
            }

            var fontSize = style.fontSize * dims.size * 0.35;
            tile.style.cssText =
              'left:' + pos.x + 'px;' +
              'top:' + pos.y + 'px;' +
              'width:' + dims.size + 'px;' +
              'height:' + dims.size + 'px;' +
              'background:' + style.bg + ';' +
              'color:' + style.color + ';' +
              'border:1px solid ' + style.border + ';' +
              'text-shadow:' + style.glow + ';' +
              'font-size:' + fontSize + 'px;';

            tile.textContent = val;
            tileLayer.appendChild(tile);
          }
        }

        newTileCell = null;
        mergedCells = [];
      }

      function slide(row) {
        // Remove zeros
        var filtered = [];
        for (var i = 0; i < row.length; i++) {
          if (row[i] !== 0) filtered.push(row[i]);
        }

        // Merge adjacent equal tiles
        var merged = [];
        var mergeIndices = [];
        var i = 0;
        while (i < filtered.length) {
          if (i + 1 < filtered.length && filtered[i] === filtered[i + 1]) {
            var newVal = filtered[i] * 2;
            merged.push(newVal);
            mergeIndices.push(merged.length - 1);
            score += newVal;
            if (newVal === 2048 && !won && !keepGoing) won = true;
            i += 2;
          } else {
            merged.push(filtered[i]);
            i++;
          }
        }

        // Pad with zeros
        while (merged.length < SIZE) merged.push(0);

        return { row: merged, mergeIndices: mergeIndices };
      }

      function move(dir) {
        if (gameOver) return false;

        var moved = false;
        mergedCells = [];

        if (dir === 'left') {
          for (var r = 0; r < SIZE; r++) {
            var row = grid[r].slice();
            var result = slide(row);
            for (var c = 0; c < SIZE; c++) {
              if (grid[r][c] !== result.row[c]) moved = true;
              grid[r][c] = result.row[c];
            }
            for (var mi = 0; mi < result.mergeIndices.length; mi++) {
              mergedCells.push({ r: r, c: result.mergeIndices[mi] });
            }
          }
        } else if (dir === 'right') {
          for (var r = 0; r < SIZE; r++) {
            var row = grid[r].slice().reverse();
            var result = slide(row);
            result.row.reverse();
            for (var c = 0; c < SIZE; c++) {
              if (grid[r][c] !== result.row[c]) moved = true;
              grid[r][c] = result.row[c];
            }
            for (var mi = 0; mi < result.mergeIndices.length; mi++) {
              mergedCells.push({ r: r, c: SIZE - 1 - result.mergeIndices[mi] });
            }
          }
        } else if (dir === 'up') {
          for (var c = 0; c < SIZE; c++) {
            var col = [];
            for (var r = 0; r < SIZE; r++) col.push(grid[r][c]);
            var result = slide(col);
            for (var r = 0; r < SIZE; r++) {
              if (grid[r][c] !== result.row[r]) moved = true;
              grid[r][c] = result.row[r];
            }
            for (var mi = 0; mi < result.mergeIndices.length; mi++) {
              mergedCells.push({ r: result.mergeIndices[mi], c: c });
            }
          }
        } else if (dir === 'down') {
          for (var c = 0; c < SIZE; c++) {
            var col = [];
            for (var r = 0; r < SIZE; r++) col.push(grid[r][c]);
            col.reverse();
            var result = slide(col);
            result.row.reverse();
            for (var r = 0; r < SIZE; r++) {
              if (grid[r][c] !== result.row[r]) moved = true;
              grid[r][c] = result.row[r];
            }
            for (var mi = 0; mi < result.mergeIndices.length; mi++) {
              mergedCells.push({ r: SIZE - 1 - result.mergeIndices[mi], c: c });
            }
          }
        }

        if (moved) {
          var nc = addRandomTile();
          newTileCell = nc;
          render();
          updateScore();

          if (won && !keepGoing) {
            showOverlay('win');
          } else if (!canMove()) {
            gameOver = true;
            showOverlay('lose');
          }
        }

        return moved;
      }

      function canMove() {
        // Check for empty cells
        for (var r = 0; r < SIZE; r++)
          for (var c = 0; c < SIZE; c++)
            if (grid[r][c] === 0) return true;

        // Check for adjacent equal tiles
        for (var r = 0; r < SIZE; r++) {
          for (var c = 0; c < SIZE; c++) {
            var val = grid[r][c];
            if (c + 1 < SIZE && grid[r][c + 1] === val) return true;
            if (r + 1 < SIZE && grid[r + 1][c] === val) return true;
          }
        }

        return false;
      }

      function showOverlay(type) {
        if (type === 'win') {
          overlayTitle.textContent = 'YOU WIN';
          overlayTitle.className = 'overlay-title win';
          overlaySub.textContent = 'score: ' + score;
          overlayBtn.textContent = 'NEW GAME';
          overlayContinue.style.display = 'inline-block';
        } else {
          overlayTitle.textContent = 'GAME OVER';
          overlayTitle.className = 'overlay-title lose';
          overlaySub.textContent = 'final score: ' + score;
          overlayBtn.textContent = 'TRY AGAIN';
          overlayContinue.style.display = 'none';
        }
        overlay.classList.add('visible');
      }

      // Controls: keyboard
      document.addEventListener('keydown', function(e) {
        var dirs = {
          'ArrowLeft': 'left', 'ArrowRight': 'right',
          'ArrowUp': 'up', 'ArrowDown': 'down'
        };
        if (dirs[e.key]) {
          e.preventDefault();
          move(dirs[e.key]);
        }
      });

      // Controls: touch/swipe
      var touchStartX = 0, touchStartY = 0;

      gridEl.addEventListener('touchstart', function(e) {
        var touch = e.touches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
      }, { passive: true });

      gridEl.addEventListener('touchend', function(e) {
        if (!e.changedTouches.length) return;
        var touch = e.changedTouches[0];
        var dx = touch.clientX - touchStartX;
        var dy = touch.clientY - touchStartY;
        var absDx = Math.abs(dx);
        var absDy = Math.abs(dy);

        if (Math.max(absDx, absDy) < 30) return; // too small

        if (absDx > absDy) {
          move(dx > 0 ? 'right' : 'left');
        } else {
          move(dy > 0 ? 'down' : 'up');
        }
      }, { passive: true });

      // Buttons
      document.getElementById('new-game').addEventListener('click', init);
      overlayBtn.addEventListener('click', init);
      overlayContinue.addEventListener('click', function() {
        keepGoing = true;
        won = false;
        overlay.classList.remove('visible');
      });

      // Handle resize
      window.addEventListener('resize', function() {
        render();
      });

      // Init
      init();
    })();
  </script>
  <script src="../theme-toggle.js"></script>
</body>
</html>
