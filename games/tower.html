<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tower Stacker / ZERO</title>
  <meta name="theme-color" content="#14102a">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared.css">
  <style>
    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 1.5rem 1.5rem 3rem;
      text-align: center;
    }
    .back {
      display: inline-block;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
      transition: color 0.3s;
      float: left;
    }
    .back:hover { color: var(--accent-cyan); }
    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent-magenta);
      letter-spacing: 0.1em;
      margin-bottom: 0.3rem;
      text-shadow: 0 0 20px var(--glow-magenta);
    }
    .controls-hint {
      color: var(--text-dim);
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      margin-bottom: 1rem;
    }
    #game-canvas {
      border: 1px solid var(--border);
      display: block;
      margin: 0 auto;
      cursor: pointer;
      image-rendering: pixelated;
    }
    .hud {
      display: flex;
      justify-content: space-between;
      max-width: 400px;
      margin: 0.8rem auto 0;
      font-size: 0.75rem;
    }
    .hud-item { color: var(--text-muted); }
    .hud-val { color: var(--accent-cyan); font-weight: 700; }
    .hud-best .hud-val { color: var(--accent-green); }
    .hud-combo .hud-val { color: var(--accent-purple); }
    #overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10, 10, 15, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }
    #overlay.hidden { display: none; }
    .overlay-box {
      border: 1px solid var(--border);
      background: var(--bg-panel);
      padding: 2rem 2.5rem;
      text-align: center;
      max-width: 320px;
    }
    .overlay-title {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--accent-magenta);
      letter-spacing: 0.1em;
      margin-bottom: 0.8rem;
      text-shadow: 0 0 15px var(--glow-magenta);
    }
    .overlay-score {
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent-cyan);
      text-shadow: 0 0 15px var(--glow-cyan);
      margin-bottom: 0.3rem;
    }
    .overlay-label {
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
    }
    .overlay-best {
      font-size: 0.8rem;
      color: var(--accent-green);
      margin-bottom: 1.2rem;
    }
    .overlay-best.new-record { text-shadow: 0 0 10px var(--glow-green); }
    .overlay-action {
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      animation: blink 1.2s step-end infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    .perfect-flash {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 4;
      opacity: 0;
      transition: opacity 0.1s;
    }
    .perfect-flash.show {
      opacity: 1;
      background: radial-gradient(circle, rgba(57,255,20,0.08) 0%, transparent 70%);
    }
  </style>
  <script>(function(){var t=localStorage.getItem('zero-theme');if(!t&&window.matchMedia('(prefers-color-scheme:light)').matches)t='light';if(t==='light')document.documentElement.setAttribute('data-theme','light')})()</script>
</head>
<body>
  <main>
    <a href="./" class="back">&lt; GAME LAB</a>
    <h1>TOWER STACKER</h1>
    <p class="controls-hint">SPACE / CLICK / TAP TO DROP</p>
    <canvas id="game-canvas" width="400" height="500"></canvas>
    <div class="hud">
      <div class="hud-item">HEIGHT <span class="hud-val" id="hud-score">0</span></div>
      <div class="hud-item hud-combo">COMBO <span class="hud-val" id="hud-combo">0</span></div>
      <div class="hud-item hud-best">BEST <span class="hud-val" id="hud-best">0</span></div>
    </div>
  </main>

  <div id="overlay">
    <div class="overlay-box">
      <div class="overlay-title" id="overlay-title">TOWER STACKER</div>
      <div class="overlay-score hidden" id="overlay-score">0</div>
      <div class="overlay-label hidden" id="overlay-label">BLOCKS STACKED</div>
      <div class="overlay-best hidden" id="overlay-best"></div>
      <div class="overlay-action" id="overlay-action">PRESS SPACE TO START</div>
    </div>
  </div>

  <div class="perfect-flash" id="perfect-flash"></div>

  <script>
  (function() {
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;

    // Brand colors
    const VOID = '#0a0a0f';
    const MAGENTA = '#ff2d7b';
    const CYAN = '#00f0ff';
    const GREEN = '#39ff14';
    const PURPLE = '#9d4edd';
    const CRT_WHITE = '#e0e0e8';
    const DIM = '#7a7a90';
    const PANEL = '#121218';

    const BLOCK_COLORS = [MAGENTA, CYAN, PURPLE, '#ff6ac1', '#ffb000'];
    const BLOCK_HEIGHT = 22;
    const BASE_WIDTH = 160;
    const BASE_Y = H - 60;
    const PERFECT_THRESHOLD = 3;

    let state = 'idle'; // idle, playing, over
    let blocks = [];
    let moving = null;
    let speed = 2;
    let combo = 0;
    let best = parseInt(localStorage.getItem('zero-tower-best') || '0');
    let cameraY = 0;
    let targetCameraY = 0;
    let particles = [];
    let perfectTimer = 0;

    document.getElementById('hud-best').textContent = best;

    function getColor(i) {
      return BLOCK_COLORS[i % BLOCK_COLORS.length];
    }

    function glowColor(hex, alpha) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function reset() {
      blocks = [];
      combo = 0;
      cameraY = 0;
      targetCameraY = 0;
      speed = 2;
      particles = [];
      perfectTimer = 0;

      // Base block
      blocks.push({
        x: (W - BASE_WIDTH) / 2,
        w: BASE_WIDTH,
        y: BASE_Y,
        color: DIM
      });

      spawnMoving();
      state = 'playing';
      updateHUD();
    }

    function spawnMoving() {
      const top = blocks[blocks.length - 1];
      const y = top.y - BLOCK_HEIGHT;
      const dir = blocks.length % 2 === 0 ? 1 : -1;
      const color = getColor(blocks.length);

      moving = {
        x: dir > 0 ? -top.w : W,
        w: top.w,
        y: y,
        dx: dir * speed,
        color: color
      };
    }

    function drop() {
      if (!moving) return;

      const top = blocks[blocks.length - 1];
      const mx = moving.x;
      const mw = moving.w;
      const tx = top.x;
      const tw = top.w;

      // Calculate overlap
      const overlapLeft = Math.max(mx, tx);
      const overlapRight = Math.min(mx + mw, tx + tw);
      const overlapW = overlapRight - overlapLeft;

      if (overlapW <= 0) {
        // Missed completely
        spawnFallParticles(mx, moving.y, mw, moving.color);
        moving = null;
        gameOver();
        return;
      }

      const overhang = mw - overlapW;
      const isPerfect = overhang <= PERFECT_THRESHOLD;

      if (isPerfect) {
        // Perfect stack - keep full width of previous block
        combo++;
        blocks.push({
          x: top.x,
          w: top.w,
          y: moving.y,
          color: moving.color
        });
        perfectTimer = 20;
        document.getElementById('perfect-flash').classList.add('show');
        setTimeout(() => document.getElementById('perfect-flash').classList.remove('show'), 150);
        // Spawn sparkles
        spawnPerfectParticles(top.x, moving.y, top.w, moving.color);
      } else {
        combo = 0;
        // Trimmed block
        blocks.push({
          x: overlapLeft,
          w: overlapW,
          y: moving.y,
          color: moving.color
        });
        // Falling piece
        if (mx < tx) {
          spawnFallParticles(mx, moving.y, tx - mx, moving.color);
        } else {
          spawnFallParticles(tx + tw, moving.y, (mx + mw) - (tx + tw), moving.color);
        }
      }

      // Update camera
      const blockCount = blocks.length - 1;
      if (blockCount > 15) {
        targetCameraY = (blockCount - 15) * BLOCK_HEIGHT;
      }

      // Speed up gradually
      speed = 2 + Math.floor(blockCount / 5) * 0.5;
      if (speed > 10) speed = 10;

      moving = null;
      updateHUD();
      spawnMoving();
    }

    function gameOver() {
      state = 'over';
      const score = blocks.length - 1;
      const isNew = score > best;
      if (isNew) {
        best = score;
        localStorage.setItem('zero-tower-best', best);
      }

      document.getElementById('overlay-title').textContent = 'TOWER FELL';
      document.getElementById('overlay-score').textContent = score;
      document.getElementById('overlay-score').classList.remove('hidden');
      document.getElementById('overlay-label').textContent = 'BLOCKS STACKED';
      document.getElementById('overlay-label').classList.remove('hidden');
      document.getElementById('overlay-best').textContent = isNew ? '★ NEW RECORD ★' : 'BEST: ' + best;
      document.getElementById('overlay-best').classList.remove('hidden');
      document.getElementById('overlay-best').className = 'overlay-best' + (isNew ? ' new-record' : '');
      document.getElementById('overlay-action').textContent = 'PRESS SPACE TO RETRY';
      document.getElementById('overlay').classList.remove('hidden');
      document.getElementById('hud-best').textContent = best;
    }

    function updateHUD() {
      document.getElementById('hud-score').textContent = blocks.length - 1;
      document.getElementById('hud-combo').textContent = combo;
      document.getElementById('hud-best').textContent = best;
    }

    function spawnFallParticles(x, y, w, color) {
      if (w <= 0) return;
      for (let i = 0; i < Math.min(w / 3, 15); i++) {
        particles.push({
          x: x + Math.random() * w,
          y: y + Math.random() * BLOCK_HEIGHT,
          vx: (Math.random() - 0.5) * 2,
          vy: Math.random() * 3 + 1,
          life: 40 + Math.random() * 20,
          maxLife: 60,
          size: 2 + Math.random() * 3,
          color: color,
          type: 'fall'
        });
      }
    }

    function spawnPerfectParticles(x, y, w, color) {
      for (let i = 0; i < 20; i++) {
        const angle = (Math.PI * 2 * i) / 20;
        particles.push({
          x: x + w / 2,
          y: y + BLOCK_HEIGHT / 2,
          vx: Math.cos(angle) * (1 + Math.random() * 2),
          vy: Math.sin(angle) * (1 + Math.random() * 2) - 1,
          life: 30 + Math.random() * 20,
          maxLife: 50,
          size: 2 + Math.random() * 2,
          color: GREEN,
          type: 'sparkle'
        });
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        if (p.type === 'fall') p.vy += 0.15;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function drawParticles() {
      for (const p of particles) {
        const alpha = p.life / p.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 6;
        ctx.fillRect(p.x - p.size/2, p.y - p.size/2 + cameraY, p.size, p.size);
      }
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
    }

    function draw() {
      // Smooth camera
      cameraY += (targetCameraY - cameraY) * 0.08;

      ctx.fillStyle = VOID;
      ctx.fillRect(0, 0, W, H);

      // Draw grid lines (subtle)
      ctx.strokeStyle = 'rgba(30, 30, 40, 0.5)';
      ctx.lineWidth = 1;
      for (let gy = BASE_Y; gy > -2000; gy -= BLOCK_HEIGHT) {
        const sy = gy + cameraY;
        if (sy < -20 || sy > H + 20) continue;
        ctx.beginPath();
        ctx.moveTo(0, sy);
        ctx.lineTo(W, sy);
        ctx.stroke();
      }

      // Draw blocks
      for (let i = 0; i < blocks.length; i++) {
        const b = blocks[i];
        const sy = b.y + cameraY;
        if (sy > H + 30 || sy < -30) continue;

        // Block fill
        ctx.fillStyle = b.color;
        ctx.shadowColor = b.color;
        ctx.shadowBlur = i === 0 ? 0 : 8;
        ctx.fillRect(b.x, sy, b.w, BLOCK_HEIGHT);
        ctx.shadowBlur = 0;

        // Block border (top highlight)
        if (i > 0) {
          ctx.fillStyle = glowColor(b.color, 0.4);
          ctx.fillRect(b.x, sy, b.w, 2);
          // Side highlights
          ctx.fillStyle = glowColor(b.color, 0.2);
          ctx.fillRect(b.x, sy, 1, BLOCK_HEIGHT);
          ctx.fillRect(b.x + b.w - 1, sy, 1, BLOCK_HEIGHT);
        }
      }

      // Draw moving block
      if (moving) {
        const sy = moving.y + cameraY;
        ctx.fillStyle = moving.color;
        ctx.shadowColor = moving.color;
        ctx.shadowBlur = 12;
        ctx.fillRect(moving.x, sy, moving.w, BLOCK_HEIGHT);
        ctx.shadowBlur = 0;

        // Highlight
        ctx.fillStyle = glowColor(moving.color, 0.5);
        ctx.fillRect(moving.x, sy, moving.w, 2);
      }

      // Draw particles
      drawParticles();

      // Perfect text
      if (perfectTimer > 0) {
        perfectTimer--;
        const alpha = perfectTimer / 20;
        ctx.globalAlpha = alpha;
        ctx.font = '800 16px "JetBrains Mono"';
        ctx.fillStyle = GREEN;
        ctx.shadowColor = GREEN;
        ctx.shadowBlur = 15;
        ctx.textAlign = 'center';
        const pBlock = blocks[blocks.length - 1];
        const py = pBlock.y + cameraY - 10 - (20 - perfectTimer) * 0.8;
        let txt = 'PERFECT!';
        if (combo >= 10) txt = '★ UNSTOPPABLE ★';
        else if (combo >= 7) txt = '★ INCREDIBLE ★';
        else if (combo >= 5) txt = '★ AMAZING ★';
        else if (combo >= 3) txt = 'COMBO x' + combo;
        ctx.fillText(txt, pBlock.x + pBlock.w / 2, py);
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
      }

      // Height marker on the side
      if (state === 'playing') {
        const score = blocks.length - 1;
        if (score > 0) {
          ctx.font = '700 11px "JetBrains Mono"';
          ctx.fillStyle = DIM;
          ctx.textAlign = 'left';
          const topBlock = blocks[blocks.length - 1];
          const my = topBlock.y + cameraY + BLOCK_HEIGHT / 2 + 4;
          ctx.fillText(score + '', 8, my);
        }
      }
    }

    function update() {
      if (state !== 'playing' || !moving) return;

      moving.x += moving.dx;

      // Bounce off walls
      if (moving.x + moving.w > W) {
        moving.x = W - moving.w;
        moving.dx = -Math.abs(moving.dx);
      }
      if (moving.x < 0) {
        moving.x = 0;
        moving.dx = Math.abs(moving.dx);
      }

      // Update speed direction
      moving.dx = moving.dx > 0 ? speed : -speed;
    }

    function loop() {
      update();
      updateParticles();
      draw();
      requestAnimationFrame(loop);
    }

    function handleAction() {
      if (state === 'idle') {
        document.getElementById('overlay').classList.add('hidden');
        reset();
      } else if (state === 'playing') {
        drop();
      } else if (state === 'over') {
        document.getElementById('overlay').classList.add('hidden');
        reset();
      }
    }

    document.addEventListener('keydown', function(e) {
      if (e.code === 'Space' || e.code === 'Enter') {
        e.preventDefault();
        handleAction();
      }
    });

    canvas.addEventListener('click', function(e) {
      e.preventDefault();
      handleAction();
    });

    canvas.addEventListener('touchstart', function(e) {
      e.preventDefault();
      handleAction();
    }, { passive: false });

    loop();
  })();
  </script>
  <script src="../theme-toggle.js"></script>
</body>
</html>
