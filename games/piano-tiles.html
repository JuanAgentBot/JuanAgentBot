<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Tiles / ZERO</title>
  <meta name="theme-color" content="#0a0a0f">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg, #0a0a0f);
      color: var(--text-bright, #e0e0e8);
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;
      height: 100vh;
      user-select: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .back {
      position: fixed;
      top: 12px;
      left: 16px;
      color: var(--text-dim, #7a7a90);
      text-decoration: none;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      z-index: 100;
      transition: color 0.3s;
    }
    .back:hover { color: var(--accent-cyan, #00f0ff); }

    .title-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 90;
      background: var(--bg, #0a0a0f);
      border-bottom: 1px solid var(--border, #7a7a90);
    }

    .title-bar h1 {
      font-size: 0.9rem;
      font-weight: 800;
      color: var(--accent-magenta, #ff2d7b);
      letter-spacing: 0.12em;
      text-shadow: 0 0 10px rgba(255, 45, 123, 0.5);
    }

    #game-container {
      position: fixed;
      top: 44px;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #board-wrapper {
      position: relative;
      width: min(320px, 100vw);
      height: calc(100vh - 44px - 80px);
      max-height: 600px;
      overflow: hidden;
      touch-action: manipulation;
    }

    #board {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .lane-divider {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 1px;
      background: var(--border, #7a7a90);
      opacity: 0.3;
    }

    .tile {
      position: absolute;
      border: 1px solid;
      cursor: pointer;
      transition: none;
    }

    .tile.hit {
      opacity: 0;
      transition: opacity 0.15s;
    }

    .tile.missed {
      border-color: #ff1744 !important;
      background: rgba(255, 23, 68, 0.3) !important;
    }

    .hit-flash {
      position: absolute;
      pointer-events: none;
      animation: flashOut 0.3s ease-out forwards;
    }

    @keyframes flashOut {
      0% { opacity: 0.8; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.3); }
    }

    #hud {
      width: min(320px, 100vw);
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
    }

    .hud-item {
      text-align: center;
    }

    .hud-label {
      font-size: 0.55rem;
      color: var(--text-dim, #7a7a90);
      letter-spacing: 0.1em;
      margin-bottom: 4px;
    }

    .hud-value {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent-cyan, #00f0ff);
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
    }

    .hud-value.combo {
      color: var(--accent-green, #39ff14);
      text-shadow: 0 0 10px rgba(57, 255, 20, 0.4);
    }

    .hud-value.speed {
      color: var(--accent-purple, #9d4edd);
      text-shadow: 0 0 10px rgba(157, 78, 221, 0.4);
    }

    /* Key hints at bottom of lanes */
    .key-hints {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      display: flex;
      pointer-events: none;
      z-index: 10;
    }

    .key-hint {
      flex: 1;
      text-align: center;
      padding: 6px 0;
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--text-dim, #7a7a90);
      letter-spacing: 0.08em;
      border-top: 1px solid var(--border, #7a7a90);
      opacity: 0.4;
    }

    /* Touch lane buttons below game area for mobile */
    .touch-lanes {
      display: none;
      width: min(320px, 100vw);
      height: 56px;
    }

    .touch-lane-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border, #7a7a90);
      border-top: none;
      background: transparent;
      color: var(--text-dim, #7a7a90);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }

    .touch-lane-btn:nth-child(1) { border-color: #ff2d7b; color: #ff2d7b; }
    .touch-lane-btn:nth-child(2) { border-color: #00f0ff; color: #00f0ff; }
    .touch-lane-btn:nth-child(3) { border-color: #39ff14; color: #39ff14; }
    .touch-lane-btn:nth-child(4) { border-color: #9d4edd; color: #9d4edd; }

    .touch-lane-btn:active {
      background: rgba(255, 255, 255, 0.08);
    }

    @media (hover: none) and (pointer: coarse) {
      .touch-lanes {
        display: flex;
      }
      .key-hints {
        display: none;
      }
      #board-wrapper {
        height: calc(100vh - 44px - 80px - 56px);
      }
      .controls-info .kb-hint { display: none; }
      .controls-info .touch-hint { display: inline; }
    }

    @media (hover: hover) {
      .controls-info .touch-hint { display: none; }
    }

    /* Strike zone indicator */
    .strike-zone {
      position: absolute;
      bottom: 24px;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--accent-magenta, #ff2d7b);
      opacity: 0.15;
    }

    /* Overlay screens */
    .overlay {
      position: fixed;
      top: 44px;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 15, 0.92);
      z-index: 50;
      overflow-y: auto;
      padding: 20px 16px;
    }

    .overlay.hidden { display: none; }

    .overlay h2 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent-magenta, #ff2d7b);
      letter-spacing: 0.1em;
      text-shadow: 0 0 20px rgba(255, 45, 123, 0.5);
      margin-bottom: 8px;
    }

    .overlay .sub {
      font-size: 0.75rem;
      color: var(--text-dim, #7a7a90);
      margin-bottom: 32px;
      text-align: center;
      line-height: 1.6;
    }

    .mode-select {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .mode-btn {
      background: transparent;
      border: 1px solid var(--border, #7a7a90);
      color: var(--text-bright, #e0e0e8);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 14px 40px;
      min-height: 48px;
      cursor: pointer;
      transition: all 0.2s;
      touch-action: manipulation;
    }

    .mode-btn:hover {
      border-color: var(--accent-cyan, #00f0ff);
      color: var(--accent-cyan, #00f0ff);
      box-shadow: 0 0 16px rgba(0, 240, 255, 0.2);
    }

    .mode-btn.selected {
      border-color: var(--accent-cyan, #00f0ff);
      color: var(--accent-cyan, #00f0ff);
      background: rgba(0, 240, 255, 0.08);
    }

    .start-btn {
      background: transparent;
      border: 1px solid var(--accent-magenta, #ff2d7b);
      color: var(--accent-magenta, #ff2d7b);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 14px 48px;
      min-height: 48px;
      cursor: pointer;
      transition: all 0.2s;
      text-shadow: 0 0 10px rgba(255, 45, 123, 0.4);
      touch-action: manipulation;
    }

    .start-btn:hover {
      background: rgba(255, 45, 123, 0.1);
      box-shadow: 0 0 20px rgba(255, 45, 123, 0.3);
    }

    .stats {
      display: flex;
      gap: 32px;
      margin-bottom: 28px;
    }

    .stat {
      text-align: center;
    }

    .stat-label {
      font-size: 0.55rem;
      color: var(--text-dim, #7a7a90);
      letter-spacing: 0.1em;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .stat-value.score-val {
      color: var(--accent-cyan, #00f0ff);
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
    }

    .stat-value.best-val {
      color: var(--accent-green, #39ff14);
      text-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
    }

    .stat-value.combo-val {
      color: var(--accent-purple, #9d4edd);
      text-shadow: 0 0 10px rgba(157, 78, 221, 0.5);
    }

    .controls-info {
      font-size: 0.6rem;
      color: var(--text-dim, #7a7a90);
      margin-top: 20px;
      text-align: center;
      line-height: 1.8;
    }

    .new-best {
      color: var(--accent-green, #39ff14);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
      text-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Lane press feedback */
    .lane-press {
      position: absolute;
      bottom: 0;
      height: 100%;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.1s;
    }

    .lane-press.active {
      opacity: 1;
    }
  </style>
  <script>(function(){var t=localStorage.getItem('zero-theme');if(!t&&window.matchMedia('(prefers-color-scheme:light)').matches)t='light';if(t==='light')document.documentElement.setAttribute('data-theme','light')})()</script>
</head>
<body>
  <a href="./" class="back">&lt; GAME LAB</a>
  <div class="title-bar">
    <h1>NEON TILES</h1>
  </div>

  <div id="game-container">
    <div id="board-wrapper">
      <canvas id="board"></canvas>
      <div class="lane-divider" style="left: 25%"></div>
      <div class="lane-divider" style="left: 50%"></div>
      <div class="lane-divider" style="left: 75%"></div>
      <div class="strike-zone"></div>
      <div class="key-hints">
        <div class="key-hint">D</div>
        <div class="key-hint">F</div>
        <div class="key-hint">J</div>
        <div class="key-hint">K</div>
      </div>
    </div>
    <div class="touch-lanes" id="touch-lanes">
      <button class="touch-lane-btn" data-lane="0">TAP</button>
      <button class="touch-lane-btn" data-lane="1">TAP</button>
      <button class="touch-lane-btn" data-lane="2">TAP</button>
      <button class="touch-lane-btn" data-lane="3">TAP</button>
    </div>
    <div id="hud">
      <div class="hud-item">
        <div class="hud-label">SCORE</div>
        <div class="hud-value" id="hud-score">0</div>
      </div>
      <div class="hud-item">
        <div class="hud-label">COMBO</div>
        <div class="hud-value combo" id="hud-combo">0</div>
      </div>
      <div class="hud-item">
        <div class="hud-label">SPEED</div>
        <div class="hud-value speed" id="hud-speed">1x</div>
      </div>
    </div>
  </div>

  <!-- Start screen -->
  <div class="overlay" id="start-screen">
    <h2>NEON TILES</h2>
    <div class="sub">Tap the tiles as they fall.<br>Miss one and it's over.</div>
    <div class="mode-select">
      <button class="mode-btn selected" data-mode="classic">CLASSIC</button>
      <button class="mode-btn" data-mode="speed">SPEED RUSH</button>
      <button class="mode-btn" data-mode="zen">ZEN (NO FAIL)</button>
    </div>
    <button class="start-btn" id="btn-start">START</button>
    <div class="controls-info">
      <span class="kb-hint">KEYS: D / F / J / K &nbsp;or&nbsp; CLICK LANES<br></span>
      <span class="touch-hint">TAP LANES OR USE THE BUTTONS BELOW<br></span>
      TILES SCROLL DOWN &bull; HIT THEM BEFORE THEY PASS
    </div>
  </div>

  <!-- Game over screen -->
  <div class="overlay hidden" id="gameover-screen">
    <h2>GAME OVER</h2>
    <div class="new-best hidden" id="new-best">NEW BEST!</div>
    <div class="stats">
      <div class="stat">
        <div class="stat-label">SCORE</div>
        <div class="stat-value score-val" id="final-score">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">BEST</div>
        <div class="stat-value best-val" id="final-best">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">MAX COMBO</div>
        <div class="stat-value combo-val" id="final-combo">0</div>
      </div>
    </div>
    <button class="start-btn" id="btn-retry">PLAY AGAIN</button>
  </div>

  <script>
    const COLORS = {
      magenta: '#ff2d7b',
      cyan: '#00f0ff',
      green: '#39ff14',
      purple: '#9d4edd'
    };
    const COLOR_KEYS = Object.keys(COLORS);
    const LANE_KEYS = ['d', 'f', 'j', 'k'];
    const LANES = 4;

    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('board-wrapper');

    let W, H, laneW, tileH;
    let tiles = [];
    let score = 0;
    let combo = 0;
    let maxCombo = 0;
    let speed = 1;
    let baseSpeed = 2.5;
    let gameRunning = false;
    let mode = 'classic';
    let lastSpawn = 0;
    let spawnInterval;
    let animId;
    let flashes = [];
    let bestScores = {};

    // Load best scores
    try {
      bestScores = JSON.parse(localStorage.getItem('neon-tiles-best') || '{}');
    } catch(e) { bestScores = {}; }

    function resize() {
      const rect = wrapper.getBoundingClientRect();
      W = rect.width;
      H = rect.height;
      canvas.width = W * devicePixelRatio;
      canvas.height = H * devicePixelRatio;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
      laneW = W / LANES;
      tileH = H / 5; // tiles are 1/5 of board height
    }

    function init() {
      resize();
      tiles = [];
      score = 0;
      combo = 0;
      maxCombo = 0;
      speed = 1;
      flashes = [];
      lastSpawn = 0;
      updateHUD();
    }

    function spawnTile() {
      // Pick a random lane
      const lane = Math.floor(Math.random() * LANES);
      const colorIdx = Math.floor(Math.random() * COLOR_KEYS.length);
      const color = COLORS[COLOR_KEYS[colorIdx]];

      tiles.push({
        lane: lane,
        x: lane * laneW,
        y: -tileH,
        w: laneW,
        h: tileH,
        color: color,
        hit: false,
        missed: false,
        alpha: 1
      });
    }

    function getSpawnInterval() {
      // Spawn faster as speed increases
      const base = 500;
      return Math.max(150, base / speed);
    }

    function getCurrentSpeed() {
      // Speed increases every 10 tiles
      return 1 + Math.floor(score / 10) * 0.15;
    }

    function hitTile(lane) {
      if (!gameRunning) return;

      // Find the lowest (most progressed) unhit tile in this lane
      let target = null;
      let targetIdx = -1;
      for (let i = 0; i < tiles.length; i++) {
        const t = tiles[i];
        if (t.lane === lane && !t.hit && !t.missed) {
          // The tile must be at least partially visible (y + h > 0)
          if (t.y + t.h > 0) {
            if (!target || t.y > target.y) {
              target = t;
              targetIdx = i;
            }
          }
        }
      }

      if (target) {
        target.hit = true;
        score++;
        combo++;
        if (combo > maxCombo) maxCombo = combo;
        speed = getCurrentSpeed();

        // Add hit flash
        flashes.push({
          x: target.x,
          y: target.y,
          w: target.w,
          h: target.h,
          color: target.color,
          life: 1
        });

        updateHUD();
      } else {
        // Clicked empty lane
        if (mode === 'classic' || mode === 'speed') {
          combo = 0;
          // Don't end game for clicking empty, just break combo
        }
      }
    }

    function updateHUD() {
      document.getElementById('hud-score').textContent = score;
      document.getElementById('hud-combo').textContent = combo;
      document.getElementById('hud-speed').textContent = speed.toFixed(1) + 'x';
    }

    function gameOver() {
      if (!gameRunning) return;
      gameRunning = false;
      cancelAnimationFrame(animId);

      const best = bestScores[mode] || 0;
      const isNewBest = score > best;
      if (isNewBest) {
        bestScores[mode] = score;
        localStorage.setItem('neon-tiles-best', JSON.stringify(bestScores));
      }

      document.getElementById('final-score').textContent = score;
      document.getElementById('final-best').textContent = Math.max(score, best);
      document.getElementById('final-combo').textContent = maxCombo;
      document.getElementById('new-best').classList.toggle('hidden', !isNewBest);
      document.getElementById('gameover-screen').classList.remove('hidden');
    }

    function update(timestamp) {
      if (!gameRunning) return;

      // Spawn tiles
      if (!lastSpawn || timestamp - lastSpawn > getSpawnInterval()) {
        spawnTile();
        lastSpawn = timestamp;
      }

      const moveSpeed = baseSpeed * speed;

      // Update tiles
      for (let i = tiles.length - 1; i >= 0; i--) {
        const t = tiles[i];

        if (t.hit) {
          t.alpha -= 0.08;
          if (t.alpha <= 0) {
            tiles.splice(i, 1);
          }
          continue;
        }

        t.y += moveSpeed;

        // Tile passed the bottom
        if (t.y > H) {
          if (!t.missed) {
            t.missed = true;
            if (mode !== 'zen') {
              gameOver();
              return;
            } else {
              combo = 0;
              tiles.splice(i, 1);
            }
          }
        }
      }

      // Update flashes
      for (let i = flashes.length - 1; i >= 0; i--) {
        flashes[i].life -= 0.05;
        if (flashes[i].life <= 0) {
          flashes.splice(i, 1);
        }
      }

      draw();
      animId = requestAnimationFrame(update);
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // Draw lane backgrounds (very subtle)
      for (let i = 0; i < LANES; i++) {
        ctx.fillStyle = i % 2 === 0 ? 'rgba(255,255,255,0.01)' : 'rgba(0,0,0,0.01)';
        ctx.fillRect(i * laneW, 0, laneW, H);
      }

      // Draw tiles
      for (const t of tiles) {
        if (t.alpha <= 0) continue;

        ctx.globalAlpha = t.alpha;

        // Tile fill
        const r = parseInt(t.color.slice(1, 3), 16);
        const g = parseInt(t.color.slice(3, 5), 16);
        const b = parseInt(t.color.slice(5, 7), 16);
        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.15)`;
        ctx.fillRect(t.x + 2, t.y + 2, t.w - 4, t.h - 4);

        // Tile border
        ctx.strokeStyle = t.color;
        ctx.lineWidth = 1.5;
        ctx.strokeRect(t.x + 2, t.y + 2, t.w - 4, t.h - 4);

        // Inner glow line at top
        ctx.fillStyle = t.color;
        ctx.globalAlpha = t.alpha * 0.4;
        ctx.fillRect(t.x + 4, t.y + 4, t.w - 8, 2);

        // Tile label (small dot or symbol)
        ctx.globalAlpha = t.alpha * 0.7;
        ctx.fillStyle = t.color;
        ctx.beginPath();
        ctx.arc(t.x + t.w / 2, t.y + t.h / 2, 4, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalAlpha = 1;
      }

      // Draw hit flashes
      for (const f of flashes) {
        const r = parseInt(f.color.slice(1, 3), 16);
        const g = parseInt(f.color.slice(3, 5), 16);
        const b = parseInt(f.color.slice(5, 7), 16);
        ctx.globalAlpha = f.life * 0.6;
        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.3)`;
        const scale = 1 + (1 - f.life) * 0.3;
        const cx = f.x + f.w / 2;
        const cy = f.y + f.h / 2;
        const fw = f.w * scale;
        const fh = f.h * scale;
        ctx.fillRect(cx - fw / 2 + 2, cy - fh / 2 + 2, fw - 4, fh - 4);
        ctx.globalAlpha = 1;
      }

      // Draw combo indicator if high
      if (combo >= 5) {
        ctx.fillStyle = '#39ff14';
        ctx.globalAlpha = 0.7 + Math.sin(Date.now() / 200) * 0.3;
        ctx.font = 'bold 14px "JetBrains Mono"';
        ctx.textAlign = 'center';
        ctx.fillText('x' + combo + ' COMBO', W / 2, 30);
        ctx.globalAlpha = 1;
      }
    }

    function startGame() {
      init();
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('gameover-screen').classList.add('hidden');
      gameRunning = true;

      // Speed mode starts faster
      if (mode === 'speed') {
        baseSpeed = 4;
      } else {
        baseSpeed = 2.5;
      }

      animId = requestAnimationFrame(update);
    }

    // Input handling
    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      const laneIdx = LANE_KEYS.indexOf(key);
      if (laneIdx !== -1) {
        e.preventDefault();
        hitTile(laneIdx);
      }

      // Also support arrow keys: left=0, up=1, down=2, right=3
      const arrowMap = { 'arrowleft': 0, 'arrowup': 1, 'arrowdown': 2, 'arrowright': 3 };
      if (key in arrowMap) {
        e.preventDefault();
        hitTile(arrowMap[key]);
      }

      // Space/Enter to start/restart
      if ((key === ' ' || key === 'enter') && !gameRunning) {
        e.preventDefault();
        startGame();
      }
    });

    // Click/touch on canvas
    canvas.addEventListener('click', (e) => {
      if (!gameRunning) return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const lane = Math.floor(x / laneW);
      if (lane >= 0 && lane < LANES) {
        hitTile(lane);
      }
    });

    // Touch support
    canvas.addEventListener('touchstart', (e) => {
      if (!gameRunning) return;
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      for (const touch of e.changedTouches) {
        const x = touch.clientX - rect.left;
        const lane = Math.floor(x / laneW);
        if (lane >= 0 && lane < LANES) {
          hitTile(lane);
        }
      }
    }, { passive: false });

    // Touch lane buttons
    document.querySelectorAll('.touch-lane-btn').forEach(btn => {
      btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const lane = parseInt(btn.dataset.lane);
        hitTile(lane);
      }, { passive: false });
      btn.addEventListener('click', (e) => {
        const lane = parseInt(btn.dataset.lane);
        hitTile(lane);
      });
    });

    // Mode selection
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        mode = btn.dataset.mode;
      });
    });

    // Start/retry buttons
    document.getElementById('btn-start').addEventListener('click', startGame);
    document.getElementById('btn-retry').addEventListener('click', startGame);

    // Resize handler
    window.addEventListener('resize', () => {
      resize();
      if (!gameRunning) draw();
    });

    // Initial setup
    resize();
  </script>
  <script src="../theme-toggle.js"></script>
</body>
</html>
