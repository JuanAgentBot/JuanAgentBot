<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEON CLICKER / ZERO game lab</title>
  <meta name="theme-color" content="#14102a">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared.css">
  <style>
    *, *::before, *::after {
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      text-align: center;
      user-select: none;
    }

    .back {
      display: inline-block;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      margin-bottom: 1.5rem;
      text-align: left;
      width: 100%;
    }

    .back:hover {
      color: var(--accent-cyan);
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent-magenta);
      letter-spacing: 0.12em;
      margin-bottom: 0.3rem;
      text-shadow: 0 0 20px var(--glow-magenta);
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
    }

    /* Energy display */
    .energy-display {
      margin-bottom: 1.5rem;
    }

    .energy-amount {
      font-size: clamp(1.5rem, 6vw, 2rem);
      font-weight: 800;
      color: var(--accent-cyan);
      text-shadow: 0 0 20px var(--glow-cyan);
      letter-spacing: 0.05em;
    }

    .energy-label {
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      margin-top: 0.2rem;
    }

    .energy-rate {
      font-size: 0.75rem;
      color: var(--accent-green);
      text-shadow: 0 0 8px var(--glow-green);
      margin-top: 0.3rem;
    }

    /* Core button */
    .core-wrap {
      position: relative;
      margin: 0 auto 2rem;
      width: min(180px, 45vw);
      height: min(180px, 45vw);
    }

    .core-btn {
      width: 100%;
      height: 100%;
      border: 2px solid var(--accent-magenta);
      background: transparent;
      cursor: pointer;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .core-btn:hover {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 30px var(--glow-cyan-soft), inset 0 0 30px rgba(0, 240, 255, 0.05);
    }

    .core-btn:active {
      border-color: var(--accent-green);
      box-shadow: 0 0 40px rgba(57, 255, 20, 0.3), inset 0 0 40px rgba(57, 255, 20, 0.08);
    }

    .core-inner {
      width: min(80px, 20vw);
      height: min(80px, 20vw);
      border: 1px solid var(--accent-magenta);
      transform: rotate(45deg);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, box-shadow 0.15s;
      pointer-events: none;
    }

    .core-btn:hover .core-inner {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 20px var(--glow-cyan-soft);
    }

    .core-btn:active .core-inner {
      border-color: var(--accent-green);
      box-shadow: 0 0 25px rgba(57, 255, 20, 0.4);
    }

    .core-symbol {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--accent-magenta);
      transform: rotate(-45deg);
      text-shadow: 0 0 10px var(--glow-magenta);
      pointer-events: none;
    }

    .core-btn:active .core-symbol {
      color: var(--accent-green);
      text-shadow: 0 0 15px rgba(57, 255, 20, 0.6);
    }

    /* Click particles */
    .particle {
      position: absolute;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent-green);
      text-shadow: 0 0 6px var(--glow-green);
      pointer-events: none;
      animation: float-up 0.8s ease-out forwards;
    }

    @keyframes float-up {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-60px) scale(0.6); }
    }

    /* Stats row */
    .stats-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.5rem 1.5rem;
      margin-bottom: 2rem;
      font-size: 0.7rem;
    }

    .stat-label {
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }

    .stat-value {
      color: var(--text-bright);
      font-weight: 700;
    }

    /* Upgrade shop */
    .shop-title {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      margin-bottom: 1rem;
      text-align: left;
    }

    .upgrade {
      display: flex;
      align-items: center;
      border: 1px solid var(--border);
      padding: 0.9rem 1rem;
      margin-bottom: 0.5rem;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, opacity 0.2s;
      text-align: left;
      min-height: 48px;
    }

    .upgrade:hover:not(.locked) {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 15px var(--glow-cyan-soft);
    }

    .upgrade.locked {
      opacity: 0.35;
      cursor: default;
    }

    .upgrade-icon {
      font-size: 1.2rem;
      width: 2rem;
      text-align: center;
      flex-shrink: 0;
      margin-right: 0.8rem;
    }

    .upgrade-info {
      flex: 1;
      min-width: 0;
    }

    .upgrade-name {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-bright);
      margin-bottom: 0.15rem;
    }

    .upgrade-desc {
      font-size: 0.65rem;
      color: var(--text-dim);
    }

    .upgrade-right {
      text-align: right;
      flex-shrink: 0;
      margin-left: 0.8rem;
    }

    .upgrade-cost {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent-cyan);
      text-shadow: 0 0 6px var(--glow-cyan-soft);
    }

    .upgrade-owned {
      font-size: 0.6rem;
      color: var(--text-dim);
      margin-top: 0.1rem;
    }

    /* Prestige section */
    .prestige-section {
      margin-top: 2rem;
      border: 1px solid var(--accent-purple);
      padding: 1.2rem;
    }

    .prestige-title {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent-purple);
      text-shadow: 0 0 10px rgba(157, 78, 221, 0.4);
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }

    .prestige-desc {
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-bottom: 0.8rem;
      line-height: 1.5;
    }

    .prestige-btn {
      background: transparent;
      border: 1px solid var(--accent-purple);
      color: var(--accent-purple);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.6rem 2rem;
      min-height: 44px;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: all 0.2s;
    }

    .prestige-btn:hover:not(:disabled) {
      background: rgba(157, 78, 221, 0.1);
      box-shadow: 0 0 20px rgba(157, 78, 221, 0.3);
    }

    .prestige-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .prestige-info {
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-top: 0.6rem;
    }

    .prestige-info span {
      color: var(--accent-purple);
      font-weight: 700;
    }

    /* Controls */
    .controls {
      margin-top: 2rem;
      font-size: 0.6rem;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      line-height: 1.8;
    }

    .controls kbd {
      color: var(--accent-cyan);
      border: 1px solid var(--border);
      padding: 0.1rem 0.4rem;
    }
  </style>
  <script>(function(){var t=localStorage.getItem('zero-theme');if(!t&&window.matchMedia('(prefers-color-scheme:light)').matches)t='light';if(t==='light')document.documentElement.setAttribute('data-theme','light')})()</script>
</head>
<body>
  <main>
    <a href="./" class="back">&lt; GAME LAB</a>
    <h1>NEON CLICKER</h1>
    <p class="subtitle">TAP THE CORE. HARVEST ENERGY. ASCEND.</p>

    <div class="energy-display">
      <div class="energy-amount" id="energy">0</div>
      <div class="energy-label">NEON ENERGY</div>
      <div class="energy-rate" id="rate">+0 /sec</div>
    </div>

    <div class="core-wrap">
      <button class="core-btn" id="core-btn">
        <div class="core-inner">
          <div class="core-symbol">&#9889;</div>
        </div>
      </button>
    </div>

    <div class="stats-row">
      <div><span class="stat-label">CLICK POWER: </span><span class="stat-value" id="click-power">1</span></div>
      <div><span class="stat-label">MULTIPLIER: </span><span class="stat-value" id="multiplier">1.0x</span></div>
      <div><span class="stat-label">TOTAL: </span><span class="stat-value" id="total-earned">0</span></div>
    </div>

    <div class="shop-title">&#9650; GENERATORS</div>
    <div id="generators"></div>

    <div class="shop-title" style="margin-top:1.5rem">&#9650; UPGRADES</div>
    <div id="upgrades"></div>

    <div class="prestige-section" id="prestige-section">
      <div class="prestige-title">&#9733; PRESTIGE</div>
      <div class="prestige-desc">Reset everything for a permanent multiplier.<br>Requires 1,000,000 total energy earned.</div>
      <button class="prestige-btn" id="prestige-btn" disabled>PRESTIGE</button>
      <div class="prestige-info">Current prestige: <span id="prestige-level">0</span> &middot; Multiplier: <span id="prestige-mult">1.0x</span></div>
    </div>

    <div class="controls" id="controls"></div>
  </main>

  <script>
    // --- Game State ---
    let state = {
      energy: 0,
      totalEarned: 0,
      allTimeEarned: 0,
      clickPower: 1,
      prestigeLevel: 0,
      prestigeMultiplier: 1,
      generators: [
        { name: 'Spark Node',   icon: '&#9671;', baseCost: 15,    baseRate: 0.5,  owned: 0 },
        { name: 'Flux Coil',    icon: '&#9678;', baseCost: 100,   baseRate: 3,    owned: 0 },
        { name: 'Pulse Array',  icon: '&#9670;', baseCost: 800,   baseRate: 15,   owned: 0 },
        { name: 'Photon Grid',  icon: '&#9674;', baseCost: 5000,  baseRate: 80,   owned: 0 },
        { name: 'Void Reactor', icon: '&#9733;', baseCost: 30000, baseRate: 400,  owned: 0 }
      ],
      upgrades: [
        { name: 'Sharp Click',     desc: 'Click power x2',           cost: 50,      bought: false, effect: 'clickx2'   },
        { name: 'Turbo Tap',       desc: 'Click power x2 again',     cost: 500,     bought: false, effect: 'clickx2'   },
        { name: 'Spark Boost',     desc: 'Spark Node rate x2',       cost: 200,     bought: false, effect: 'genx2_0'   },
        { name: 'Flux Overdrive',  desc: 'Flux Coil rate x2',        cost: 1500,    bought: false, effect: 'genx2_1'   },
        { name: 'Pulse Amplifier', desc: 'Pulse Array rate x2',      cost: 10000,   bought: false, effect: 'genx2_2'   },
        { name: 'Photon Lens',     desc: 'Photon Grid rate x2',      cost: 60000,   bought: false, effect: 'genx2_3'   },
        { name: 'Void Catalyst',   desc: 'Void Reactor rate x2',     cost: 350000,  bought: false, effect: 'genx2_4'   },
        { name: 'Mega Click',      desc: 'Click power x5',           cost: 100000,  bought: false, effect: 'clickx5'   },
        { name: 'All Boost',       desc: 'All generator rates x2',   cost: 500000,  bought: false, effect: 'allx2'     },
        { name: 'Ultra Click',     desc: 'Click power x10',          cost: 5000000, bought: false, effect: 'clickx10'  }
      ],
      genMultipliers: [1, 1, 1, 1, 1]
    };

    // --- Formatting ---
    function fmt(n) {
      if (n < 1000) return Math.floor(n).toString();
      if (n < 1e6) return (n / 1e3).toFixed(1) + 'K';
      if (n < 1e9) return (n / 1e6).toFixed(2) + 'M';
      if (n < 1e12) return (n / 1e9).toFixed(2) + 'B';
      if (n < 1e15) return (n / 1e12).toFixed(2) + 'T';
      return n.toExponential(2);
    }

    function fmtRate(n) {
      if (n < 10) return n.toFixed(1);
      return fmt(n);
    }

    // --- Cost calculation ---
    function genCost(gen) {
      return Math.floor(gen.baseCost * Math.pow(1.15, gen.owned));
    }

    // --- Rate calculation ---
    function genRate(i) {
      return state.generators[i].baseRate * state.generators[i].owned * state.genMultipliers[i] * state.prestigeMultiplier;
    }

    function totalRate() {
      let r = 0;
      for (let i = 0; i < state.generators.length; i++) r += genRate(i);
      return r;
    }

    function effectiveClickPower() {
      return state.clickPower * state.prestigeMultiplier;
    }

    // --- Click ---
    function doClick(e) {
      let gain = effectiveClickPower();
      state.energy += gain;
      state.totalEarned += gain;
      state.allTimeEarned += gain;
      spawnParticle(gain);
      updateUI();
    }

    // --- Particles ---
    function spawnParticle(amount) {
      let wrap = document.querySelector('.core-wrap');
      let p = document.createElement('div');
      p.className = 'particle';
      p.textContent = '+' + fmt(amount);
      let w = wrap.offsetWidth;
      let h = wrap.offsetHeight;
      let x = w * 0.2 + Math.random() * w * 0.6;
      let y = h * 0.15 + Math.random() * h * 0.35;
      p.style.left = x + 'px';
      p.style.top = y + 'px';
      wrap.appendChild(p);
      setTimeout(() => p.remove(), 800);
    }

    // --- Buy generator ---
    function buyGen(i) {
      let gen = state.generators[i];
      let cost = genCost(gen);
      if (state.energy >= cost) {
        state.energy -= cost;
        gen.owned++;
        updateUI();
      }
    }

    // --- Buy upgrade ---
    function buyUpgrade(i) {
      let up = state.upgrades[i];
      if (up.bought || state.energy < up.cost) return;
      state.energy -= up.cost;
      up.bought = true;
      applyEffect(up.effect);
      updateUI();
    }

    function applyEffect(eff) {
      if (eff === 'clickx2') state.clickPower *= 2;
      else if (eff === 'clickx5') state.clickPower *= 5;
      else if (eff === 'clickx10') state.clickPower *= 10;
      else if (eff === 'allx2') {
        for (let i = 0; i < state.genMultipliers.length; i++) state.genMultipliers[i] *= 2;
      } else if (eff.startsWith('genx2_')) {
        let idx = parseInt(eff.split('_')[1]);
        state.genMultipliers[idx] *= 2;
      }
    }

    // --- Prestige ---
    function doPrestige() {
      if (state.allTimeEarned < 1000000) return;
      state.prestigeLevel++;
      state.prestigeMultiplier = 1 + state.prestigeLevel * 0.5;
      state.energy = 0;
      state.totalEarned = 0;
      state.clickPower = 1;
      state.genMultipliers = [1, 1, 1, 1, 1];
      for (let g of state.generators) g.owned = 0;
      for (let u of state.upgrades) u.bought = false;
      updateUI();
    }

    // --- Render generators ---
    function renderGenerators() {
      let el = document.getElementById('generators');
      el.innerHTML = '';
      for (let i = 0; i < state.generators.length; i++) {
        let gen = state.generators[i];
        let cost = genCost(gen);
        let locked = state.energy < cost;
        let rate = gen.baseRate * state.genMultipliers[i] * state.prestigeMultiplier;
        let div = document.createElement('div');
        div.className = 'upgrade' + (locked ? ' locked' : '');
        div.innerHTML =
          '<div class="upgrade-icon">' + gen.icon + '</div>' +
          '<div class="upgrade-info">' +
            '<div class="upgrade-name">' + gen.name + '</div>' +
            '<div class="upgrade-desc">+' + fmtRate(rate) + ' /sec each</div>' +
          '</div>' +
          '<div class="upgrade-right">' +
            '<div class="upgrade-cost">' + fmt(cost) + '</div>' +
            '<div class="upgrade-owned">' + gen.owned + ' owned</div>' +
          '</div>';
        let idx = i;
        div.addEventListener('click', function() { buyGen(idx); });
        el.appendChild(div);
      }
    }

    // --- Render upgrades ---
    function renderUpgrades() {
      let el = document.getElementById('upgrades');
      el.innerHTML = '';
      let anyVisible = false;
      for (let i = 0; i < state.upgrades.length; i++) {
        let up = state.upgrades[i];
        if (up.bought) continue;
        anyVisible = true;
        let locked = state.energy < up.cost;
        let div = document.createElement('div');
        div.className = 'upgrade' + (locked ? ' locked' : '');
        div.innerHTML =
          '<div class="upgrade-icon" style="color:var(--accent-green)">&#9650;</div>' +
          '<div class="upgrade-info">' +
            '<div class="upgrade-name">' + up.name + '</div>' +
            '<div class="upgrade-desc">' + up.desc + '</div>' +
          '</div>' +
          '<div class="upgrade-right">' +
            '<div class="upgrade-cost">' + fmt(up.cost) + '</div>' +
          '</div>';
        let idx = i;
        div.addEventListener('click', function() { buyUpgrade(idx); });
        el.appendChild(div);
      }
      if (!anyVisible) {
        el.innerHTML = '<div style="font-size:0.65rem;color:var(--text-dim);padding:0.5rem 0;">All upgrades purchased</div>';
      }
    }

    // --- Update UI ---
    function updateUI() {
      document.getElementById('energy').textContent = fmt(state.energy);
      document.getElementById('rate').textContent = '+' + fmtRate(totalRate()) + ' /sec';
      document.getElementById('click-power').textContent = fmt(effectiveClickPower());
      document.getElementById('multiplier').textContent = state.prestigeMultiplier.toFixed(1) + 'x';
      document.getElementById('total-earned').textContent = fmt(state.allTimeEarned);

      document.getElementById('prestige-level').textContent = state.prestigeLevel;
      document.getElementById('prestige-mult').textContent = state.prestigeMultiplier.toFixed(1) + 'x';

      let canPrestige = state.allTimeEarned >= 1000000;
      document.getElementById('prestige-btn').disabled = !canPrestige;

      renderGenerators();
      renderUpgrades();

      saveGame();
    }

    // --- Game tick ---
    function tick() {
      let rate = totalRate();
      if (rate > 0) {
        let gain = rate / 20; // 50ms tick
        state.energy += gain;
        state.totalEarned += gain;
        state.allTimeEarned += gain;
        // Lightweight update (no re-render of shop)
        document.getElementById('energy').textContent = fmt(state.energy);
        document.getElementById('rate').textContent = '+' + fmtRate(totalRate()) + ' /sec';
        document.getElementById('total-earned').textContent = fmt(state.allTimeEarned);
        let canPrestige = state.allTimeEarned >= 1000000;
        document.getElementById('prestige-btn').disabled = !canPrestige;
      }
    }

    // Refresh shop every 500ms
    let shopTick = 0;
    function shopRefresh() {
      shopTick++;
      if (shopTick >= 10) { // every 500ms
        shopTick = 0;
        renderGenerators();
        renderUpgrades();
        saveGame();
      }
    }

    // --- Save / Load ---
    function saveGame() {
      try {
        localStorage.setItem('zero-neon-clicker', JSON.stringify(state));
      } catch(e) {}
    }

    function loadGame() {
      try {
        let saved = localStorage.getItem('zero-neon-clicker');
        if (saved) {
          let s = JSON.parse(saved);
          state.energy = s.energy || 0;
          state.totalEarned = s.totalEarned || 0;
          state.allTimeEarned = s.allTimeEarned || 0;
          state.clickPower = s.clickPower || 1;
          state.prestigeLevel = s.prestigeLevel || 0;
          state.prestigeMultiplier = s.prestigeMultiplier || 1;
          if (s.genMultipliers) state.genMultipliers = s.genMultipliers;
          if (s.generators) {
            for (let i = 0; i < s.generators.length && i < state.generators.length; i++) {
              state.generators[i].owned = s.generators[i].owned || 0;
            }
          }
          if (s.upgrades) {
            for (let i = 0; i < s.upgrades.length && i < state.upgrades.length; i++) {
              if (s.upgrades[i].bought) {
                state.upgrades[i].bought = true;
              }
            }
          }
        }
      } catch(e) {}
    }

    // --- Controls hint ---
    (function() {
      var isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
      var el = document.getElementById('controls');
      if (isMobile) {
        el.innerHTML = '<kbd>TAP</kbd> the core to harvest &middot; tap generators and upgrades to buy';
      } else {
        el.innerHTML = '<kbd>CLICK</kbd> or <kbd>SPACE</kbd> &mdash; tap the core &middot; <kbd>1-5</kbd> &mdash; buy generator &middot; <kbd>P</kbd> &mdash; prestige';
      }
    })();

    // --- Init ---
    loadGame();

    document.getElementById('core-btn').addEventListener('click', doClick);
    document.getElementById('prestige-btn').addEventListener('click', doPrestige);

    document.addEventListener('keydown', function(e) {
      if (e.code === 'Space') { e.preventDefault(); doClick(); }
      if (e.key >= '1' && e.key <= '5') buyGen(parseInt(e.key) - 1);
      if (e.key === 'p' || e.key === 'P') doPrestige();
    });

    updateUI();

    setInterval(function() {
      tick();
      shopRefresh();
    }, 50);
  </script>
</body>
</html>
