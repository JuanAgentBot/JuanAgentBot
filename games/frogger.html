<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FROGGER / ZERO game lab</title>
  <meta name="theme-color" content="#14102a">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared.css">
  <style>
    * { touch-action: none; -webkit-touch-callout: none; }
    html, body { overscroll-behavior: none; overflow: hidden; height: 100%; }

    main {
      max-width: 520px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      text-align: center;
    }

    .back {
      display: inline-block;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      margin-bottom: 1.5rem;
      text-align: left;
      width: 100%;
    }

    .back:hover { color: var(--accent-cyan); }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent-magenta);
      letter-spacing: 0.12em;
      margin-bottom: 0.3rem;
      text-shadow: 0 0 20px var(--glow-magenta);
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
    }

    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.8rem;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
    }

    .hud-item { color: var(--text-dim); }
    .hud-value { color: var(--text-bright); font-weight: 700; }
    .hud-value.lives { color: #ff2d7b; text-shadow: 0 0 8px rgba(255,45,123,0.4); }
    .hud-value.score { color: #00f0ff; text-shadow: 0 0 8px rgba(0,240,255,0.4); }
    .hud-value.level { color: #39ff14; text-shadow: 0 0 8px rgba(57,255,20,0.4); }

    .canvas-wrap {
      border: 1px solid var(--border);
      line-height: 0;
      position: relative;
    }

    canvas { width: 100%; height: auto; display: block; }

    .overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 15, 0.85);
      z-index: 10;
    }

    .overlay.hidden { display: none; }

    .overlay-title {
      font-size: 1.6rem;
      font-weight: 800;
      color: #ff2d7b;
      letter-spacing: 0.1em;
      text-shadow: 0 0 20px rgba(255,45,123,0.5);
      margin-bottom: 0.5rem;
    }

    .overlay-sub {
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
    }

    .overlay-score {
      font-size: 1.2rem;
      font-weight: 700;
      color: #00f0ff;
      text-shadow: 0 0 15px rgba(0,240,255,0.5);
      margin-bottom: 0.5rem;
    }

    .overlay-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #0a0a0f;
      background: #39ff14;
      border: none;
      padding: 0.6em 1.8em;
      cursor: pointer;
      text-shadow: none;
      transition: background 0.2s, box-shadow 0.2s;
      min-height: 44px;
      min-width: 44px;
    }

    .overlay-btn:hover {
      background: #50ff30;
      box-shadow: 0 0 20px rgba(57,255,20,0.5);
    }

    .goals-display {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 0.4rem;
    }

    .goal-slot {
      width: 18px;
      height: 18px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
    }

    .goal-slot.filled {
      border-color: #39ff14;
      color: #39ff14;
      text-shadow: 0 0 6px rgba(57,255,20,0.4);
    }

    .controls {
      margin-top: 1.2rem;
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      line-height: 1.8;
    }

    .controls kbd {
      display: inline-block;
      border: 1px solid var(--border);
      padding: 0.15em 0.45em;
      font-family: inherit;
      font-size: inherit;
      color: var(--text-muted);
    }

    .touch-hint {
      display: none;
      margin-top: 1rem;
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      line-height: 1.8;
    }

    @media (hover: none) and (pointer: coarse) {
      .controls { display: none; }
      .touch-hint { display: block; }
    }
  </style>
  <script>(function(){var t=localStorage.getItem('zero-theme');if(!t&&window.matchMedia('(prefers-color-scheme:light)').matches)t='light';if(t==='light')document.documentElement.setAttribute('data-theme','light')})()</script>
</head>
<body>
  <main>
    <a href="./" class="back">&lt; GAME LAB</a>
    <h1>FROGGER</h1>
    <p class="subtitle">CROSS THE ROAD. RIDE THE RIVER. DON'T DIE.</p>

    <div class="goals-display" id="goals"></div>

    <div class="hud">
      <div class="hud-item">LIVES <span class="hud-value lives" id="hud-lives">3</span></div>
      <div class="hud-item">SCORE <span class="hud-value score" id="hud-score">0</span></div>
      <div class="hud-item">LEVEL <span class="hud-value level" id="hud-level">1</span></div>
    </div>

    <div class="canvas-wrap">
      <canvas id="game" width="480" height="560"></canvas>
      <div class="overlay" id="overlay">
        <div class="overlay-title" id="overlay-title">FROGGER</div>
        <div class="overlay-sub" id="overlay-sub">cross the road, ride the logs</div>
        <div class="overlay-score hidden" id="overlay-score"></div>
        <button class="overlay-btn" id="overlay-btn">START</button>
      </div>
    </div>

    <div class="controls">
      <kbd>&#8593;</kbd> <kbd>&#8595;</kbd> <kbd>&#8592;</kbd> <kbd>&#8594;</kbd> or <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> to move
    </div>

    <div class="touch-hint" id="touch-hint">
      SWIPE to move &middot; TAP to start
    </div>
  </main>

  <script>
    (function() {
      var canvas = document.getElementById('game');
      var ctx = canvas.getContext('2d');
      var W = 480, H = 560;
      var COLS = 12;
      var ROWS = 14;
      var CELL = W / COLS;

      // Colors
      var VOID = '#0a0a0f';
      var MAGENTA = '#ff2d7b';
      var CYAN = '#00f0ff';
      var GREEN = '#39ff14';
      var PURPLE = '#9d4edd';
      var WHITE = '#e0e0e8';
      var DIM = '#7a7a90';
      var ROAD = '#121218';
      var WATER = '#061825';
      var SAFE = '#0d1a0d';

      // Particles
      var particles = [];

      function spawnParticles(x, y, color, count, opts) {
        opts = opts || {};
        var speed = opts.speed || 3;
        var life = opts.life || 1.0;
        var size = opts.size || 3;
        var gravity = opts.gravity || 0;
        for (var i = 0; i < count; i++) {
          var angle = Math.random() * Math.PI * 2;
          var spd = (0.5 + Math.random()) * speed;
          particles.push({
            x: x, y: y,
            vx: Math.cos(angle) * spd,
            vy: Math.sin(angle) * spd,
            life: life,
            maxLife: life,
            size: size * (0.5 + Math.random()),
            color: color,
            gravity: gravity
          });
        }
      }

      function spawnRing(x, y, color, radius) {
        particles.push({
          x: x, y: y, vx: 0, vy: 0,
          life: 0.6, maxLife: 0.6,
          size: 0, color: color,
          ring: true, radius: radius || 30,
          gravity: 0
        });
      }

      function updateParticles() {
        for (var i = particles.length - 1; i >= 0; i--) {
          var p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += p.gravity;
          p.life -= 0.02;
          if (p.life <= 0) particles.splice(i, 1);
        }
      }

      function drawParticles() {
        for (var i = 0; i < particles.length; i++) {
          var p = particles[i];
          var alpha = Math.max(0, p.life / p.maxLife);
          ctx.globalAlpha = alpha;

          if (p.ring) {
            var progress = 1 - (p.life / p.maxLife);
            var r = p.radius * progress;
            ctx.strokeStyle = p.color;
            ctx.lineWidth = 2 * alpha;
            ctx.shadowColor = p.color;
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
            ctx.stroke();
            ctx.shadowBlur = 0;
          } else {
            ctx.fillStyle = p.color;
            ctx.shadowColor = p.color;
            ctx.shadowBlur = 6;
            ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
            ctx.shadowBlur = 0;
          }
        }
        ctx.globalAlpha = 1;
      }

      // Screen shake
      var shake = { x: 0, y: 0, intensity: 0 };

      function triggerShake(intensity) {
        shake.intensity = intensity;
      }

      function updateShake() {
        if (shake.intensity > 0) {
          shake.x = (Math.random() - 0.5) * shake.intensity;
          shake.y = (Math.random() - 0.5) * shake.intensity;
          shake.intensity *= 0.88;
          if (shake.intensity < 0.3) {
            shake.intensity = 0;
            shake.x = 0;
            shake.y = 0;
          }
        }
      }

      // Hop animation
      var hopAnim = { active: false, t: 0, dx: 0, dy: 0, fromX: 0, fromY: 0 };

      function startHop(fromX, fromY, dx, dy) {
        hopAnim.active = true;
        hopAnim.t = 0;
        hopAnim.dx = dx * CELL;
        hopAnim.dy = dy * CELL;
        hopAnim.fromX = fromX;
        hopAnim.fromY = fromY;
      }

      function updateHop() {
        if (!hopAnim.active) return;
        hopAnim.t += 0.15;
        if (hopAnim.t >= 1) {
          hopAnim.active = false;
          hopAnim.t = 1;
        }
      }

      function getHopOffset() {
        if (!hopAnim.active) return { x: 0, y: 0, scaleX: 1, scaleY: 1 };
        var t = hopAnim.t;
        // Smooth ease
        var ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
        // Arc for jump height
        var arc = Math.sin(t * Math.PI) * -8;
        // Squash/stretch
        var squash = 1 + Math.sin(t * Math.PI) * 0.15;
        return {
          x: (1 - ease) * -hopAnim.dx,
          y: (1 - ease) * -hopAnim.dy + arc,
          scaleX: 1 / squash,
          scaleY: squash
        };
      }

      // Goal celebration flash
      var goalFlash = { active: false, t: 0 };

      // Game state
      var state = 'menu';
      var score = 0;
      var lives = 3;
      var level = 1;
      var frog = { x: 0, y: 0 };
      var goalSlots = [false, false, false, false, false];
      var goalsNeeded = 5;
      var goalPositions = [];
      var deathTimer = 0;
      var levelUpTimer = 0;
      var animFrame = 0;

      var lanes = [];

      function initGoalPositions() {
        goalPositions = [];
        var spacing = Math.floor(COLS / goalsNeeded);
        for (var i = 0; i < goalsNeeded; i++) {
          goalPositions.push(spacing * i + Math.floor(spacing / 2));
        }
      }

      function speedMult() {
        return 1 + (level - 1) * 0.15;
      }

      function initLanes() {
        lanes = [];
        var sm = speedMult();
        lanes.push({ type: 'goal', objects: [] });
        lanes.push({ type: 'water', dir: -1, speed: 0.6 * sm, objects: makeLog(3, 3) });
        lanes.push({ type: 'water', dir: 1, speed: 0.9 * sm, objects: makeLog(2, 3) });
        lanes.push({ type: 'water', dir: -1, speed: 0.5 * sm, objects: makeLog(4, 2) });
        lanes.push({ type: 'water', dir: 1, speed: 1.0 * sm, objects: makeLog(2, 4) });
        lanes.push({ type: 'water', dir: -1, speed: 0.7 * sm, objects: makeLog(3, 3) });
        lanes.push({ type: 'safe', objects: [] });
        lanes.push({ type: 'road', dir: 1, speed: 0.8 * sm, objects: makeCars(2, 3) });
        lanes.push({ type: 'road', dir: -1, speed: 1.2 * sm, objects: makeCars(1, 4) });
        lanes.push({ type: 'road', dir: 1, speed: 0.6 * sm, objects: makeCars(3, 2) });
        lanes.push({ type: 'road', dir: -1, speed: 1.0 * sm, objects: makeCars(2, 3) });
        lanes.push({ type: 'road', dir: 1, speed: 0.7 * sm, objects: makeCars(1, 2) });
        lanes.push({ type: 'road', dir: -1, speed: 1.1 * sm, objects: makeCars(2, 3) });
        lanes.push({ type: 'safe', objects: [] });
      }

      function makeLog(logLen, count) {
        var objs = [];
        var gap = W / count;
        for (var i = 0; i < count; i++) {
          objs.push({ x: i * gap, w: logLen * CELL, color: '#2a5a1a' });
        }
        return objs;
      }

      function makeCars(carLen, count) {
        var objs = [];
        var gap = W / count;
        var colors = [MAGENTA, CYAN, PURPLE, '#ff6ac1'];
        for (var i = 0; i < count; i++) {
          objs.push({ x: i * gap + Math.random() * 40, w: carLen * CELL, color: colors[i % colors.length] });
        }
        return objs;
      }

      function resetFrog() {
        frog.x = Math.floor(COLS / 2) * CELL;
        frog.y = (ROWS - 1) * CELL;
        hopAnim.active = false;
        // Spawn-in warp effect
        spawnRing(frog.x + CELL / 2, frog.y + CELL / 2, GREEN, 25);
        spawnParticles(frog.x + CELL / 2, frog.y + CELL / 2, GREEN, 8, { speed: 1.5, life: 0.6, size: 2 });
      }

      function startGame() {
        score = 0;
        lives = 3;
        level = 1;
        goalSlots = [false, false, false, false, false];
        particles = [];
        initGoalPositions();
        initLanes();
        resetFrog();
        state = 'playing';
        updateHUD();
        updateGoalDisplay();
        hideOverlay();
      }

      function nextLevel() {
        level++;
        goalSlots = [false, false, false, false, false];
        initLanes();
        resetFrog();
        state = 'playing';
        updateHUD();
        updateGoalDisplay();
      }

      function die(deathType) {
        var cx = frog.x + CELL / 2;
        var cy = frog.y + CELL / 2;

        // Death effects based on type
        if (deathType === 'water') {
          // Splash effect - blue particles spreading out
          spawnParticles(cx, cy, CYAN, 20, { speed: 4, life: 0.8, size: 3 });
          spawnParticles(cx, cy, '#0088aa', 12, { speed: 2, life: 1.0, size: 2 });
          spawnRing(cx, cy, CYAN, 35);
        } else if (deathType === 'car') {
          // Impact effect - sparks and debris
          spawnParticles(cx, cy, MAGENTA, 15, { speed: 5, life: 0.7, size: 4 });
          spawnParticles(cx, cy, '#ffff80', 10, { speed: 6, life: 0.5, size: 2 });
          spawnParticles(cx, cy, '#ff6600', 8, { speed: 3, life: 0.9, size: 3 });
          spawnRing(cx, cy, MAGENTA, 40);
          triggerShake(8);
        } else {
          // Generic death
          spawnParticles(cx, cy, MAGENTA, 15, { speed: 3, life: 0.8, size: 3 });
          spawnRing(cx, cy, MAGENTA, 30);
          triggerShake(5);
        }

        lives--;
        updateHUD();
        if (lives <= 0) {
          state = 'gameover';
          deathTimer = 60;
        } else {
          state = 'dead';
          deathTimer = 40;
        }
      }

      function moveFrog(dx, dy) {
        if (state !== 'playing') return;
        var nx = frog.x + dx * CELL;
        var ny = frog.y + dy * CELL;
        if (nx < 0 || nx >= W || ny < 0 || ny >= H) return;
        startHop(frog.x, frog.y, dx, dy);
        frog.x = nx;
        frog.y = ny;
      }

      // Keyboard input
      document.addEventListener('keydown', function(e) {
        if (state === 'menu' || state === 'gameover') {
          if (e.code === 'Enter' || e.code === 'Space') {
            e.preventDefault();
            startGame();
          }
          return;
        }
        switch (e.code) {
          case 'ArrowUp': case 'KeyW': e.preventDefault(); moveFrog(0, -1); break;
          case 'ArrowDown': case 'KeyS': e.preventDefault(); moveFrog(0, 1); break;
          case 'ArrowLeft': case 'KeyA': e.preventDefault(); moveFrog(-1, 0); break;
          case 'ArrowRight': case 'KeyD': e.preventDefault(); moveFrog(1, 0); break;
        }
      });

      // Touch: swipe gestures
      var touchStartX = 0, touchStartY = 0, touchStartTime = 0, touchActive = false;
      var SWIPE_THRESHOLD = 20;
      var TAP_MAX = 200; // ms

      document.addEventListener('touchstart', function(e) {
        // Allow the back link
        if (e.target.closest('.back')) return;
        e.preventDefault();
        var t = e.touches[0];
        touchStartX = t.clientX;
        touchStartY = t.clientY;
        touchStartTime = Date.now();
        touchActive = true;
      }, { passive: false });

      document.addEventListener('touchmove', function(e) {
        if (!touchActive) return;
        e.preventDefault();
      }, { passive: false });

      document.addEventListener('touchend', function(e) {
        if (!touchActive) return;
        touchActive = false;

        var t = e.changedTouches[0];
        var dx = t.clientX - touchStartX;
        var dy = t.clientY - touchStartY;
        var dist = Math.sqrt(dx * dx + dy * dy);
        var elapsed = Date.now() - touchStartTime;

        // Tap to start
        if (dist < SWIPE_THRESHOLD && elapsed < TAP_MAX) {
          if (state === 'menu' || state === 'gameover') {
            startGame();
          }
          return;
        }

        // Swipe
        if (dist >= SWIPE_THRESHOLD) {
          if (state === 'menu' || state === 'gameover') {
            startGame();
            return;
          }
          if (Math.abs(dx) > Math.abs(dy)) {
            moveFrog(dx > 0 ? 1 : -1, 0);
          } else {
            moveFrog(0, dy > 0 ? 1 : -1);
          }
        }
      }, { passive: false });

      // Overlay
      var overlay = document.getElementById('overlay');
      var overlayTitle = document.getElementById('overlay-title');
      var overlaySub = document.getElementById('overlay-sub');
      var overlayScore = document.getElementById('overlay-score');
      var overlayBtn = document.getElementById('overlay-btn');

      overlayBtn.addEventListener('click', function() {
        if (state === 'menu' || state === 'gameover') startGame();
      });

      function showOverlay(title, sub, scoreText, btnText) {
        overlayTitle.textContent = title;
        overlaySub.textContent = sub;
        if (scoreText) {
          overlayScore.textContent = scoreText;
          overlayScore.classList.remove('hidden');
        } else {
          overlayScore.classList.add('hidden');
        }
        overlayBtn.textContent = btnText;
        overlay.classList.remove('hidden');
      }

      function hideOverlay() {
        overlay.classList.add('hidden');
      }

      // HUD
      function updateHUD() {
        document.getElementById('hud-lives').textContent = lives;
        document.getElementById('hud-score').textContent = score;
        document.getElementById('hud-level').textContent = level;
      }

      function updateGoalDisplay() {
        var el = document.getElementById('goals');
        el.innerHTML = '';
        for (var i = 0; i < goalsNeeded; i++) {
          var slot = document.createElement('div');
          slot.className = 'goal-slot' + (goalSlots[i] ? ' filled' : '');
          slot.textContent = goalSlots[i] ? '✓' : '';
          el.appendChild(slot);
        }
      }

      // Update
      function update() {
        animFrame++;
        updateParticles();
        updateShake();
        updateHop();

        if (goalFlash.active) {
          goalFlash.t -= 0.03;
          if (goalFlash.t <= 0) goalFlash.active = false;
        }

        if (state === 'dead') {
          deathTimer--;
          if (deathTimer <= 0) {
            resetFrog();
            state = 'playing';
          }
          return;
        }

        if (state === 'gameover') {
          deathTimer--;
          if (deathTimer <= 0) {
            showOverlay('GAME OVER', 'the road wins this time', 'SCORE: ' + score, 'RETRY');
          }
          return;
        }

        if (state === 'levelup') {
          levelUpTimer--;
          if (levelUpTimer <= 0) {
            nextLevel();
          }
          return;
        }

        if (state !== 'playing') return;

        // Move lane objects
        for (var r = 0; r < lanes.length; r++) {
          var lane = lanes[r];
          if (lane.type === 'safe' || lane.type === 'goal') continue;
          for (var j = 0; j < lane.objects.length; j++) {
            var obj = lane.objects[j];
            obj.x += lane.dir * lane.speed;
            if (lane.dir > 0 && obj.x > W + 20) obj.x = -obj.w - 20;
            if (lane.dir < 0 && obj.x + obj.w < -20) obj.x = W + 20;
          }
        }

        // Check frog row
        var frogRow = Math.round(frog.y / CELL);
        if (frogRow < 0) frogRow = 0;
        if (frogRow >= ROWS) frogRow = ROWS - 1;

        var lane = lanes[frogRow];

        // Goal row
        if (lane.type === 'goal') {
          var landed = false;
          for (var g = 0; g < goalPositions.length; g++) {
            var gx = goalPositions[g] * CELL;
            if (!goalSlots[g] && Math.abs(frog.x - gx) < CELL * 0.7) {
              goalSlots[g] = true;
              score += 50 + level * 10;
              landed = true;

              // Goal celebration!
              var gcx = gx + CELL / 2;
              var gcy = frog.y + CELL / 2;
              spawnParticles(gcx, gcy, GREEN, 20, { speed: 3, life: 1.0, size: 3 });
              spawnParticles(gcx, gcy, '#80ff60', 10, { speed: 2, life: 0.8, size: 2 });
              spawnRing(gcx, gcy, GREEN, 35);
              goalFlash.active = true;
              goalFlash.t = 0.5;

              updateHUD();
              updateGoalDisplay();

              var allFilled = true;
              for (var k = 0; k < goalSlots.length; k++) {
                if (!goalSlots[k]) allFilled = false;
              }
              if (allFilled) {
                score += 200;
                updateHUD();
                state = 'levelup';
                levelUpTimer = 60;
                // Big level-up celebration
                for (var p = 0; p < 5; p++) {
                  var px = goalPositions[p] * CELL + CELL / 2;
                  spawnParticles(px, CELL / 2, GREEN, 12, { speed: 4, life: 1.2, size: 3 });
                }
              } else {
                resetFrog();
              }
              break;
            }
          }
          if (!landed) {
            die('water');
          }
          return;
        }

        // Water row
        if (lane.type === 'water') {
          var onLog = false;
          for (var j = 0; j < lane.objects.length; j++) {
            var obj = lane.objects[j];
            if (frog.x + CELL * 0.7 > obj.x && frog.x + CELL * 0.3 < obj.x + obj.w) {
              onLog = true;
              frog.x += lane.dir * lane.speed;
              break;
            }
          }
          if (!onLog) {
            die('water');
            return;
          }
          if (frog.x < -CELL * 0.5 || frog.x > W - CELL * 0.5) {
            die('water');
            return;
          }
        }

        // Road row
        if (lane.type === 'road') {
          for (var j = 0; j < lane.objects.length; j++) {
            var obj = lane.objects[j];
            if (frog.x + CELL * 0.7 > obj.x && frog.x + CELL * 0.3 < obj.x + obj.w) {
              die('car');
              return;
            }
          }
        }
      }

      // Draw
      function draw() {
        ctx.save();
        ctx.translate(shake.x, shake.y);

        ctx.fillStyle = VOID;
        ctx.fillRect(-5, -5, W + 10, H + 10);

        // Draw lanes
        for (var r = 0; r < ROWS; r++) {
          var lane = lanes[r];
          var y = r * CELL;

          if (lane.type === 'water') {
            ctx.fillStyle = WATER;
            ctx.fillRect(0, y, W, CELL);
            ctx.strokeStyle = 'rgba(0, 240, 255, 0.08)';
            ctx.lineWidth = 1;
            for (var wl = 0; wl < 3; wl++) {
              var wy = y + 10 + wl * 12;
              var woff = (animFrame * 0.5 + wl * 40) % W;
              ctx.beginPath();
              for (var wx = -40; wx < W + 40; wx += 20) {
                var sy = wy + Math.sin((wx + woff) * 0.05) * 3;
                if (wx === -40) ctx.moveTo(wx, sy);
                else ctx.lineTo(wx, sy);
              }
              ctx.stroke();
            }
          } else if (lane.type === 'road') {
            ctx.fillStyle = ROAD;
            ctx.fillRect(0, y, W, CELL);
            ctx.fillStyle = 'rgba(122, 122, 144, 0.2)';
            for (var d = 0; d < COLS; d += 2) {
              ctx.fillRect(d * CELL + 10, y + CELL / 2 - 1, CELL - 20, 2);
            }
          } else if (lane.type === 'safe') {
            ctx.fillStyle = SAFE;
            ctx.fillRect(0, y, W, CELL);
            ctx.fillStyle = 'rgba(57, 255, 20, 0.03)';
            for (var sx = 0; sx < COLS; sx += 2) {
              ctx.fillRect(sx * CELL, y, CELL, CELL);
            }
          } else if (lane.type === 'goal') {
            ctx.fillStyle = WATER;
            ctx.fillRect(0, y, W, CELL);
            for (var g = 0; g < goalPositions.length; g++) {
              var gx = goalPositions[g] * CELL;
              if (goalSlots[g]) {
                ctx.fillStyle = 'rgba(57, 255, 20, 0.15)';
                ctx.fillRect(gx, y, CELL, CELL);
                drawFrog(gx, y, GREEN, 0.6, null);
              } else {
                ctx.fillStyle = 'rgba(57, 255, 20, 0.06)';
                ctx.fillRect(gx + 4, y + 4, CELL - 8, CELL - 8);
                ctx.strokeStyle = 'rgba(57, 255, 20, 0.2)';
                ctx.lineWidth = 1;
                ctx.strokeRect(gx + 4, y + 4, CELL - 8, CELL - 8);
              }
            }
          }

          // Draw objects
          for (var j = 0; j < lane.objects.length; j++) {
            var obj = lane.objects[j];
            var oy = y;

            if (lane.type === 'water') {
              ctx.fillStyle = '#1a4a12';
              ctx.fillRect(obj.x, oy + 4, obj.w, CELL - 8);
              ctx.fillStyle = '#2a6a1a';
              ctx.fillRect(obj.x + 2, oy + 6, obj.w - 4, CELL - 12);
              ctx.strokeStyle = 'rgba(57, 255, 20, 0.15)';
              ctx.lineWidth = 1;
              for (var lx = obj.x + 15; lx < obj.x + obj.w - 10; lx += 20) {
                ctx.beginPath();
                ctx.moveTo(lx, oy + 8);
                ctx.lineTo(lx, oy + CELL - 8);
                ctx.stroke();
              }
              ctx.fillStyle = '#3a8a2a';
              ctx.fillRect(obj.x, oy + 6, 6, CELL - 12);
              ctx.fillRect(obj.x + obj.w - 6, oy + 6, 6, CELL - 12);
            } else if (lane.type === 'road') {
              var carH = CELL - 10;
              var carY = oy + 5;
              ctx.fillStyle = obj.color;
              ctx.fillRect(obj.x + 3, carY, obj.w - 6, carH);
              ctx.shadowColor = obj.color;
              ctx.shadowBlur = 8;
              ctx.fillRect(obj.x + 3, carY, obj.w - 6, carH);
              ctx.shadowBlur = 0;
              ctx.fillStyle = 'rgba(0, 240, 255, 0.3)';
              if (lane.dir > 0) {
                ctx.fillRect(obj.x + obj.w - 18, carY + 4, 12, carH - 8);
              } else {
                ctx.fillRect(obj.x + 6, carY + 4, 12, carH - 8);
              }
              ctx.fillStyle = '#ffff80';
              if (lane.dir > 0) {
                ctx.fillRect(obj.x + obj.w - 6, carY + 4, 4, 5);
                ctx.fillRect(obj.x + obj.w - 6, carY + carH - 9, 4, 5);
              } else {
                ctx.fillRect(obj.x + 2, carY + 4, 4, 5);
                ctx.fillRect(obj.x + 2, carY + carH - 9, 4, 5);
              }
            }
          }
        }

        // Draw frog
        if (state === 'playing' || state === 'levelup') {
          var hop = getHopOffset();
          drawFrog(frog.x + hop.x, frog.y + hop.y, GREEN, 1.0, hop);
        } else if (state === 'dead' || state === 'gameover') {
          if (deathTimer % 6 < 3) {
            drawDeathX(frog.x, frog.y);
          }
        }

        // Grid lines
        ctx.strokeStyle = 'rgba(122, 122, 144, 0.06)';
        ctx.lineWidth = 1;
        for (var r = 1; r < ROWS; r++) {
          ctx.beginPath();
          ctx.moveTo(0, r * CELL);
          ctx.lineTo(W, r * CELL);
          ctx.stroke();
        }

        // Goal flash overlay
        if (goalFlash.active) {
          ctx.fillStyle = 'rgba(57, 255, 20, ' + (goalFlash.t * 0.15) + ')';
          ctx.fillRect(0, 0, W, H);
        }

        // Level up text
        if (state === 'levelup') {
          ctx.save();
          ctx.fillStyle = 'rgba(10, 10, 15, 0.5)';
          ctx.fillRect(0, H / 2 - 30, W, 60);
          ctx.font = '800 28px "JetBrains Mono"';
          ctx.fillStyle = GREEN;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.shadowColor = GREEN;
          ctx.shadowBlur = 20;
          var pulse = 1 + Math.sin(animFrame * 0.15) * 0.05;
          ctx.setTransform(pulse, 0, 0, pulse, W / 2 * (1 - pulse), H / 2 * (1 - pulse));
          ctx.fillText('LEVEL ' + (level + 1), W / 2, H / 2);
          ctx.shadowBlur = 0;
          ctx.restore();
        }

        // Particles on top
        drawParticles();

        ctx.restore();
      }

      function drawFrog(x, y, color, scale, hop) {
        var s = CELL * scale;
        var cx = x + CELL / 2;
        var cy = y + CELL / 2;
        var hs = s * 0.4;

        ctx.save();

        // Apply squash/stretch from hop
        if (hop && hop.scaleX !== undefined) {
          ctx.translate(cx, cy);
          ctx.scale(hop.scaleX, hop.scaleY);
          ctx.translate(-cx, -cy);
        }

        ctx.shadowColor = color;
        ctx.shadowBlur = 10;

        // Body
        ctx.fillStyle = color;
        ctx.fillRect(cx - hs * 0.7, cy - hs * 0.6, hs * 1.4, hs * 1.2);

        // Eyes
        ctx.fillRect(cx - hs * 0.8, cy - hs * 0.8, hs * 0.4, hs * 0.4);
        ctx.fillRect(cx + hs * 0.4, cy - hs * 0.8, hs * 0.4, hs * 0.4);
        // Pupils
        ctx.fillStyle = VOID;
        ctx.fillRect(cx - hs * 0.65, cy - hs * 0.65, hs * 0.2, hs * 0.2);
        ctx.fillRect(cx + hs * 0.5, cy - hs * 0.65, hs * 0.2, hs * 0.2);

        // Legs
        ctx.fillStyle = color;
        ctx.fillRect(cx - hs, cy + hs * 0.3, hs * 0.3, hs * 0.5);
        ctx.fillRect(cx + hs * 0.7, cy + hs * 0.3, hs * 0.3, hs * 0.5);
        ctx.fillRect(cx - hs, cy - hs * 0.3, hs * 0.25, hs * 0.4);
        ctx.fillRect(cx + hs * 0.75, cy - hs * 0.3, hs * 0.25, hs * 0.4);

        ctx.shadowBlur = 0;
        ctx.restore();
      }

      function drawDeathX(x, y) {
        var cx = x + CELL / 2;
        var cy = y + CELL / 2;
        ctx.save();
        ctx.strokeStyle = MAGENTA;
        ctx.lineWidth = 3;
        ctx.shadowColor = MAGENTA;
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.moveTo(cx - 12, cy - 12);
        ctx.lineTo(cx + 12, cy + 12);
        ctx.moveTo(cx + 12, cy - 12);
        ctx.lineTo(cx - 12, cy + 12);
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.restore();
      }

      // Game loop
      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      // Init
      initGoalPositions();
      initLanes();
      resetFrog();
      updateHUD();
      updateGoalDisplay();
      draw();
      loop();
    })();
  </script>
  <script src="../theme-toggle.js"></script>
</body>
</html>
