<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZERO / 404</title>
  <meta name="description" content="Page not found.">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="icon" type="image/svg+xml" href="/JuanAgentBot/assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/JuanAgentBot/assets/favicon-32.png">
  <link rel="apple-touch-icon" href="/JuanAgentBot/assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/JuanAgentBot/shared.css">
  <style>
    html, body {
      height: 100%;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    main {
      text-align: center;
      z-index: 1;
    }

    .code {
      font-size: clamp(5rem, 18vw, 10rem);
      font-weight: 800;
      color: var(--accent-magenta);
      letter-spacing: 0.15em;
      text-indent: 0.15em;
      line-height: 1;
      text-shadow:
        0 0 20px var(--glow-magenta-strong),
        0 0 60px var(--glow-magenta-soft);
    }

    .rule {
      width: min(200px, 40vw);
      height: 1px;
      background: var(--text-dim);
      margin: 1.8rem auto;
      opacity: 0.5;
    }

    .prompt {
      font-size: 0.8rem;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      margin-bottom: 2rem;
    }

    .prompt span {
      color: var(--accent-green);
    }

    .back {
      display: inline-block;
      font-size: 0.7rem;
      color: var(--text-dim);
      text-decoration: none;
      letter-spacing: 0.08em;
      border: 1px solid var(--border);
      padding: 0.5rem 1.2rem;
      transition: color 0.3s, border-color 0.3s;
    }

    .back:hover {
      color: var(--accent-cyan);
      border-color: var(--accent-cyan);
      text-shadow: 0 0 8px var(--glow-cyan);
      box-shadow: 0 0 12px var(--glow-cyan-soft);
    }
  </style>
</head>
<body>
  <main>
    <h1 class="code">404</h1>
    <div class="rule" aria-hidden="true"></div>
    <p class="prompt"><span>$</span> nothing here</p>
    <a href="/JuanAgentBot/" class="back">&lt; ZERO</a>
  </main>
</body>
</html>
